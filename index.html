  {r:198, n:"Robin Trower", b:"Procol Harum / solo", t:"Bridge of Sighs", w:"Robin Trower", d:"Procol Harumを経てソロへ、ジミ・ヘンドリックス系のファズ/ワウで自らの世界を築いた英国の雄。1974年のBridge of Sighsはアトモスフェリックなブルースロックの到達点として、今も多くのギタリストから愛される。スローかつ重たいトーンと、泣きのフレージングが彼の指紋。"},
  {r:199, n:"Jorma Kaukonen", b:"Jefferson Airplane / Hot Tuna", t:"Embryonic Journey", w:"Jorma Kaukonen", d:"Jefferson Airplaneのオリジナルメンバーで、後にHot Tunaを率いた指弾きの名手。レヴェレンド・ゲイリー・デイヴィスから継承したラグタイム/ブルースのフィンガースタイルをロックの文脈に持ち込み、60年代サイケデリック・ロックに独自のアコースティックな色を添えた。"},
  {r:200, n:"Misha Mansoor", b:"Periphery", t:"Marigold", w:"Misha Mansoor", d:"Peripheryのリーダーで、2010年代のジェント(djent)ムーブメントを牽引した現代プログレッシブ・メタルの中心人物。高度に制御された7弦/8弦のリフとトーン作りで、Meshuggahが生んだ低音の美学を完成された楽曲に昇華させた。プロデューサー、機材設計者としても多方面で活躍する万能職人。"},
  {r:201, n:"Matteo Mancuso", b:"solo", t:"Silkroad", w:"Matteo Mancuso", d:"シチリア出身のジャズ/フュージョン界の新星。ピックを使わず、フラメンコ/クラシックギター由来の右手指奏法をエレキに転用した独自のアプローチで、ヴァイから「エレキギターの未来」と讚えられた。流麗なレガートと複雑な和声感覚で20代にして世界の第一線に立つ。"},
  {r:202, n:"Jared James Nichols", b:"solo", t:"Easy Come, Easy Go", w:"Jared James Nichols", d:"ピックを使わず指で弾くスタイルを貫く、P-90シングルコイルのレスポールを愛用するブルース/ロック・リバイバルの旗手。クラシックな70年代型のパワートリオ編成で、激しくも表情豊かなベンディングと泣きのビブラートを聞かせる、現代における正統派ギターヒーローの一人。"},
  {r:203, n:"Scott LePage", b:"Polyphia", t:"G.O.A.T.", w:"Scott LePage", d:"Tim HensonとともにPolyphiaの双頭を成すギタリスト。New Levels New DevilsのG.O.A.T.に象徴される、ヒップホップ/EDM感覚のノリと複雑なタッピング/ハイブリッドピッキングを融合した新世代のインスト・ロック語彙を、相方と共に作り上げた。"},
  {r:204, n:"Mateus Asato", b:"solo / session", t:"The Breakup Song", w:"Mateus Asato", d:"ブラジル生まれのギタリストで、Instagramの短編動画で世界的スターになった稀有な存在。SuhrのTスタイルから紡ぎ出す甘く歌うようなトーンと、ネオソウル系の洗練されたコードボイシングは「neo-soul guitar」というジャンルそのものを定義した。ソングライターとしても進化を続ける。"},
  {r:205, n:"Ichika Nito", b:"solo", t:"flowers", w:"Ichika Nito", d:"日本が世界に誇るベッドルーム・ギタリストで、YouTube登録者数は270万人超。両手タッピングを駆使した1分程度のミニ・コンポジションで世界中の若いギタリストに影響を与えた。Math rock/Math funkの影響を感じさせる浮遊感のある和声と、繊細な音色の選択で、独自のギター語彙を築いた。"},
  {r:206, n:"Jason Richardson", b:"All That Remains / solo", t:"Tendinitis", w:"Jason Richardson & Luke Holland", d:"圧倒的な速弾きと完璧なピッキング精度で知られるシュレッダー。All That Remainsを経てソロに。現代ギターヒーローの代表格で、技術的な正確さと音楽性を両立する。"},
  {r:207, n:"St. Vincent", b:"solo (Annie Clark)", t:"Los Ageless", w:"St. Vincent", d:"アーニー・クラークによるアートロック・プロジェクト。独特のフレーズ感と歪みをまとったギターで現代女性ギタリストの筆頭格。シグネチャーモデルも所有する。"},
  {r:208, n:"Synyster Gates", b:"Avenged Sevenfold", t:"Afterlife", w:"Synyster Gates", d:"Avenged Sevenfoldのリードギタリスト。スウィープ、タッピング、ネオクラシカル要素を融合させた派手なソロで2010年代メタル・シーンを牽引した。"},
  {r:209, n:"Kiko Loureiro", b:"Angra / Megadeth", t:"Escaping", w:"Kiko Loureiro", d:"ブラジル出身。Angraのギタリストとしてプログレメタルとラテン/ネオクラシカルの融合で独自の地位を確立し、後にMegadethに加入。テクニックと音楽性のバランスが絶妙。"},
  {r:210, n:"Trey Anastasio", b:"Phish", t:"You Enjoy Myself", w:"Phish", d:"Phishのフロントマン兼ギタリスト。ジャムバンド・シーンの中心人物で、長尺の即興演奏と複雑な作曲を得意とする。独自のトーンと物語性のあるソロで愛される。"},
  {r:211, n:"Eric Gales", b:"solo", t:"I Want My Crown", w:"Eric Gales & Joe Bonamassa", d:"左右逆さまに構える独特のスタイルで知られるブルース・ロックギタリスト。ジミヘンの精神を受け継ぐ現代的ブルースマンで、感情豊かなソロが絶品。"},
  {r:212, n:"John Pizzarelli", b:"solo", t:"I Like Jersey Best", w:"John Pizzarelli", d:"バッキー・ピザレリの息子。7弦ギターと歌を両立する珍しいスタイルで、スウィング時代の粋を現代に伝える。ナット・キング・コールへの愛も深い。"},
  {r:213, n:"Norman Brown", b:"solo", t:"After The Storm", w:"Norman Brown", d:"スムース・ジャズ界で長く活躍するギタリスト。ジョージ・ベンソンの流れを汲むメロウなトーンと、R&Bテイストの洗練されたフレージングが持ち味。"},
  {r:214, n:"Mary Osborne", b:"solo", t:"Mary's Goodbye Blues", w:"Mary Osborne", d:"1940年代から活躍した女性ジャズギタリストの先駆者。チャーリー・クリスチャンの影響を強く受け、スウィング期に数少ない女性演奏家として活躍した。"},
  {r:215, n:"Russell Malone", b:"solo / session", t:"Sweet Georgia Peach", w:"Russell Malone", d:"ジョージ・ベンソンとウェス直系のメインストリーム・ジャズギタリスト。ダイアナ・クラールとの共演でも有名。太く温かいトーンとスウィング感が素晴らしい。"},
  {r:216, n:"Emily Remler", b:"solo", t:"Softly, As In A Morning Sunrise", w:"Emily Remler", d:"32歳で早逝した女性ジャズギタリスト。ウェス・モンゴメリー直系のビバップを体現し、高度なスウィング感と確かなテクニックで男性優位の世界に輝きを残した。"},
  {r:217, n:"Charlie Hunter", b:"solo", t:"Bing, Bing, Bing, Bing", w:"Charlie Hunter Trio", d:"8弦ギターでベースとギターを同時に演奏する独自スタイル。ジャズ、ファンク、ソウルを横断し、ディアンジェロのVoodooにも参加。グルーヴの達人。"},
  {r:218, n:"Kurt Rosenwinkel", b:"solo", t:"Zhivago", w:"Kurt Rosenwinkel", d:"現代ジャズギターの最重要人物の一人。浮遊感のある独特のフレージングと幻想的なサウンドで若手に絶大な影響を与える。モダン・ジャズの革新者。"},
  {r:219, n:"Julian Lage", b:"solo", t:"Boo's Blues", w:"Julian Lage", d:"神童として注目を集め、現在も第一線で活躍するジャズギタリスト。テレキャスターを使いジャズ、ブルース、カントリー、アメリカーナを溶かし込む独自の美学を持つ。"},
  {r:220, n:"Earl Klugh", b:"solo", t:"Living Inside Your Love", w:"Earl Klugh", d:"ナイロン弦のアコギを駆使するスムース・ジャズの第一人者。チェット・アトキンスの影響を受け、優しく叙情的なフィンガースタイルで世界中に愛されている。"},
  {r:221, n:"James \"Blood\" Ulmer", b:"solo", t:"Jazz Is The Teacher, Funk Is The Preacher", w:"James Blood Ulmer", d:"オーネット・コールマンのハーモロディクスを受け継ぐフリージャズ／ファンクのギタリスト。鋭く切り裂くようなトーンとブルース的な濃さが融合した独自の世界。"},
  {r:222, n:"Eric Gale", b:"solo / session", t:"Ginseng Woman", w:"Eric Gale", d:"Stuffのメンバーとしても知られるセッションの名手。ブルースに根ざした味わい深いトーンで500を超えるアルバムに参加し、日本でも深く愛された。"},
  {r:223, n:"Eddie Lang", b:"solo / Paul Whiteman", t:"Stringing the Blues", w:"Joe Venuti & Eddie Lang", d:"\"ジャズギターの父\"と呼ばれる伝説。1920年代にギターをバンジョーに代わる主役楽器として確立させ、現代のジャズギターの礎を築いた先駆者。"},
  {r:224, n:"Larry Carlton", b:"solo / session", t:"Room 335 (Long Version)", w:"Larry Carlton", d:"Gibson ES-335を愛用し\"Mr. 335\"と呼ばれる名手。Steely Danの\"Kid Charlemagne\"ソロなど数々の歴史的セッションに参加。甘く伸びるトーンは唯一無二。"},
  {r:225, n:"Laurindo Almeida", b:"solo / Stan Kenton", t:"Naked City Theme", w:"Laurindo Almeida & The Bossa Nova Allstars", d:"ブラジル出身のクラシカル／ジャズギタリスト。スタン・ケントン楽団を経てボサノヴァ前夜のクラシカル・ギターとジャズの融合を先駆けた。グラミー多数受賞。"},
  {r:226, n:"George Van Eps", b:"solo", t:"Stompin' At The Savoy", w:"George Van Eps & Howard Alden", d:"7弦ギターを発明した先駆者。\"ラップ・ピアノ\"と呼ぶ独自のコード／メロディ／ベースを同時に奏でるスタイルを確立し、後のジャズギター発展に多大な影響を与えた。"},
  {r:227, n:"Sonny Sharrock", b:"solo", t:"Promises Kept", w:"Sonny Sharrock", d:"フリージャズの革新的ギタリスト。コルトレーンのサックスをギターで表現しようとした獰猛なフィードバックと爆発力で、オルタナ／アヴァンギャルドに巨大な影響。"},
  {r:228, n:"Howard Roberts", b:"solo / Wrecking Crew", t:"Smolderin'", w:"The Howard Roberts Quartet", d:"LAのセッション・シーンで活躍した名手。Wrecking Crewの一員として数多くのポップス録音に参加しつつ、ジャズギターの教育家としても大きな足跡を残した。"},
  {r:229, n:"Kevin Eubanks", b:"solo", t:"Turning Point (Part I)", w:"Kevin Eubanks", d:"Tonight Showのバンドリーダーとしても有名なジャズ／フュージョン・ギタリスト。兄弟家系の音楽家で、滑らかなラインとフィンガースタイルの技巧が光る。"},
  {r:230, n:"Bill Connors", b:"Return To Forever / solo", t:"Theme To The Gaurdian", w:"Bill Connors", d:"Return To Forever初期メンバーとしてチック・コリアと共演した後、ECMでソロ・アコースティック作品を制作。繊細でリリカルなプレイが印象的。"},
  {r:231, n:"Steve Khan", b:"solo / session", t:"Dr. Slump", w:"Steve Khan", d:"Eyewitnessでの鋭いフュージョン演奏で知られる。ウェス・モンゴメリーやジム・ホールの影響を咀嚼した知的なフレージングと、個性的なコード感覚が特徴。"},
  {r:232, n:"Lee Ritenour", b:"solo / Fourplay", t:"Captain Fingers", w:"Lee Ritenour", d:"\"Captain Fingers\"の愛称で親しまれる指の速さで知られるセッション／スムース・ジャズの名手。Fourplayでも活躍し、数千もの録音に参加している。"},
  {r:233, n:"Pat Martino", b:"solo", t:"Sunny", w:"Pat Martino", d:"脳動脈瘤で記憶を失ったが奇跡的に復帰した伝説のプレイヤー。16分音符の機関銃のような流麗なラインと独自のマイナー・コンバージョン理論で知られる。"},
  {r:234, n:"Ralph Towner", b:"Oregon / solo", t:"Icarus", w:"Ralph Towner & Gary Burton", d:"Oregonの中心人物として知られるアコースティックの巨匠。12弦ギターとクラシカル・ギターを駆使し、ジャズ、フォーク、クラシックを融合した独特の世界観を築く。"},
  {r:235, n:"John Abercrombie", b:"solo / ECM", t:"Timeless", w:"John Abercrombie Jan Hammer Jack DeJohnette", d:"ECMレーベルの看板ギタリスト。Gatewayトリオでの活動で知られる。フュージョンから内省的なモダン・ジャズまで、多彩な音楽性と独特の浮遊感を持つトーンが魅力。"},
  {r:236, n:"Bill Frisell", b:"solo", t:"Have a Little Faith in Me", w:"Bill Frisell", d:"アメリカーナ、カントリー、ジャズを横断する独特の世界観を持つギタリスト。エフェクトを駆使した浮遊感あるサウンドと、プレイの詩情で世界中のファンを魅了。"},
  {r:237, n:"Freddie Green", b:"Count Basie Orchestra", t:"Corner Pocket", w:"Count Basie And His Orchestra", d:"カウント・ベイシー楽団で50年間リズムギターを担当した巨人。ソロはほとんど取らず、4ビートのコードカッティングだけでバンドを揺らす職人の極致。"},
  {r:238, n:"Herb Ellis", b:"Oscar Peterson Trio", t:"Pap's Blues", w:"Herb Ellis", d:"オスカー・ピーターソン・トリオのギタリストとして名を馳せた。テキサス出身らしいブルージーな感覚と伸びやかなスウィング感で、ジャズギター黄金時代を支えた。"},
  {r:239, n:"Lenny Breau", b:"solo", t:"Five O'clock Bells", w:"Lenny Breau", d:"カナダ出身の天才。チェット・アトキンス流のフィンガースタイルとジャズのコード・メロディを融合させた独自のハーモニクス奏法で後進に強い影響を残した。"},
  {r:240, n:"Mike Stern", b:"Miles Davis / solo", t:"Upside Downside", w:"Mike Stern", d:"マイルス・デイビス・バンドを経てソロとして活躍するフュージョン・ギタリスト。ロックの激しさとジャズの洗練を兼ね備えた、情熱的でブルージーなスタイルが特徴。"},
  {r:241, n:"John Scofield", b:"Miles Davis / solo", t:"Chank", w:"John Scofield", d:"マイルス・バンド出身の現代ジャズ・ギター第一人者。独特のベンドとアウト感を活かしたフレージングで、ジャズ、ファンク、ジャムバンドを縦横無尽に行き来する。"},
  {r:242, n:"Charlie Byrd", b:"solo / Stan Getz", t:"Desafinado", w:"Stan Getz & Charlie Byrd", d:"スタン・ゲッツとの\"Jazz Samba\"でボサノヴァをアメリカに紹介した立役者。クラシックギター出身で、ナイロン弦の温かみある音色がブラジル音楽と絶妙に調和する。"},
  {r:243, n:"Larry Coryell", b:"Eleventh House / solo", t:"Spaces (Infinite)", w:"Larry Coryell", d:"\"Godfather of Fusion\"と称される。The Eleventh Houseでジャズ・ロックを開拓し、ジョン・マクラフリンと並ぶ初期フュージョンの象徴的存在だった。"},
  {r:244, n:"Jimmy Raney", b:"solo", t:"Stella By Starlight", w:"Stan Getz", d:"スタン・ゲッツ・カルテットの一員として1950年代クール・ジャズを代表するギタリスト。澄んだトーンとバップ語法の流麗なラインで\"ギタリストのギタリスト\"と呼ばれる。"},
  {r:245, n:"Gabor Szabo", b:"solo / Chico Hamilton", t:"Gypsy Queen", w:"Gábor Szabó", d:"ハンガリー出身のギタリスト。\"Gypsy Queen\"はサンタナによってロックの名曲に生まれ変わった。ジャズ、東欧音楽、インド音楽を融合した神秘的なサウンドを確立。"},
  {r:246, n:"Johnny Smith", b:"solo", t:"Moonlight In Vermont", w:"Johnny Smith", d:"\"ムーンライト・イン・ヴァーモント\"の名演で知られるクール・ジャズの巨匠。ピアノ的な密集ヴォイシングのコード・メロディで、ジャズギターの概念を広げた。"},
  {r:247, n:"Stanley Jordan", b:"solo", t:"Eleanor Rigby", w:"Stanley Jordan", d:"両手タッピングによる革新的奏法で1980年代に登場。ピアニストのように旋律、和声、ベースを同時演奏する独自技術で、ジャズギターに全く新しい可能性を示した。"},
  {r:248, n:"Tal Farlow", b:"solo / Red Norvo Trio", t:"Meteor", w:"Tal Farlow", d:"巨大な手を活かした軽快で高速なフレージングで\"Octopus\"の異名を取る。レッド・ノーヴォ・トリオでの活躍で50年代ジャズギター界の頂点の一人に上り詰めた。"},
  {r:249, n:"Joe Pass", b:"solo", t:"Night And Day", w:"Joe Pass", d:"\"Virtuoso\"シリーズで証明した至高の無伴奏ソロ・ギターの達人。メロディ、コード、ベースラインを同時に演奏する完璧なテクニックで世界を驚かせた真の巨匠。"},
  {r:250, n:"Kenny Burrell", b:"solo", t:"Chitlins Con Carne", w:"Kenny Burrell", d:"\"Midnight Blue\"で知られるデトロイト出身の名手。ブルースを血に持ちつつ上品にスウィングするプレイで、デューク・エリントンが最愛のギタリストと称した。"},
  {r:251, n:"Barney Kessel", b:"solo / Wrecking Crew", t:"Jordu", w:"Barney Kessel & Ray Brown & Shelly Manne", d:"チャーリー・クリスチャン直系のビバップ・ギタリスト。Poll Winnersトリオで名を轟かせ、Wrecking Crewのメンバーとしても数多くのポップス録音に参加した。"},
  {r:252, n:"Grant Green", b:"solo / Blue Note", t:"Idle Moments", w:"Grant Green", d:"Blue Noteレーベルのハウス・ギタリストとして活躍。ホーン的な単音ライン主体のシンプルで力強いスタイルで、ソウル・ジャズとハード・バップの両方に足跡を残した。"},
  {r:253, n:"George Benson", b:"solo", t:"Breezin'", w:"George Benson", d:"ウェス・モンゴメリーの最高の後継者とされる名手。\"Breezin'\"で世界的スターとなり、歌とギターを高レベルで両立する稀有な才能でジャンルの壁を超えた。"},
  {r:254, n:"Jim Hall", b:"solo", t:"Concierto De Aranjuez", w:"Jim Hall", d:"\"クワイエット・ジャイアント\"と呼ばれる静謐な巨匠。空間を活かした繊細なフレージングで、パット・メセニーやビル・フリゼールら現代の巨匠たちに深い影響を与えた。"},
  {r:255, n:"Doc Watson", b:"solo", t:"Black Mountain Rag", w:"Doc Watson & Merle Watson", d:"盲目のギタリスト兼フォークシンガー。フラットピッキング・ギターの第一人者にしてブルーグラス三大ギタリストの一人。フィドル曲を驚くべき正確さでアコースティックギターで再現し、この奏法を芸術の域まで高めた。"},
  {r:256, n:"Sabicas", b:"solo", t:"Bulerias", w:"Sabicas", d:"少年時代のパコ・デ・ルシアが憧れたフラメンコ界空前絶後の技巧派。カルロス・モントーヤと共にフラメンコギターを世界に知らしめた巨匠。チェット・アトキンスが「最高のテクニックはサビーカスだ」と絶賛した。"},
  {r:257, n:"João Gilberto", b:"solo", t:"Chega de Saudade", w:"João Gilberto", d:"ボサノバの創始者にしてバチーダ奏法の生みの親。囁くような歌声と、メトロノームのように刻むギターのシンコペーションで、ブラジル音楽を世界的な新ジャンルへと昇華させた\"O Mito\"(神話)と呼ばれる巨匠。"},
  {r:258, n:"Derek Bailey", b:"solo / Music Improvisation Company", t:"Third Stream Boogaloo", w:"Derek Bailey", d:"ノンイディオマティック(既存の音楽語法に依らない即興)を提示した伝説のギター即興演奏家。ジム・オルーク、大友良英、マーク・リボー等、「癖のある」ミュージシャンたちに深い影響を与えた即興演奏の巨匠。"},
  {r:259, n:"Robben Ford", b:"solo / Yellowjackets", t:"Revelation", w:"Robben Ford", d:"ジャズとブルースを股にかけて活躍するギタリスト兼シンガー。マイルス・バンド、Yellowjackets、リッキー・リー・ジョーンズ等、数多くの名盤に参加してきた百戦錬磨の超一流セッションマン。"},
  {r:260, n:"Nokie Edwards", b:"The Ventures", t:"Pipeline", w:"The Ventures", d:"ベンチャーズの2代目リードギタリスト。「テケテケ旋風」で昭和の日本に\"1億総エレキ化\"のブームを巻き起こした。日本のギター音楽界に与えた影響は計り知れない、エレキギターの偉大な伝道師。"},
  {r:261, n:"John Williams", b:"solo / Sky", t:"Cavatina (Theme from The Deer Hunter)", w:"John Williams", d:"現代クラシックギター界の帝王、\"キング・オブ・ギター\"。セゴビアの愛弟子で、映画「ディア・ハンター」のテーマ「カヴァティーナ」での世界的ヒットは有名。ジュリアン・ブリームとの夢の共演は20世紀を代表するギターデュオと評される。"},
  {r:262, n:"Jake E. Lee", b:"Ozzy Osbourne / Badlands", t:"Bark at the Moon", w:"Ozzy Osbourne", d:"急逝したランディ・ローズの後任としてオジー・オズボーンのバンドに加入。期待を裏切らないプレイで日本でも高い人気を誇る。\"ジェイク・フェイク\"と言われたトリッキーかつ華麗なプレイで人気を博したギターヒーロー。"},
  {r:263, n:"Francisco Tárrega", b:"solo (composer)", t:"Capricho árabe", w:"Francisco Tárrega", d:"\"近代ギターの父\"。「アルハンブラの思い出」の作曲者としても有名。それまでの古い演奏法を改め、ギターのあらゆる可能性を極限まで追求し、ギター音楽を揺るぎない地位まで築き上げた19世紀最大の功労者の一人。"},
  {r:264, n:"Cornell Dupree", b:"solo / Stuff", t:"Teasin'", w:"Cornell Dupree", d:"アレサ・フランクリン、ダニー・ハサウェイ、ジョー・コッカー、スタッフ等、数多の名盤に参加した百戦錬磨の超一流セッションマンであり、黒人ジャズギター四天王の一人。キング・カーティスのバンドでジミヘンと共演した経歴も持つ。"},
  {r:265, n:"Baden Powell", b:"solo", t:"Valsa De Eurídice", w:"Baden Powell", d:"ブラジル史上最高のギタリスト。ボサノバ、ショーロ、アフロ・サンバを融合した独自のスタイルを持つ。特にソロギターによるバラードでの絶妙な間とスピード感による強弱は、他のどのギタリストにも到達出来ない圧倒的な凄みを感じさせる。"},
  {r:266, n:"Julian Bream", b:"solo", t:"Asturias (Leyenda)", w:"Julian Bream", d:"イギリス出身の20世紀を代表するクラシックギタリスト。ルネサンス以前の音楽の演奏におけるパイオニア的存在。リュートも駆使する多才な音楽家で、同時代のジョン・ウィリアムスとの夢の共演は20世紀を代表するギターデュオ。"},
  {r:267, n:"Narciso Yepes", b:"solo", t:"Jeux interdits (Romance)", w:"Narciso Yepes", d:"スペインのクラシックギタリスト。映画「禁じられた遊び」の主題曲「愛のロマンス」での名演で世界的な名声を確立。10弦ギターを開発した革新者でもあり、クラシックギターの可能性を大きく拡張した。"},
  {r:268, n:"John Sykes", b:"Whitesnake / Blue Murder", t:"Still of the Night", w:"Whitesnake", d:"シン・リジィやホワイトスネイクを経てブルーマーダーを結成。リードギタリスト兼ボーカリスト兼コンポーザーという多彩な才能の持ち主。切れ味鋭いリフと情熱的なソロで愛された\"悲運のギターヒーロー\"。"},
  {r:269, n:"David T. Walker", b:"solo / session", t:"What's Goin' On", w:"David T. Walker", d:"スティービー・ワンダー、マーヴィン・ゲイ、ジャクソン5等、無数の名盤に参加した百戦錬磨の超一流セッションマンで、黒人ジャズギター四天王の一人。甘く歌うようなトーンは一度聴けば忘れられない。日本でも絶大な人気を誇る。"},
  {r:270, n:"Paco de Lucía", b:"solo / Super Guitar Trio", t:"Entre Dos Aguas", w:"Paco de Lucía", d:"フラメンコ史上最高のギタリスト。フラメンコのみならずジャズの世界でも活躍。アル・ディメオラ、ジョン・マクラフリンとのスーパーギタートリオで世界のギター小僧たちを虜にし、一大センセーションを巻き起こした。"},
  {r:271, n:"Andrés Segovia", b:"solo", t:"Bach: Chaconne (BWV 1004)", w:"Andrés Segovia", d:"現代クラシックギター奏法の父。それまでのギターという楽器の立ち位置を、ピアノやヴァイオリンのようにコンサートホールで演奏する芸術性の高い独奏楽器へと引き上げた最大の功労者の一人。"},
  {r:272, n:"Ronnie Earl", b:"solo / Roomful of Blues", t:"Blues For The West Side", w:"Ronnie Earl", d:"Roomful of Bluesを経てRonnie Earl & The Broadcastersを率いるブルースギタリスト。Blues Music Award最優秀ギタリスト賞を4度受賞。バークリー音楽院元教員でもあり、ストラトから紡ぎ出される豊かなトーンと感情表現で絶大な評価を受ける名手。"},
  {r:273, n:"Earl Hooker", b:"solo", t:"Earl Hooker Blues", w:"Earl Hooker", d:"シカゴ・ブルース屈指のスライドギター名手で、B.B.キングが「スライドでは誰にも負けない。唯一無二だった」と絶賛した伝説。John Lee Hookerの従弟。40歳で結核で早逝したが「Blue Guitar」は後にMuddyの「You Shook Me」の原型となった。"},
  {r:274, n:"Son House", b:"solo", t:"Death Letter Blues", w:"Son House", d:"デルタブルースの巨人の一人。説教師として生きつつブルースに身を投じた強烈な人生の持ち主で、Robert JohnsonとMuddy Watersに直接的な影響を与えた。1965年に再発見され「Death Letter」の名演で新世代のブルース・ファンを魅了した。"},
  {r:275, n:"Jimmie Vaughan", b:"The Fabulous Thunderbirds / solo", t:"Six Strings Down", w:"Jimmie Vaughan", d:"スティービー・レイ・ヴォーンの実兄でテキサス・ブルース界の重鎮。The Fabulous Thunderbirdsの創設メンバーとして70-80年代のブルース復興を牽引。無駄を削ぎ落とした簡潔で歌うようなプレイは多くの後進ギタリストの手本となっている。"},
  {r:276, n:"Lonnie Johnson", b:"solo", t:"Tomorrow Night", w:"Lonnie Johnson", d:"ギターを独奏楽器として確立した現代ブルースギターの原点。T-Bone Walker、Charlie Christian、B.B. Kingら電化ブルース/ジャズの父たちが全員影響を受けたと公言する最重要人物。Louis ArmstrongやDuke Ellingtonとも共演した。"},
  {r:277, n:"Duke Robillard", b:"Roomful of Blues / solo", t:"Stomp The Blues Tonight", w:"Duke Robillard", d:"Roomful of Bluesの創設者にして、Jimmie Vaughan脱退後のFabulous Thunderbirdsにも参加。スイング、ジャンプ・ブルース、ジャズ、スタンダードまで自在に弾きこなす。W.C.ハンディ賞最優秀ギタリスト4回受賞の「ギタリストのためのギタリスト」。"},
  {r:278, n:"Clarence \"Gatemouth\" Brown", b:"solo", t:"Okie Dokie Stomp", w:"Clarence \"Gatemouth\" Brown", d:"ブルース、カントリー、ジャズ、R&B、ケイジャンなど枠に収まらない多彩なテキサス出身のギタリスト兼マルチ演奏家。1954年のインストゥルメンタル「Okie Dokie Stomp」はテキサス・ブルース史上屈指の名曲として広く愛される。"},
  {r:279, n:"Blind Lemon Jefferson", b:"solo", t:"See That My Grave Is Kept Clean", w:"Blind Lemon Jefferson", d:"\"テキサス・ブルースの父\"と称されるプリ・ウォー期の巨人。高音の特徴的な歌声と独創的なギター・スタイルで1920年代の商業的ブルースを切り開いた先駆者。「Matchbox Blues」はロックの殿堂「ロックンロールを形作った500曲」にも選出されている。"},
  {r:280, n:"Charley Patton", b:"solo", t:"Pony Blues", w:"Charley Patton", d:"\"デルタブルースの父\"。Son HouseやRobert Johnsonに直接的な影響を与えた最重要人物。小柄な体から500ヤード届くと言われる迫力の声、力強いギター、派手なステージパフォーマンスで後のロック・ショーマンシップの原型も作った伝説。"},
  {r:281, n:"Mississippi John Hurt", b:"solo", t:"Candy Man", w:"Mississippi John Hurt", d:"デルタの激しさとは対極にある、穏やかで流麗なフィンガーピッキングが魅力の唯一無二のスタイル。1928年にOkehで録音したが長らく忘れられ、1960年代のフォークブルース復興で再発見。晩年の録音が世代を超えて愛される名手となった。"},
  {r:282, n:"Son Seals", b:"solo", t:"Hot Sauce (Live)", w:"Son Seals", d:"アリゲーター・レコーズを代表するシカゴ・ブルースの闘将。唸るようなボーカルと鋭く切り込むギターで、70-80年代の現代シカゴ・ブルースを牽引した。W.C.ハンディ賞を複数受賞し、2009年にはブルースの殿堂入り。"},
  {r:283, n:"Robert Nighthawk", b:"solo", t:"Black Angel Blues", w:"Robert Nighthawk", d:"澄み切った粒立ちの良いスライドで知られるシカゴ・ブルースの隠れた名手。Elmore James、Muddy Waters、Earl Hooker、B.B. Kingといった後続の巨人たちに影響を与えた。1949年のAristocrat盤はB.B. Kingの「Sweet Little Angel」の原型となった。"},
  {r:284, n:"Magic Sam", b:"solo", t:"All Your Love", w:"Magic Sam", d:"Otis RushやBuddy Guyと並ぶウエスト・サイド・サウンドの創始者の一人。1957年「All Your Love」で若くして頭角を現し、独特のトレモロと高音ボーカル、ゴスペル色の強いスタイルで衝撃を与えたが、32歳で夭折した早世の天才。"},
  {r:285, n:"Luther Allison", b:"solo", t:"Cherry Red Wine", w:"Luther Allison", d:"シカゴ・ブルース界から長年欧州を拠点に活動し、晩年にアリゲーターから復活作を出したブルース史屈指のリバイバル・ストーリーの持ち主。「Cherry Red Wine」はアルコール中毒の親友への哀悼歌として、聴く者の胸を締めつける名曲。"},
  {r:286, n:"Mississippi Fred McDowell", b:"solo", t:"Shake 'Em on Down", w:"Mississippi Fred McDowell", d:"ノース・ミシシッピ・ヒル・カントリー・ブルースの代表的スライド奏者。「You Gotta Move」はRolling Stonesの「Sticky Fingers」でカバーされ世界に広まった。\"I do not play no rock and roll\"と言いつつ、そのグルーヴは現代のルーツ音楽の礎となった。"},
  {r:287, n:"Jimmy Thackery", b:"solo / The Nighthawks", t:"Drive to Survive", w:"Jimmy Thackery", d:"ワシントンDCのブルースロック・バンドThe Nighthawksで20年活躍後、Jimmy Thackery and the Driversを結成してソロとして成功。重厚なトーンと力強いブルース・ロック・ドライヴで根強い人気を誇る職人肌のギタリスト。"},
  {r:288, n:"Lonnie Brooks", b:"solo", t:"Voodoo Daddy", w:"Lonnie Brooks", d:"ルイジアナ出身のバイユー・ブギーマン。Guitar Juniorの名でキャリアを始め、シカゴのアリゲーター移籍後に\"ヴードゥー・ブルース\"サウンドで開花。テキサスのスイング、メンフィスのソウル、シカゴのブルースを融合した独自のガンボを生み出した。"},
  {r:289, n:"Lightnin' Hopkins", b:"solo", t:"Mojo Hand", w:"Lightnin' Hopkins", d:"テキサス・カントリー・ブルースを代表する吟遊詩人。何十枚ものアルバムを気の向くままに録音した伝説的な多作家で、即興的な歌詞とループするようなギターリフの魅力は唯一無二。Stevie Ray Vaughanら後進への影響も計り知れない。"},
  {r:290, n:"Earl King", b:"solo", t:"Trick Bag", w:"Earl King", d:"ニューオリンズR&Bの重要人物。「Come On」はJimi Hendrixが、「Trick Bag」はThe Metersがカバーし、「Big Chief」はProfessor Longhairの名演で知られる。ギタリスト、ヴォーカリスト、作曲家、プロデューサーとして多方面で才能を発揮した。"},
  {r:291, n:"Blind Willie Johnson", b:"solo", t:"John the Revelator", w:"Blind Willie Johnson", d:"ゴスペル・ブルースの最高峰。瞑想的なスライドギターと胸の底から響く唸りのような歌声は、Eric Clapton、Led Zeppelin、Bob Dylan、Jack White等、数え切れないミュージシャンに影響を与えた。「Dark Was the Night」はボイジャー探査機に積まれ宇宙へ旅立った。"},
  {r:292, n:"Johnny Copeland", b:"solo", t:"Copeland Special", w:"Johnny Copeland", d:"\"テキサス・ツイスター\"の異名を持つ豪快なギタリスト兼シンガー。T-Bone Walker譲りの伝統を受け継ぎつつ、力強いゴスペル調のボーカルで独自の境地を築いた。Albert Collins、Robert Crayとの「Showdown!」でグラミー賞受賞。娘は歌手のShemekia Copeland。"},
  {r:293, n:"Big Bill Broonzy", b:"solo", t:"Key to the Highway", w:"Big Bill Broonzy", d:"プリ・ウォー・ブルースから戦後シカゴ・ブルースへの橋渡しを担った最重要人物の一人。300曲以上の作品を残し、「Key to the Highway」はEric Claptonを始め無数のミュージシャンに愛される永遠のブルース・スタンダード。Muddy Watersの恩人でもある。"},
  {r:294, n:"Kim Simmonds", b:"Savoy Brown", t:"Tell Mama", w:"Savoy Brown", d:"ウェールズ出身のブリティッシュ・ブルース・ロックの先駆者。1965年にSavoy Brownを結成し、「Street Corner Talking」「Hellbound Train」など70年代初頭の名作でアメリカ中心に成功。Foghatを輩出した母体でもある。2022年死去まで演奏を続けた。"},
  {r:295, n:"Elvin Bishop", b:"solo / Paul Butterfield Blues Band", t:"Fooled Around And Fell In Love", w:"Elvin Bishop", d:"Paul Butterfield Blues Bandの創設メンバーでブルースロックの開拓者。ソロでの「Fooled Around and Fell in Love」は全米3位の大ヒットで、映画「ガーディアンズ・オブ・ギャラクシー」でも使用された。ロックの殿堂入りも果たしている。"},
  {r:296, n:"Walter Trout", b:"solo / Canned Heat / Bluesbreakers", t:"Say Goodbye To The Blues", w:"Walter Trout", d:"John Lee HookerやPercy Mayfieldのサイドマンを経て、Canned Heat、John Mayall's Bluesbreakersで活躍後にソロへ。2014年に肝臓移植という生死の淵から奇跡の復活を遂げた現代のブルース・ギター・ヒーロー。熱いプレイで世界中のファンを魅了する。"},
  {r:297, n:"Roy Rogers", b:"solo / The Delta Rhythm Kings", t:"Walkin' Blues", w:"Roy Rogers", d:"現代屈指のスライドギター名手の一人。John Lee Hookerの「The Healer」(グラミー受賞)をプロデュースした名プロデューサーでもあり、計8回のグラミー・ノミネートを受けている。ソロ活動とThe Delta Rhythm Kingsを率いた力強い演奏で知られる。"},
  {r:298, n:"Guitar Slim", b:"solo", t:"The Things That I Used To Do", w:"Guitar Slim", d:"1954年の大ヒット「The Things That I Used to Do」でR&Bチャート1位を6週維持した伝説。Ray Charlesがピアノと編曲を担当。Jimi Hendrixより10年早く歪ませたギターの音で表現したロックンロール史の革新者。32歳で早逝。"},
  {r:299, n:"Sonny Landreth", b:"solo / The Delta Rhythm Kings", t:"Congo Square", w:"Sonny Landreth", d:"ルイジアナ発\"スライデコ王\"。スライドの裏側でコードを押さえながら演奏する驚異のテクニックで知られる。Eric Claptonが「世界で最も進歩した、最も過小評価されているギタリストの一人」と絶賛。ザイデコ、ブルース、ロックを融合した独自のスタイル。"},
  {r:300, n:"Robert Jr. Lockwood", b:"solo", t:"Steady Rollin' Man", w:"Robert Jr. Lockwood", d:"Robert Johnsonから直接ギターを教わった唯一の存在で、その義理の息子。Charlie ChristianやT-Bone Walkerの影響も受け、50年代にはMuddy WatersやLittle Walterら名盤のセッションで活躍。Johnsonの遺産を最も誠実に伝えた橋渡し役。"},
  {r:301, n:"Isaiah Sharkey", b:"solo / D'Angelo / John Mayer", t:"It's A Shame", w:"Isaiah Sharkey", d:"シカゴ出身の現代ネオソウル界の至宝。14歳で地元ジャズクラブで演奏を始め、D'Angeloの「Black Messiah」でVanguardの中核メンバーとしてグラミー受賞。2016年からはJohn Mayerのサポートも務める。流麗なプレイと歌うようなフレージングで絶大な評価を得る。"},
  {r:302, n:"Spanky Alford", b:"D'Angelo / The RH Factor / solo", t:"Untitled (How Does It Feel)", w:"D'Angelo", d:"ネオソウル・ギターの祖と呼ばれる伝説。D'AngeloのVoodooツアーバンドThe Soultronicsの中核を担い、Raphael SaadiqやIsaiah Sharkeyにギターを教えた恩師でもある。ゴスペルとジャズのハーモニーを融合したコード感がネオソウル・ギターの基礎を築いた。2008年死去。"},
  {r:303, n:"Jairus Mozee", b:"solo / Anderson .Paak / Prince", t:"Daydreaming", w:"NxWorries", d:"4度グラミー受賞のプロデューサー兼ギタリスト。高校3年時にPrinceのLAハウスバンドに抜擢された早熟の天才で、Anderson .Paak、Kendrick Lamar、Janet Jacksonなど錚々たるアーティストと仕事を重ねる。オルタネート、ハイブリッド、スイープを自在に操る高度な技巧が身上。"},
  {r:304, n:"Tom Misch", b:"solo", t:"It Runs Through Me (feat. De La Soul)", w:"Tom Misch", d:"ロンドン発のマルチ楽器奏者兼プロデューサー。自室から発信したSoundCloudから世界的な人気を得たシンガーソングライター型ギタリスト。John Mayerの影響を感じさせつつ、ディスコ、ジャズ、ヒップホップを溶け込ませた独自のチル・ネオソウルを確立。Yussef Dayesとのコラボ作品も高く評価される。"},
  {r:305, n:"Melanie Faye", b:"solo", t:"It's A Moot Point", w:"Melanie Faye", d:"ナッシュビル出身のシンガーギタリスト。2017年SZAがInstagramに投稿された彼女のプレイ動画をリツイートしたことから一躍スターダムに。Jimi Hendrix、Michael Jackson、Eric Galeに影響を受けたR&B、ネオソウル、ファンクを横断する感性と歌心あるソロで知られる。"},
  {r:306, n:"Kerry \"2 Smooth\" Marshall", b:"solo / session", t:"R&B Guitar Playing", w:"Kerry Marshall", d:"アラバマ出身で現LA拠点のR&Bギタリスト兼教育者。陸軍イラク派遣中のタレントショーで実力を開花。オンラインギタースクール「Kerry's Kamp」の創設者でもあり、Jason Derulo、Tori Kelly、Ledisiらとのツアーを経験。確かなゴスペル由来の理論と感性で絶大な支持を得る。"},
  {r:307, n:"Erick Walls", b:"solo / Beyoncé / Black Waat3r", t:"All Blues Guitar Solo", w:"Erick Walls", d:"Beyoncé「Lemonade」とJohn Legend「Bigger Love」でグラミー受賞の現代R&Bシーンの屋台骨。Michael Jackson、Alicia Keys、Rihanna等の錚々たるセッションで活躍。ゴスペルルーツを持ち、親指ピックによる独特のパーカッシブな奏法が魅力。ロックバンドBlack Waat3rのメンバーでもある。"},
  {r:308, n:"Cory Wong", b:"solo / Vulfpeck / The Fearless Flyers", t:"Meditation", w:"Cory Wong & Jon Batiste", d:"Vulfpeckの客演から一躍有名になったミネアポリス発のファンク・ギタリスト。The Fearless Flyersのメンバーとしても活躍し、正確無比なカッティングとグルーヴで知られる。旺盛なソロ活動でも人気を博し、Jon BatisteやDave Kozら多様なアーティストとコラボ。"},
  {r:309, n:"Jubu Smith", b:"Tony! Toni! Toné! / session", t:"Anniversary", w:"Tony! Toni! Toné!", d:"Tony! Toni! Toné!のギタリストで、1993年「Anniversary」や「If I Had No Loot」の伝説的なギターパートを担当。Telecasterから紡ぎ出される\"いなたい\"ファンキーでソウルフルなプレイは、現代のネオソウル・ギタリストたちに多大な影響を与え続けている。"},
  {r:310, n:"Todd Pritchard", b:"solo", t:"Silent Night (Neosoul Guitar)", w:"Todd Pritchard", d:"繊細な指弾きアレンジで知られるネオソウル・ギタリスト兼プロデューサー。Role Model、Dominic Fike、Alina Baraz等と仕事を重ねる。アコースティックでのネオソウル表現を極め、\"James Taylorがネオソウルを弾いたような\"と評される唯一無二のサウンドを持つ。"},
  {r:311, n:"Mansur Brown", b:"solo / Yussef Kamaal", t:"God Willing", w:"Mansur Brown", d:"ロンドン・ジャズシーンの旗手。Yussef Kamaal「Black Focus」の重要メンバーとして頭角を現し、Kamaal Williams主宰レーベルからデビュー作「Shiroi」を発表。Hendrix風の豪快なソロと浮遊感のあるアンビエントなテクスチャーを融合した独自のスタイルで国際的評価を得る。"},
  {r:312, n:"Kazuki Isogai", b:"solo / SANABAGUN.", t:"Worldwide (feat. JPRK)", w:"edbl & Kazuki Isogai", d:"東京を拠点に世界で活躍する日本のギタリスト/作曲家。2019年NAMM SHOW出演を機に海外展開、ロンドンのedblとのコラボアルバム「The edbl x Kazuki Sessions」は400万ストリームを記録。ミニマルで洗練されたフレーズはSNSで高評価。木村カエラ、Def Techのサポートも務める。"},
  {r:313, n:"Beau Diakowicz", b:"solo", t:"Walking on My Toes", w:"Beau Diako", d:"ジャズ・フュージョン的なアプローチをネオソウルに落とし込む若き天才。Beau Diakoの名で活動し、Jordan Rakei、Noah Slee、Masegoらと共演。ハイブリッドピッキングとジャズ・コードを駆使した夢幻的で流麗なプレイで、ネオソウル・ギター界で絶大な存在感を示す。"},
  {r:314, n:"Ruben Wan", b:"solo", t:"Rose", w:"Ruben Wan", d:"パナマ出身、現LA拠点のギタリスト兼プロデューサー。R&B、ゴスペル、ジャズロック・フュージョンを融合した独自のスタイルで、George Benson的クロマチシズムとJohn Mayer的ソウルフルなリックを併せ持つ。キャッチーなリフと独自のボイシングでモダンなネオソウルを牽引。"},
  {r:315, n:"Mark Lettieri", b:"Snarky Puppy / The Fearless Flyers / solo", t:"Naptime", w:"Mark Lettieri", d:"Snarky Puppyのギタリストとして3度のグラミー受賞。Vulfpeck派生のThe Fearless Flyersでも活躍。「Deep: The Baritone Sessions, Vol.2」はグラミーにもノミネートされた。R&B、ファンク、ロック、フュージョンを自在に行き来する抜群の多様性が魅力の名手。"},
  {r:316, n:"Justus West", b:"solo / Mac Miller / John Mayer", t:"Best Practice Guitar", w:"Justus West", d:"カンザスシティ出身の3度のグラミー受賞者(John Legend、Beyoncé「Cowboy Carter」他)。Mac MillerのTiny Desk Performanceで広く知られ、Ariana Grande、Alicia Keys等のセッションでも活躍。John Mayerが\"お気に入り\"と称賛するゴスペル・チョップスの使い手。"},
  {r:317, n:"Nii Quaye", b:"solo / Musical Lunatics", t:"Remember Me (feat. GoodGirl LA & Sister Deborah)", w:"NiiQuaye", d:"ガーナ・アクラ出身のマルチ楽器奏者兼プロデューサー。Musical Luniticsバンドを率いる実力派で、Cina Soul、MzVee、Kidi等をサポート。2020年のアルバム「Atomic Muse」でハイライフ、アフロビート、ジャズ、ソウルを融合した独自のサウンドを提示。パーカッシブなギターアプローチが特徴。"},
  {r:318, n:"Nile Rodgers", b:"Chic / solo / producer", t:"Good Times", w:"Chic", d:"Chicのリーダーにして史上最も成功したギタリストの一人。Bernard Edwardsと共に築いたミニマルで抜群のグルーヴを持つカッティングは、Hip-Hop(Rapper's Delight)からMadonna、Daft Punk「Get Lucky」まで数世代の音楽を定義。\"Hitmaker\"Stratocasterは世界で最も聴かれたギター音色。"},
  {r:319, n:"Leo Nocentelli", b:"The Meters / session", t:"Cissy Strut", w:"The Meters", d:"ニューオーリンズ・ファンクの父The Metersのギタリスト。独特の\"溜め\"と遅延するシンコペーション、スカンクなシングルノート・リフで新しいグルーヴ言語を発明。Cissy StrutやLook-Ka Py Pyは現代ファンクの設計図となり、Red Hot Chili PeppersからJam Bandsまで絶大な影響を与え続ける。"},
  {r:320, n:"Freddie Stone", b:"Sly & The Family Stone", t:"Thank You (Falettinme Be Mice Elf Agin)", w:"Sly & The Family Stone", d:"Sly & The Family Stoneのリードギタリスト、Sly Stoneの実弟。ロック、ゴスペル、サイケデリアをファンクに持ち込み「Thank You」「I Want to Take You Higher」等のクラシックで狂騒的なグルーヴを生み出した。PrinceやRed Hot Chili Peppersらへの影響は計り知れない。"},
  {r:321, n:"Al McKay", b:"Earth, Wind & Fire", t:"September", w:"Earth, Wind & Fire", d:"Earth, Wind & Fireのリードギタリスト、「September」「Sing a Song」「Shining Star」などの共作者。完璧なタイミングで刻まれる16分カッティングは世界中のミュージシャンの教科書となり、彼のリズムパターンはディスコ/R&Bの標準的なフィールを確立した。"},
  {r:322, n:"Catfish Collins", b:"James Brown / Bootsy's Rubber Band", t:"Stretchin' Out (In a Rubber Band)", w:"Bootsy Collins", d:"弟Bootsy Collinsと共にJames BrownのバンドJ.B.'sに参加、後期JBサウンドを決定づけた伝説。「Get Up (I Feel Like Being a) Sex Machine」等の伝説的セッションを経て、Bootsy's Rubber BandではタイトでミニマルなカッティングでP-Funkの中核を支えた。2010年死去。"},
  {r:323, n:"Gary Shider", b:"Parliament-Funkadelic", t:"One Nation Under a Groove", w:"Funkadelic", d:"P-Funkの「Diaper Man」として知られる象徴的存在。おむつ一枚のステージ衣装と、歌心ある暖かなギターとリードボーカルで\"One Nation Under a Groove\"共作者となり、Parliament-FunkadelicのRock & Roll Hall of Fame入りに大きく貢献。2010年死去。"},
  {r:324, n:"Michael Hampton", b:"Parliament-Funkadelic", t:"(Not Just) Knee Deep", w:"Funkadelic", d:"P-Funk \"Kidd Funkadelic\"、Eddie Hazelの後継として17歳で加入した超絶技巧の天才。「Maggot Brain」を完璧に再現できる唯一の人物として伝説に。「(Not Just) Knee Deep」の狂気的なギターソロや「Flash Light」等でファンクにハードロック的な熱量をもたらした。"},
  {r:325, n:"Blackbyrd McKnight", b:"The Headhunters / P-Funk / RHCP", t:"God Make Me Funky", w:"The Headhunters", d:"Herbie Hancockの Headhunters、George ClintonのP-Funk双方で活躍した稀有なジャズ/ファンク両刀の達人。Miles DavisやRed Hot Chili Peppersとも共演、1980-2008年までP-Funkの音楽監督を務めた。メロディックでありながら攻撃的なソロが持ち味で2019年グラミー生涯功労賞を受賞。"},
  {r:326, n:"Wah Wah Watson", b:"Motown / Herbie Hancock / solo", t:"Hang Up Your Hang Ups", w:"Herbie Hancock", d:"本名Melvin Ragin、その異名通りワウペダルの達人。Motownの看板セッションプレーヤーとしてMarvin GayeやTemptationsで活躍、Herbie Hancockの「Man-Child」ではジャズ・ファンクの歴史的名演を残した。独自のソロ作「Elementary」も後世に絶大な影響を与えた名盤。2018年死去。"},
  {r:327, n:"Ray Parker Jr.", b:"Raydio / session", t:"A Woman Needs Love (Just Like You Do)", w:"Ray Parker Jr. & Raydio", d:"「Ghostbusters」で広く知られるが、本来は超一流のファンク・セッションマン兼シンガーソングライター。Stevie Wonder、Barry White、Herbie Hancockらと仕事を重ねた後、Raydioとして「Jack and Jill」「A Woman Needs Love」等のR&Bヒットを連発。歌心あるプレイが身上。"},
  {r:328, n:"Paul Jackson Jr.", b:"session / Daft Punk / Michael Jackson", t:"Get Lucky (Daft Punk)", w:"Daft Punk feat. Pharrell Williams & Nile Rodgers", d:"世界で最も録音されたギタリストの一人。Michael Jacksonの「Thriller」「Bad」「Dangerous」「HIStory」全てに参加、Daft Punk「Get Lucky」でグラミー受賞。クリーンでタイトな極上のリズムプレイとジャズ・フュージョンの素養を併せ持つ現代セッション王者。"},
  {r:329, n:"Ernie Isley", b:"The Isley Brothers", t:"That Lady, Pts. 1 & 2", w:"The Isley Brothers", d:"Isley Brothers末弟のリードギタリスト。実家に居候していたJimi Hendrixから直接影響を受け、「That Lady」の伝説的なファズ+フェイザー・ソロや「Who's That Lady」等でファンクのリズムとヘンドリックス直系の爆音リードを同居させる稀有なスタイルを確立。"},
  {r:330, n:"Johnny \"Guitar\" Watson", b:"solo", t:"A Real Mother For Ya", w:"Johnny Guitar Watson", d:"50年代にブルース・ギタリストとして活動開始、70年代にファンクへ華麗に転向。独特の鋭いタッチと歌心あるフレージング、ユーモア溢れるスタイルで「A Real Mother For Ya」「Ain't That a Bitch」等をヒットさせ、Frank Zappaや後のヒップホップ世代にも多大な影響を与えた。1996年死去。"},
  {r:331, n:"Tony Maiden", b:"Rufus & Chaka Khan", t:"Tell Me Something Good", w:"Rufus & Chaka Khan", d:"Rufus & Chaka Khanのギタリスト兼共同プロデューサー。「Tell Me Something Good」では初期のトークボックス使用でヒットを決定づけ、「Sweet Thing」「Ain't Nobody」などのファンキーでパーカッシブなカッティングは多くのフォロワーを生んだ。Princeも憧れた名手。"},
  {r:332, n:"Charles \"Skip\" Pitts", b:"Isaac Hayes / The Bo-Keys", t:"Theme From Shaft", w:"Isaac Hayes", d:"Isaac Hayes「Theme from Shaft」(1971)の、あの象徴的なワウ・ペダル・リフを弾いた男。Wilson Pickettのバンド、The Isley Brothersのツアーも経験、後期The Bo-Keysでも活躍。たった一つのリフで映画史・音楽史に永遠に名を刻んだ存在。2012年死去。"},
  {r:333, n:"Bruce Conte", b:"Tower of Power", t:"What Is Hip?", w:"Tower of Power", d:"Tower of Powerの黄金期(1973-79)を支えたギタリスト。「What Is Hip?」「So Very Hard to Go」等、16ビート・ファンクの頂点とも言える緻密なグルーヴを構築。Rocco Prestia(b)とDavid Garibaldi(dr)との鉄壁のリズムセクションの一翼を担った。"},
  {r:334, n:"George Johnson", b:"The Brothers Johnson", t:"Strawberry Letter 23", w:"The Brothers Johnson", d:"弟Louis JohnsonのスラップベースとQuincy Jonesのプロデュースで一世を風靡したBrothers Johnsonのギタリスト。Shuggie Otis原曲の「Strawberry Letter 23」の夢幻的なイントロソロや「Stomp!」「I'll Be Good to You」等で強烈なグルーヴを刻んだ。"},
  {r:335, n:"Mark Speer", b:"Khruangbin", t:"Maria También", w:"Khruangbin", d:"ヒューストン発のトリオKhruangbinのギタリスト。タイ、イラン、中東、西アフリカ等のワールド・グルーヴを現代のチル・ファンクに溶け込ませる独自のスタイルを確立。Telecasterの低いトーンと極小のフレーズ数で最大限のムードを作り出す、現代屈指のミニマリスト。"},
  {r:336, n:"Eric Krasno", b:"Soulive / Lettuce / producer", t:"Turn It Out", w:"Soulive", d:"Soulive、Lettuceの中核メンバーとして現代ジャム/ファンクシーンを牽引。ジャズの素養を活かした流麗なリード、ソウルとR&Bの深い理解に基づくリズムワークを併せ持つ。D'Angelo、The Roots等のプロデュース/セッションも手がけ、TEDEschi Trucks Band等でも活躍。"},
  {r:337, n:"Rob Harris", b:"Jamiroquai", t:"Little L", w:"Jamiroquai", d:"2000年からJamiroquaiを支えるイギリス出身のギタリスト。Simon Katz後任として加入し「A Funk Odyssey」以降の全作に参加、「Little L」「Love Foolosophy」等で洗練されたアシッド・ジャズ/ファンク・ディスコのグルーヴを構築。現代UKファンクシーンの体現者。"},
  {r:338, n:"寺内タケシ", b:"Takeshi Terauchi & Bunnys / solo", t:"羅生門", w:"Takeshi Terauchi", d:"「エレキの神様」と呼ばれた日本のインスト・ロック草分け。1960年代から活動、民謡や歌舞伎の旋律をエレキで表現する独自のスタイルを確立。「運命」「津軽じょんがら節」などベンチャーズ以降の日本エレキ史における最重要人物。"},
  {r:339, n:"加山雄三", b:"加山雄三 / The Launchers", t:"Black Sand Beach", w:"Kayama Yuzo", d:"1960年代の若大将映画で絶大な人気を博した俳優・シンガー・ギタリスト。モズライトを愛用しThe Launchersを率いて演奏、「夜空の星」「君といつまでも」はじめエレキインストの名手として活動。日本エレキブーム黎明期の象徴的存在。"},
  {r:340, n:"竹田和夫", b:"Creation / Blues Creation", t:"Lonely Heart", w:"Creation", d:"Blues Creation〜Creationを率いた日本ロック黎明期の代表的ブルース系ギタリスト。BB King共演ツアーでも知られ、重く歌うロングトーンとブルースの血を通わせたリードプレイで数多のフォロワーに影響を与えた国産ハードロックの先駆者。"},
  {r:341, n:"成毛滋", b:"Flied Egg / strawberry path", t:"Rolling Down The Broadway", w:"Flied Egg", d:"1970年前後のニューロックを切り拓いた先鋭的ギタリスト。Flied Egg、strawberry pathでジャズ・ブルース・プログレを融合したテクニカルな演奏を展開、チャー達にも影響。「日本ロックの教科書」と称されるプレイヤー。"},
  {r:342, n:"高中正義", b:"高中正義 / Sadistic Mika Band", t:"Blue Lagoon", w:"Takanaka Masayoshi", d:"サディスティック・ミカ・バンドを経てソロ活動、リゾート感あふれるメロディックなフュージョン・インストを確立。「Blue Lagoon」「Ready To Fly」等の名曲を残し、カラフルなペインテッド・ストラトと官能的なトーンで日本フュージョン黄金期を築いた。"},
  {r:343, n:"渡辺香津美", b:"Kazumi Watanabe / KYLYN", t:"Lonesome Cat", w:"Kazumi Watanabe", d:"日本ジャズ・フュージョン界を代表する世界的ギタリスト。YMO「Public Pressure」ツアー参加、KYLYN、TOCHIKA、「Spice of Life」などで国内外から高評価を獲得。超絶技巧と抒情性を両立するスタイルで、海外ミュージシャンからも敬愛される存在。"},
  {r:344, n:"Char", b:"Char / Pink Cloud / SMOKY MEDICINE", t:"気絶するほど悩ましい", w:"Char", d:"1970年代からトップ・ギタリストとして第一線で活躍する日本ロック界の伝説。ブルース、R&B、ファンクを基盤に歌心あふれるトーンとフレージングで世代を超えて愛される。ストラトキャスター使いの名手としても知られ、多くの後進に影響を与え続ける。"},
  {r:345, n:"仲井戸麗市", b:"RCサクセション / 仲井戸\"CHABO\"麗市", t:"雨あがりの夜空に", w:"RC Succession", d:"忌野清志郎の盟友としてRCサクセションを牽引した日本ロック史に残るギタリスト。「雨あがりの夜空に」「スローバラード」でのブルージーでソウルフルなバッキングとソロは、歌との掛け合いのお手本。CHABOの愛称で親しまれるロックの良心。"},
  {r:346, n:"鮎川誠", b:"Sheena & The Rokkets", t:"You May Dream", w:"Sheena & The Rokkets", d:"シーナ&ロケッツを率いた日本パンク/ロックンロールの巨人。「You May Dream」はYMO細野晴臣プロデュースで日本ニュー・ウェイヴ史の名曲となった。シンプルで骨太なリフとストレートなロック魂で、後世のバンドシーンに絶大な影響を残した。"},
  {r:347, n:"森園勝敏", b:"四人囃子 / PRISM", t:"空と雲", w:"Yonin Bayashi", d:"日本プログレ最高峰と評される四人囃子の初代ギタリスト。「一触即発」「空と雲」で繊細かつ緻密なフレージングを展開、脱退後はPRISMでフュージョンを探求。知的な音楽性と高度な演奏力で同世代ギタリストから別格視される存在。"},
  {r:348, n:"松本孝弘", b:"B'z", t:"ultra soul", w:"B'z", d:"B'z のリーダーとして日本国内音楽売上歴代1位を誇るロック・ギタリスト。ハードロック/メタルをベースにキャッチーなリフを量産、ギブソンのシグネチャーモデルでも知られる。インストソロ「Thousand Wave」等、インストプレイヤーとしての評価も高い。"},
  {r:349, n:"布袋寅泰", b:"BOØWY / 布袋寅泰 solo", t:"Battle Without Honor Or Humanity", w:"Hotei Tomoyasu", d:"BOØWY のリード・ギタリストを経てソロでも成功、映画『Kill Bill』の「Battle Without Honor Or Humanity」で世界的知名度を獲得。独特のキャラクター塗装のZodiacworks、鋭いリフと歌うトーンで日本ロックシーンを牽引し続けるアイコン。"},
  {r:350, n:"hide", b:"X JAPAN / hide with Spread Beaver", t:"Pink Spider", w:"hide", d:"X JAPAN のリード・ギタリスト、ソロでも「ROCKET DIVE」「Pink Spider」など数多の名曲を残した日本ロック・アイコン。鋭角的なリフ、ポップセンスと前衛性を共存させた独自の音楽性で現在も絶大な影響力を持ち続けている。1998年永眠。"},
  {r:351, n:"Pata", b:"X JAPAN / P.A.F.", t:"Rusty Nail", w:"X JAPAN", d:"X JAPAN のリズム・ギタリストとして加入、Les Paulから繰り出される骨太なバッキングと泣きのソロでバンドの屋台骨を担う。「Rusty Nail」「DAHLIA」で聴ける職人的なアプローチは日本メタル/ヴィジュアル系のスタンダードとなった。"},
  {r:352, n:"SUGIZO", b:"LUNA SEA / X JAPAN / S.O.B.", t:"ROSIER", w:"LUNA SEA", d:"LUNA SEA のギタリスト、ヴァイオリニストとしても活動する多才な音楽家。「ROSIER」「TRUE BLUE」のドラマティックなソロで知られ、2009年からX JAPAN にも参加。スピリチュアルな表現と社会活動を両立するヴィジュアル系のカリスマ。"},
  {r:353, n:"INORAN", b:"LUNA SEA / Tourbillon / solo", t:"TONIGHT", w:"LUNA SEA", d:"LUNA SEA のリズム・ギタリスト。作曲面での貢献が大きく「TONIGHT」「IN SILENCE」など多くの名曲を手掛けた。歌うような繊細なアルペジオとテクスチャーで、SUGIZOと対を成すバンドサウンドの基盤を築き上げるアーティスト。"},
  {r:354, n:"DAITA", b:"SIAM SHADE / Breaking Arrows", t:"1/3の純情な感情", w:"SIAM SHADE", d:"SIAM SHADE のギタリストとして「1/3の純情な感情」等のヒットを生み、超絶技巧と歌心を両立するスタイルで高評価を得た。バンド解散後もBreaking Arrows、ソロなど多方面で活動、現在も日本ハードロックの技巧派として第一線に立つ。"},
  {r:355, n:"Ken", b:"L'Arc-en-Ciel / SONS OF ALL PUSSYS", t:"Driver's High", w:"L'Arc-en-Ciel", d:"L'Arc-en-Cielのリード・ギタリスト、作曲家。「Driver's High」「HONEY」などバンドの代表曲を多数手掛ける。ポップセンスと泣きのメロディ、豊富な機材知識を活かした多彩なサウンドメイクで日本ロックシーンに不可欠な存在となっている。"},
  {r:356, n:"HISASHI", b:"GLAY", t:"SURVIVAL", w:"GLAY", d:"GLAYのリード・ギタリスト。「SURVIVAL」「HOWEVER」「口唇」等のメロディアスなリフと泣きのソロでバンドのサウンドを決定づけた。幅広い機材知識とポップセンスを融合させた職人的プレイで、日本ロック史に確固たる地位を築いた存在。"},
  {r:357, n:"浅井健一", b:"BLANKEY JET CITY / SHERBETS", t:"Bang!", w:"BLANKEY JET CITY", d:"BLANKEY JET CITYを率いた日本オルタナティヴ・ロックの象徴的ギタリスト/ヴォーカリスト。グレッチから繰り出されるエッジの効いたトーンと独自の詩世界で90年代を疾走。ベンジーの愛称で親しまれ、現在もSHERBETS、AJICO等で活動継続中。"},
  {r:358, n:"高崎晃", b:"LOUDNESS", t:"CRAZY NIGHTS", w:"LOUDNESS", d:"LOUDNESS のリーダーとして1980年代に全米チャートインを果たし、日本メタルを世界に届けた伝説的ギタリスト。東洋的フレージングとネオクラシカルな速弾きを融合した独自のスタイルは世界のメタル・ギタリストから尊敬を集める。"},
  {r:359, n:"MIYAVI", b:"MIYAVI solo / Dué le quartz", t:"What's My Name?", w:"MIYAVI", d:"「サムライ・ギタリスト」を掲げ世界規模で活動するソロ・ギタリスト/アーティスト。ピック不使用のスラップ奏法を駆使した独自のパーカッシブなプレイで知られ、海外ツアー、映画出演、UNHCR親善大使など音楽の枠を超えて活躍している。"},
  {r:360, n:"藤岡幹大", b:"TRICK BOX / BABYMETAL神バンド", t:"HARMONYx", w:"Trick Box", d:"超絶技巧と豊かな音楽性を兼ね備えた日本を代表する技巧派ギタリスト。TRICK BOX、BABYMETAL神バンドでのプレイで知られ、テクニカルかつ歌心あるソロで後進から絶大な敬意を集めた。2018年に若くして急逝、多くのミュージシャンが惜しんだ。"},
  {r:361, n:"大村孝佳", b:"BABYMETAL神バンド / Marty Friedman band", t:"Soldiers Of The Fire", w:"Takayoshi Ohmura", d:"BABYMETAL神バンドでのプレイで国内外に知られる超絶技巧派ギタリスト。Marty Friedmanバンドにも参加、ネオクラシカルなアプローチとモダンメタルのテクニックを融合した高速フレーズで世界中のプレイヤーを魅了するモダン・シュレッダー。"},
  {r:362, n:"Leda", b:"DELUHI / Far East Dizain / Galneryus", t:"REVOLVER BLAST", w:"DELUHI", d:"DELUHI、UNDIVIDE、Far East Dizainを率いたヴィジュアル系メタル/ジェント系の代表的ギタリスト。BABYMETAL神バンドにも参加、シュレッドからジェントまでこなす幅広いテクニックとビジュアル面でのこだわりで海外にも多くのファンを持つ。"},
  {r:363, n:"SYU", b:"GALNERYUS / SPINALCORD", t:"HUNTING FOR YOUR DREAM", w:"GALNERYUS", d:"GALNERYUSのリーダー/ギタリスト、作曲家。日本ネオクラシカル・メタル界の第一人者として超絶技巧とキャッチーなメロディを両立、アニメ「HUNTER×HUNTER」EDの「HUNTING FOR YOUR DREAM」などで幅広い層に支持される存在。"},
  {r:364, n:"AssH", b:"solo / YOASOBIサポート", t:"OMG (Live at イケシブ)", w:"AssH", d:"YOASOBI ライブサポートで知名度を高めた「次世代ギター・ヒーロー」。17歳でギターを開始、アメリカ滞在時にゴスペルやブルースに触発された情感豊かなプレイが持ち味。ソロの「OMG」はiTunesチャート1位、国内外のフェスで活躍する若手注目株。"},
  {r:365, n:"Li-sa-X", b:"Li-sa-X / Li-sa-X BAND", t:"Serendipity", w:"Li-sa-X", d:"8歳でYouTube投稿したRacer X「Scarified」カヴァーで世界的注目を浴びた天才少女ギタリスト。Paul Gilbertに師事、12歳でSony Music Japanよりデビュー。超絶技巧と屈託のない表情で国内外のファンを魅了し続ける若きシュレッダー。"},
  {r:366, n:"ISAO", b:"Trimurti / Cube-Ray / soLi / BABYMETAL神バンド", t:"Golf (CUBE-RAY)", w:"Cube-Ray", d:"7弦・8弦ギターを駆使する「技のデパート」の異名を持つ超絶技巧派。Cube-Ray、Spark7、Trimurtiでのテクニカルなインスト活動、BABYMETAL神バンドや魔界少女拳参加でも知られる。星野沙織とのユニット「soLi」でも幅広い表現を展開。"},
  {r:367, n:"今剛", b:"Studio Cat / PARACHUTE", t:"Ruby No Yubiwa (寺尾聰)", w:"Akira Terao", d:"「ギター仙人」と称される日本随一のスタジオ・ミュージシャン。寺尾聰「ルビーの指環」、宇多田ヒカル「Automatic」等、日本ポップス史の名曲多数に参加。松原正樹とのPARACHUTEでのツインギターは日本ロック史に残る伝説。"},
  {r:368, n:"松原正樹", b:"solo / PARACHUTE", t:"流宇夢サンド", w:"Masaki Matsubara", d:"日本を代表するセッション・ギタリスト。松原みき「真夜中のドア」のソロが世界的シティポップ・リバイバルで再注目された。生涯10,000曲以上のレコーディングに参加、今剛とのPARACHUTEでも活躍。2016年逝去するも、その歌うギターは今も愛される。"},
  {r:369, n:"佐橋佳幸", b:"solo / UGUISS / 山弦", t:"Coltrane's Blue World (w/ P.Gallway)", w:"Yoshiyuki Sahashi", d:"日本トップクラスのセッション・ギタリスト、プロデューサー。松たか子、福山雅治、桑田佳祐、松任谷由実など数多のアーティストのレコーディング/ツアーに参加。タイトかつ歌心あふれるプレイと豊富な音楽的知識で業界内外から絶大な信頼を得ている。"},
  {r:370, n:"西慎嗣", b:"SPECTRUM", t:"F・L・Y", w:"SPECTRUM", d:"1970年代末のフュージョン/ブラスロック・バンドSPECTRUMのギタリスト。「F・L・Y」「In The Space」などで聴ける切れ味鋭いカッティングとメロディアスなソロが持ち味。近年はTikTokで「F・L・Y」が再流行、シティポップ・リバイバルにも貢献。"},
  {r:371, n:"山岸竜之介", b:"LIFE IS GROOVE / solo", t:"I AM GUITAR HERO", w:"Ryunosuke Yamagishi", d:"幼少期『さんまのスーパーからくりTV』でCharとセッションし注目を浴びた天才少年ギタリスト。KenKen、ムッシュかまやつとLIFE IS GROOVEを結成、YOASOBIやEXILE THE SECONDのサポートも務める。Fenderアーティストとしても活動する若手実力派。"},
  {r:372, n:"西川進", b:"SCOOP / solo", t:"幸福論 (椎名林檎)", w:"Sheena Ringo", d:"「感情直結型ギタリスト」を名乗る日本屈指のスタジオ・ミュージシャン。椎名林檎1stアルバムや「God knows...」のギター、いきものがかりのプロデュースなどで知られる。思いきりネックを立てた独特のフォームと、強烈なピッキングが生む熱いトーンが特徴。"},
  {r:373, n:"小倉博和", b:"山弦 / 福山雅治バンド", t:"Sakurazaka 2024 (福山雅治)", w:"Masaharu Fukuyama", d:"佐橋佳幸との「山弦」でも知られる日本トップクラスのセッション・ギタリスト。福山雅治のバンドマスター/音楽監督として長年支え、「桜坂」等の名演を残した。アコースティック/エレクトリック双方で歌心を前面に出す繊細かつ的確なプレイが身上。"},
  {r:374, n:"田中義人", b:"solo / Mondo Grosso", t:"Smells", w:"Yoshito Tanaka", d:"Mondo Grossoへの参加をきっかけに、スガシカオ、ケツメイシ、森山直太朗など多くのアーティストのレコーディング/ライブで活躍するギタリスト/プロデューサー。ヒップホップ色の強いビートセンスと温かいトーンを両立させるネオソウル系の職人。"},
  {r:375, n:"鳥山雄司", b:"solo / 森山良子バンド", t:"STRANGER IN THE MIRROR", w:"Yuji Toriyama", d:"TV番組「世界遺産」テーマ曲「The Song of Life」の作曲者として広く知られる日本フュージョン・シーンの重鎮ギタリスト。1983年のセカンド・ソロから海外でも再注目され、作曲家・アレンジャー・プロデューサーとしても一流の仕事を残す。"},
  {r:376, n:"是方博邦", b:"Korekata Band / Cube-Ray", t:"Korekata (Full Album)", w:"Hirokuni Korekata", d:"1975年上京後、高中正義グループや松岡直也グループで活躍した日本フュージョン/ブルース界の重鎮。Steve Porcaro、Russell Ferrante等海外トップ・ミュージシャンとも共演、ブルースを基盤にした歌うトーンと確かな技術で後進の手本となる存在。"},
  {r:377, n:"向井秀徳", b:"NUMBER GIRL / ZAZEN BOYS", t:"HIMITSU GIRL'S TOP SECRET", w:"ZAZEN BOYS", d:"NUMBER GIRL、ZAZEN BOYSを率いる日本オルタナティヴ・ロックのカリスマ。シェルピンクのJaguarを用いた切れ味鋭いリフ、変拍子と特殊チューニングを駆使したマスロック的アプローチ、独特の日本語詞で圧倒的な存在感を放ち続ける唯一無二の音楽家。"},
  {r:378, n:"長岡亮介", b:"ペトロールズ / 東京事変", t:"雨 (ペトロールズ)", w:"Petrolz", d:"ペトロールズのギタリスト/ヴォーカリスト、東京事変二代目ギタリスト(浮雲名義)としても活動。星野源、平井堅、松たか子など多くのアーティストのレコーディング/ライヴに参加。独特のカントリー/ソウル的フレージングで知られる現代日本トップ・セッション。"},
  {r:379, n:"常田大希", b:"King Gnu / millennium parade", t:"白日", w:"King Gnu", d:"King Gnuのリーダー/ギタリスト/チェリスト/作曲家。「白日」「一途」など大ヒット曲を生み、millennium paradeでも前衛的な音楽性を展開。クラシックからヒップホップまで吸収した幅広い音楽性と独創的なアレンジセンスで日本の音楽シーンを刷新し続ける。"},
  {r:380, n:"小林祐介", b:"THE NOVEMBERS", t:"Rhapsody in beauty", w:"THE NOVEMBERS", d:"シューゲイザー/オルタナティヴ・ロック・バンドTHE NOVEMBERSのフロントマン/ヴォーカル/ギター/ソングライター。轟音ギターと繊細なメロディを両立させる独自の美意識で、日本のオルタナ・シーンにおける重要なアーティストとして評価を確立。"},
  {r:381, n:"山中さわお", b:"the pillows", t:"Funny Bunny", w:"the pillows", d:"the pillowsのフロントマン/ギタリスト/ソングライター。アニメ『FLCL』のサウンドトラックで世界的に知られ、メロディアスなオルタナティヴ・ロックを35年以上展開した。2025年の解散まで一貫して独自のポップセンスを貫き、海外ファンも多数獲得した。"},
  {r:382, n:"真鍋吉明", b:"the pillows", t:"RIDE ON SHOOTING STAR", w:"the pillows", d:"the pillowsのリード・ギタリスト。ジャンプ感のあるパワーコードからジャジーな和声まで幅広くこなし、「RIDE ON SHOOTING STAR」「Funny Bunny」等のアニメ『FLCL』関連曲で海外にもファンを獲得。山中さわおとの絶妙なツインギターで長年バンドを支えた。"},
  {r:383, n:"Rei", b:"Rei / solo", t:"Lonely Dance Club", w:"Rei", d:"幼少期をNYで過ごし4歳でクラシック・ギターを開始、5歳でブルーズと出会った卓越したシンガーソングライター/ギタリスト。ジョニー・ウィンター影響のスライドと強烈なカッティングを駆使、TED NYC出演、Fenderアーティスト契約など国内外で活躍中。"},
  {r:384, n:"弓木英梨乃", b:"KIRINJI / solo", t:"Killer Tune Kills Me (KIRINJI feat. YonYon)", w:"KIRINJI", d:"KIRINJI正式メンバーとして活躍したギタリスト/シンガーソングライター。緻密なカッティングと歌心あるフレーズ、バイオリンもこなす多才さで知られる。秦基博や土岐麻子のサポートも務め、YouTubeでの演奏動画でも人気を博すFenderアーティスト。"},
  {r:385, n:"アベフトシ", b:"THEE MICHELLE GUN ELEPHANT", t:"世界の終わり", w:"THEE MICHELLE GUN ELEPHANT", d:"THEE MICHELLE GUN ELEPHANTのギタリスト。高速カッティングを多用した独特なプレイで日本ロック界に強い影響を残した。松下工房seenブランドのテレキャスターカスタムを愛用。2009年42歳で早逝したが、その唯一無二のプレイは今なお多くのロックギタリストに影響を与え続けている。"},
  {r:386, n:"野村義男", b:"THE GOOD-BYE / RIDER CHIPS", t:"気まぐれONE WAY BOY", w:"THE GOOD-BYE", d:"たのきんトリオでアイドルデビュー、ギタリストに転身した異色のキャリアを持つ日本人ギタリスト。THE GOOD-BYEでバンド活動する傍ら、仮面ライダー関連ソングを手掛けるRIDER CHIPSやソロ活動を展開。卓越したギターテクニックと膨大なギターコレクションでも知られるベテラン。"},
  {r:387, n:"真島昌利", b:"THE BLUE HEARTS / ザ・クロマニヨンズ", t:"TRAIN-TRAIN", w:"THE BLUE HEARTS", d:"THE BLUE HEARTS、THE HIGH-LOWS、ザ・クロマニヨンズを甲本ヒロトと共に率いた日本パンク界の重鎮。Gibson Les Paul Juniorを武器に剥き出しのパンク・プレイを展開、「TRAIN-TRAIN」「夢」などの作詞作曲も担当、日本ロック史に残る名曲を多数生み出した伝説的ギタリスト。"},
  {r:388, n:"横山健", b:"Hi-STANDARD / Ken Yokoyama", t:"Stay Gold", w:"Hi-STANDARD", d:"日本のメロコアブームを牽引したHi-STANDARDのギタリスト。スピーディかつラウドなパンク・プレイで絶大な支持を集め、2004年からはKen Yokoyama名義でもソロ活動を展開。PIZZA OF DEATH RECORDSの代表として日本インディーズシーンの発展にも大きく貢献する人物。"},
  {r:389, n:"高見沢俊彦", b:"THE ALFEE", t:"星空のディスタンス", w:"THE ALFEE", d:"THE ALFEEのリードギター兼ボーカル。変則的なリズムを取り入れた速弾きとハードなアーミングが持ち味で、伸びやかなハイトーンボイスも魅力。ヴィンテージギターから派手な変形ギターまで多数所持するギターコレクターとしても有名で、数多のシグネチャーモデルも存在する日本を代表するロッカー。"},
  {r:390, n:"小沼ようすけ", b:"Yosuke Onuma / Jam Ka", t:"Jam Ka Deux (Live at Blue Note Tokyo)", w:"Yosuke Onuma", d:"ジャズにワールドミュージック、ファンク、R&Bを融合した独自の音楽性を持つ日本のジャズ/フュージョン・ギタリスト。フィンガーピッキングによるマイルドで表情豊かなサウンドが特徴。カリブ海の音楽を軸に据えた「Jam Ka」プロジェクトでフランスなど海外でも高い評価を獲得している実力派。"},
  {r:391, n:"菰口雄矢", b:"Yuya Komoguchi / solo", t:"Tears In The Universe", w:"Yuya Komoguchi", d:"卓越した演奏テクニックと優れた音楽センスを兼ね備えた日本のフュージョン・ギタリスト。坂東慧や櫻井哲夫、川口千里バンド、ソロプロジェクトで活躍する傍ら、ずっと真夜中でいいのに。、西川貴教、河村隆一のサポートも務める。インスト好きから邦ロック好きまで幅広く支持される若手実力派。"},
  {r:392, n:"押尾コータロー", b:"Kotaro Oshio / solo", t:"Twilight (黄昏)", w:"Kotaro Oshio", d:"アコースティックギターを用いた表情豊かなソロギターで人気を博す日本フィンガースタイル・ギターの第一人者。オープンチューニング、タッピング、スラップを駆使した独創的なサウンドを展開、スイスのモントルージャズフェス出演などアジアを中心に海外でも活躍。代表曲「黄昏」は世界的に知られる名曲。"},
  {r:393, n:"福田進一", b:"Shin-Ichi Fukuda / solo", t:"Asturias (Albéniz)", w:"Shin-Ichi Fukuda", d:"パリ国際ギターコンクールでグランプリ優勝した日本を代表する大御所クラシック・ギタリスト。60枚以上のアルバムを発表し、武満徹作品の解釈でも高い評価を得ている。クラシックの独奏やオーケストラ共演だけでなく他ジャンルにも積極的に取り組み、村治佳織など多くの名ギタリストを育てた教育者。"},
  {r:394, n:"村治佳織", b:"Kaori Muraji / solo", t:"Recuerdos de la Alhambra", w:"Kaori Muraji", d:"日本を代表するクラシック・ギタリスト。3歳で父よりギターを始め、10歳から福田進一に師事。デッカ・レコードと日本人初の独占契約を締結した国際派として知られる。クラシックのみならず現代音楽、映画音楽、ポップス、ロック、ジャズまで幅広く演奏、クラシックギター知名度向上に大きく貢献。"},

/* =====================================================================
   Photos — MediaWiki Action API with origin=* (CORS-safe)
   Batched (up to 50 titles per call). Cached in localStorage.
   ===================================================================== */
const PHOTO_LS_PREFIX = "gphoto2:";
const photoMemo = new Map();   // guitarist.n -> url ("" = tried but none)

function lsGetPhoto(name){
  try{ return localStorage.getItem(PHOTO_LS_PREFIX + name); }catch(e){ return null; }
}
function lsSetPhoto(name, url){
  try{ localStorage.setItem(PHOTO_LS_PREFIX + name, url || ""); }catch(e){}
}
function getPhotoSync(name){
  if(photoMemo.has(name)) return photoMemo.get(name);
  const ls = lsGetPhoto(name);
  if(ls !== null){ photoMemo.set(name, ls); return ls; }
  return null; // means: not yet tried
}

async function fetchPhotoBatch(gs){
  const titles = gs.map(g => g.w).join("|");
  const url =
    "https://en.wikipedia.org/w/api.php" +
    "?action=query" +
    "&format=json" +
    "&formatversion=2" +
    "&prop=pageimages" +
    "&piprop=thumbnail" +
    "&pithumbsize=400" +
    "&pilimit=50" +
    "&redirects=1" +
    "&origin=*" +
    "&titles=" + encodeURIComponent(titles);
  const res = await fetch(url, { mode:"cors" });
  if(!res.ok) throw new Error("HTTP "+res.status);
  const j = await res.json();

  const norm = s => (s||"").replace(/_/g," ").trim().toLowerCase();
  const titleMap = new Map();
  gs.forEach(g => titleMap.set(norm(g.w), g));

  // The API may normalize and redirect our requested titles; track both
  const aliasToOriginal = new Map(); // normalized alias -> originally requested normalized title
  (j?.query?.normalized || []).forEach(r => aliasToOriginal.set(norm(r.to), norm(r.from)));
  (j?.query?.redirects  || []).forEach(r => {
    const to = norm(r.to), from = norm(r.from);
    // follow chain: if from is already aliased back to an original, keep going
    aliasToOriginal.set(to, aliasToOriginal.get(from) || from);
  });

  const out = new Map();
  const pages = j?.query?.pages || [];
  for(const page of pages){
    const pageN = norm(page.title);
    // original requested title?
    let origN = titleMap.has(pageN) ? pageN
              : aliasToOriginal.has(pageN) ? aliasToOriginal.get(pageN)
              : null;
    // If resolved original isn't in our request set, try looking through redirect chain manually
    if(!origN || !titleMap.has(origN)){
      for(const [to, from] of aliasToOriginal){
        if(to === pageN && titleMap.has(from)){ origN = from; break; }
      }
    }
    if(origN && titleMap.has(origN)){
      const g = titleMap.get(origN);
      out.set(g.n, page.thumbnail?.source || "");
    }
  }
  for(const g of gs){ if(!out.has(g.n)) out.set(g.n, ""); }
  return out;
}

async function ensurePhotos(guitarists){
  const toFetch = [];
  for(const g of guitarists){
    if(photoMemo.has(g.n)) continue;
    const ls = lsGetPhoto(g.n);
    if(ls !== null){ photoMemo.set(g.n, ls); continue; }
    toFetch.push(g);
  }
  if(!toFetch.length) return;
  for(let i=0;i<toFetch.length;i+=50){
    const batch = toFetch.slice(i, i+50);
    try{
      const map = await fetchPhotoBatch(batch);
      map.forEach((url, name) => {
        photoMemo.set(name, url);
        lsSetPhoto(name, url);
      });
      // After each batch lands, allow any listeners to repaint
      document.dispatchEvent(new CustomEvent("photos-updated"));
    }catch(e){
      console.warn("photo batch failed", e);
      batch.forEach(g => { if(!photoMemo.has(g.n)) photoMemo.set(g.n, ""); });
    }
  }
}

/* =====================================================================
   Merge-sort interactive sorter
   ===================================================================== */
const STORAGE_KEY = "guitarist-sorter:state";
const HISTORY_KEY = "guitarist-sorter:history";
let S = null;

function newSession(rangeN){
  const pool = GUITARISTS.slice(0, rangeN);
  const ids = pool.map(g=>g.r);
  for(let i=ids.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [ids[i],ids[j]]=[ids[j],ids[i]];
  }
  return {
    rangeN,
    runs: ids.map(id=>[id]),
    merging:null,
    pendingA:null, pendingB:null,
    battlesDone:0,
    estBattles: Math.ceil(rangeN * Math.log2(Math.max(2,rangeN))),
    history:[],
    finalOrder:null,
  };
}
function saveState(){ if(S && !S.finalOrder) try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }catch(e){} }
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(s && s.rangeN && s.runs) return s;
  }catch(e){} return null;
}
function clearState(){ try{ localStorage.removeItem(STORAGE_KEY); }catch(e){} }
function snapshot(){
  return JSON.stringify({
    runs:S.runs, merging:S.merging,
    pendingA:S.pendingA, pendingB:S.pendingB, battlesDone:S.battlesDone,
  });
}
function restoreSnapshot(snap){
  const o = JSON.parse(snap);
  S.runs=o.runs; S.merging=o.merging;
  S.pendingA=o.pendingA; S.pendingB=o.pendingB; S.battlesDone=o.battlesDone;
}
function advance(){
  if(!S.merging){
    if(S.runs.length <= 1){ S.finalOrder = S.runs[0] ? S.runs[0].slice() : []; return true; }
    const L=S.runs.shift(), R=S.runs.shift();
    S.merging = { L,R,i:0,j:0,out:[] };
  }
  const m = S.merging;
  if(m.i >= m.L.length){ while(m.j<m.R.length) m.out.push(m.R[m.j++]); S.runs.push(m.out); S.merging=null; return advance(); }
  if(m.j >= m.R.length){ while(m.i<m.L.length) m.out.push(m.L[m.i++]); S.runs.push(m.out); S.merging=null; return advance(); }
  S.pendingA = m.L[m.i];
  S.pendingB = m.R[m.j];
  return false;
}
function decide(side){
  S.history.push(snapshot()); if(S.history.length>300) S.history.shift();
  const m = S.merging;
  if(side==='A') m.out.push(m.L[m.i++]);
  else if(side==='B') m.out.push(m.R[m.j++]);
  else { m.out.push(m.L[m.i++]); m.out.push(m.R[m.j++]); }
  S.pendingA = S.pendingB = null;
  S.battlesDone++;
  const done = advance();
  saveState();
  return done;
}
function undo(){
  if(!S.history.length) return;
  restoreSnapshot(S.history.pop());
  S.finalOrder = null;
  saveState();
  render();
}

/* =====================================================================
   Rendering
   ===================================================================== */
const $ = id => document.getElementById(id);
function showScreen(name){
  for(const id of ["home","vote","result"]) $(`screen-${id}`).classList.toggle("active", id===name);
  window.scrollTo({top:0,behavior:"instant"});
}
function byId(id){ return GUITARISTS.find(g=>g.r===id); }

function paintPhoto(photoBox, g){
  photoBox.dataset.rank = g.r;
  // update fallback letter
  let fb = photoBox.querySelector(".ph-fallback");
  if(fb) fb.textContent = g.n.charAt(0);
  // remove any old img
  photoBox.querySelectorAll("img").forEach(x=>x.remove());
  const known = getPhotoSync(g.n);
  if(known){
    const img = new Image();
    img.alt = g.n;
    img.onload = ()=>img.classList.add("loaded");
    img.src = known;
    photoBox.appendChild(img);
    return;
  }
  if(known === null){
    // Not yet tried → kick off
    ensurePhotos([g]);
  }
  // else known === "" → no image available on Wikipedia
}

const YTID_LS_PREFIX = "gyt3:";     // user-added: name -> 11-char id
const ytUserOverride = new Map();   // in-memory cache of localStorage

function loadUserYtOverrides(){
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(!k || !k.startsWith(YTID_LS_PREFIX)) continue;
    const name = k.slice(YTID_LS_PREFIX.length);
    const v = localStorage.getItem(k);
    if(v && isValidYouTubeId(v)) ytUserOverride.set(name, v);
  }
}
function saveUserYt(name, id){
  ytUserOverride.set(name, id);
  try{ localStorage.setItem(YTID_LS_PREFIX + name, id); }catch(e){}
}
function clearUserYt(name){
  ytUserOverride.delete(name);
  try{ localStorage.removeItem(YTID_LS_PREFIX + name); }catch(e){}
}
function isValidYouTubeId(id){
  return typeof id === "string" && /^[A-Za-z0-9_-]{11}$/.test(id);
}
function extractYouTubeId(input){
  // Accept a bare 11-char ID, or any YouTube URL/link the user pastes
  const s = String(input||"").trim();
  if(isValidYouTubeId(s)) return s;
  // Try common URL forms
  const m = s.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/|v\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
  if(m) return m[1];
  return null;
}
function getVideoIdFor(g){
  // user override beats curated
  return ytUserOverride.get(g.n) || CURATED_VIDEO_IDS[g.n] || null;
}

function ytEmbedUrl(videoId){
  // Minimal embed — avoids Chrome's Error 153 that happens with list=RD+autoplay+mute.
  // Using regular youtube.com (not nocookie) as nocookie also sometimes
  // triggers 153 in Chrome when referrer context is ambiguous.
  const p = new URLSearchParams({
    rel: "0",
    playsinline: "1",
  });
  return `https://www.youtube.com/embed/${videoId}?${p.toString()}`;
}
function ytThumbUrl(videoId){
  return `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
}

function expandEmbed(embedEl, g, videoId){
  embedEl.innerHTML = "";
  const iframe = document.createElement("iframe");
  iframe.src = ytEmbedUrl(videoId);
  iframe.title = `${g.n} — ${g.t}`;
  iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
  iframe.setAttribute("allowfullscreen","");
  iframe.setAttribute("referrerpolicy","strict-origin-when-cross-origin");
  embedEl.appendChild(iframe);

  // Small "×" to collapse back to thumb
  const close = document.createElement("button");
  close.className = "yt-close";
  close.type = "button";
  close.setAttribute("aria-label","動画を閉じる");
  close.innerHTML = "×";
  close.onclick = (e)=>{
    e.stopPropagation();
    showThumb(embedEl, g, videoId);
  };
  embedEl.appendChild(close);

  // Fallback link — if the embed shows Error 153 (referrer policy blocked
  // by the host environment, e.g. Claude artifact iframe), this lets the
  // user jump to YouTube directly.
  const open = document.createElement("a");
  open.className = "yt-open";
  open.href = `https://www.youtube.com/watch?v=${videoId}`;
  open.target = "_blank";
  open.rel = "noopener";
  open.setAttribute("data-nav","");
  open.textContent = "↗ YouTubeで開く";
  open.onclick = e => e.stopPropagation();
  embedEl.appendChild(open);
}

// YouTube iframe embeds for in-page playback. Requires http(s) hosting
// (e.g. GitHub Pages) because YouTube's embed endpoint requires a valid
// HTTP referrer. Opening this file via file:// will result in Error 153
// — test via `python3 -m http.server` or the deployed site instead.

function showThumb(embedEl, g, videoId){
  embedEl.innerHTML = `
    <div class="yt-thumb" style="background-image:url('${ytThumbUrl(videoId)}')">
      <div class="yt-play"></div>
      <div class="yt-caption">▶ ${g.t}</div>
    </div>`;
  embedEl.onclick = (e)=>{
    e.stopPropagation();
    expandEmbed(embedEl, g, videoId);
  };
}

function showAddIdSlot(embedEl, g){
  // No video available — show "add your own" CTA
  embedEl.innerHTML = `
    <div class="yt-thumb yt-missing">
      <div class="yt-missing-lbl">動画未登録</div>
      <div class="yt-missing-sub">${g.t}</div>
      <div class="yt-missing-actions">
        <button class="yt-mini" data-act="add">＋ 動画を登録</button>
        <button class="yt-mini yt-mini-secondary" data-act="search">YouTubeで検索</button>
      </div>
    </div>`;
  embedEl.onclick = null;
  const actions = embedEl.querySelector(".yt-missing-actions");
  actions.addEventListener("click", (e)=>{
    e.stopPropagation();
    const btn = e.target.closest("button");
    if(!btn) return;
    if(btn.dataset.act === "search"){
      window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(g.n+" "+g.t)}`, "_blank", "noopener");
    }else if(btn.dataset.act === "add"){
      promptAddId(embedEl, g);
    }
  });
}

function promptAddId(embedEl, g){
  const pasted = prompt(`${g.n} の代表曲 "${g.t}" のYouTube動画URL または 11文字の動画ID を貼り付けてください:`);
  if(pasted == null) return;
  const id = extractYouTubeId(pasted);
  if(!id){ alert("有効なYouTube動画URLまたはIDではありません。"); return; }
  saveUserYt(g.n, id);
  // Repaint this slot
  showThumb(embedEl, g, id);
}

function paintYouTubeSlot(side, g){
  const embedEl = document.getElementById("yte-" + (side==='A'?'a':'b'));
  embedEl.dataset.rank = g.r;
  const vid = getVideoIdFor(g);
  if(vid && isValidYouTubeId(vid)){
    showThumb(embedEl, g, vid);
  }else{
    showAddIdSlot(embedEl, g);
  }
}

// Load any user-added IDs up front
loadUserYtOverrides();

function paintCard(side){
  const g = byId(side==='A' ? S.pendingA : S.pendingB);
  const suffix = side==='A' ? 'a' : 'b';
  $("rb-"+suffix).textContent = `#${g.r}`;
  $("nm-"+suffix).textContent = g.n;
  $("bd-"+suffix).textContent = g.b;
  $("tk-"+suffix).textContent = g.t;
  $("bio-"+suffix).textContent = g.d || "";
  paintPhoto($("ph-"+suffix).parentElement, g);

  // YouTube search URL for the "検索" button
  const artistQ = encodeURIComponent(`${g.n} guitar`);
  const prefix = side==='A' ? 'yta' : 'ytb';
  $(prefix+"-search").href  = `https://www.youtube.com/results?search_query=${artistQ}`;
  $(prefix+"-search").title = `${g.n} を YouTube で検索`;

  // YouTube embed slot: synchronous (curated IDs + user overrides)
  paintYouTubeSlot(side, g);
}

function renderProgress(){
  const cur = S.battlesDone;
  const est = Math.max(cur+1, S.estBattles);
  const pct = Math.min(99, Math.round(cur/est*100));
  $("p-cur").textContent = cur;
  $("p-est").textContent = est;
  $("p-pct").textContent = pct;
  $("p-fill").style.width = pct + "%";
}

function prefetchUpcoming(){
  if(!S) return;
  const ids = new Set();
  if(S.merging){
    S.merging.L.slice(S.merging.i, S.merging.i+6).forEach(id=>ids.add(id));
    S.merging.R.slice(S.merging.j, S.merging.j+6).forEach(id=>ids.add(id));
  }
  for(const run of S.runs){ if(ids.size>=24) break; run.slice(0,3).forEach(id=>ids.add(id)); }
  const gs = [...ids].map(byId).filter(Boolean).filter(g=>!photoMemo.has(g.n) && lsGetPhoto(g.n)===null);
  if(gs.length) ensurePhotos(gs);
}

function render(){
  if(!S){ showScreen("home"); return; }
  if(S.finalOrder){ renderResult(); showScreen("result"); return; }
  if(S.pendingA==null || S.pendingB==null){
    advance();
    if(S.finalOrder){ renderResult(); showScreen("result"); return; }
  }
  showScreen("vote");
  renderProgress();
  paintCard('A');
  paintCard('B');
  prefetchUpcoming();
}

function renderResult(){
  const order = S.finalOrder;
  const podium = $("podium");
  podium.innerHTML = "";
  const slots = [1,0,2];
  slots.forEach(idx=>{
    if(order[idx]==null) return;
    const g = byId(order[idx]);
    const div = document.createElement("div");
    div.className = "po-card" + (idx===0?" first":"");
    div.innerHTML = `
      <div class="po-rank display">${idx+1}</div>
      <div class="po-photo"><div class="ph-fallback">${g.n.charAt(0)}</div></div>
      <div class="po-name">${g.n}</div>
      <div class="po-band">${g.b}</div>
    `;
    podium.appendChild(div);
    paintPhoto(div.querySelector(".po-photo"), g);
  });

  const list = $("rank-list");
  list.innerHTML = "";
  order.forEach((id,idx)=>{
    const g = byId(id);
    const row = document.createElement("div");
    row.className = "rank-row";
    row.innerHTML = `
      <div class="n display">${idx+1}</div>
      <div class="thumb"><div class="ph-fallback" style="position:absolute;inset:0;display:none;"></div></div>
      <div class="nm">${g.n}<small>${g.b} — ${g.t}</small></div>
      <div class="orig">RS #${g.r}</div>
    `;
    list.appendChild(row);
    const thumb = row.querySelector(".thumb");
    thumb.dataset.rank = g.r;
    const known = getPhotoSync(g.n);
    if(known){
      const img = new Image();
      img.alt = "";
      img.onload = ()=>img.classList.add("loaded");
      img.src = known;
      thumb.appendChild(img);
    }else if(known === null){
      ensurePhotos([g]);
    }
  });
}

// When a photo batch completes, repaint anything visible that now has a url
document.addEventListener("photos-updated", ()=>{
  // Voting cards
  ["a","b"].forEach(suf=>{
    const box = $("ph-"+suf).parentElement;
    if(!box.dataset.rank) return;
    const g = byId(+box.dataset.rank);
    if(!g) return;
    const url = getPhotoSync(g.n);
    if(url && !box.querySelector("img")){
      const img = new Image();
      img.alt = g.n;
      img.onload = ()=>img.classList.add("loaded");
      img.src = url;
      box.appendChild(img);
    }
  });
  // Result podium + list
  document.querySelectorAll(".po-photo, .thumb").forEach(box=>{
    if(!box.dataset.rank) return;
    if(box.querySelector("img")) return;
    const g = byId(+box.dataset.rank);
    if(!g) return;
    const url = getPhotoSync(g.n);
    if(url){
      const img = new Image();
      img.alt = g.n;
      img.onload = ()=>img.classList.add("loaded");
      img.src = url;
      box.appendChild(img);
    }
  });
});

/* =====================================================================
   Events
   ===================================================================== */
let chosenRange = 50;
const rangeLabels = {
  20:"20人 / 推定 約 65 回の選択",
  50:"50人 / 推定 約 230 回の選択",
  100:"100人 / 推定 約 550 回の選択",
  424:"424人 / 推定 約 3700 回の選択",
};
document.querySelectorAll("#range-picker button").forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll("#range-picker button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    chosenRange = parseInt(b.dataset.range,10);
    $("range-label").textContent = rangeLabels[chosenRange];
  };
});

$("btn-start").onclick = ()=>{
  S = newSession(chosenRange);
  advance(); saveState();
  ensurePhotos(GUITARISTS.slice(0, chosenRange));
  render();
};
$("btn-resume").onclick = ()=>{
  S = loadState();
  if(!S){ alert("続きがありません。"); return; }
  if(!S.estBattles) S.estBattles = Math.ceil(S.rangeN * Math.log2(Math.max(2,S.rangeN)));
  S.history = S.history || [];
  ensurePhotos(GUITARISTS.slice(0, S.rangeN));
  render();
};
(function(){ if(loadState()) $("btn-resume").style.display = "inline-block"; })();

// Visual selection feedback → then commit the vote.
// 280ms delay lets the user see which card they chose before the cards change.
let picking = false;
function pick(side){
  if(picking) return;
  if(!S) return;
  if(side==='A' && !S.pendingA) return;
  if(side==='B' && !S.pendingB) return;
  if(side==='TIE' && !S.pendingA) return;
  picking = true;
  const cardA = $("card-a"), cardB = $("card-b");
  cardA.classList.add("locked");
  cardB.classList.add("locked");
  if(side==='A'){ cardA.classList.add("selected"); cardB.classList.add("dimmed"); }
  else if(side==='B'){ cardB.classList.add("selected"); cardA.classList.add("dimmed"); }
  else { cardA.classList.add("dimmed"); cardB.classList.add("dimmed"); }
  setTimeout(()=>{
    // Clear feedback classes before re-rendering (next pair loads fresh)
    cardA.classList.remove("selected","dimmed","locked");
    cardB.classList.remove("selected","dimmed","locked");
    picking = false;
    decide(side);
    render();
  }, side==='TIE' ? 180 : 280);
}

$("card-a").onclick = (e)=>{ if(e.target.closest("[data-nav]")) return; pick('A'); };
$("card-b").onclick = (e)=>{ if(e.target.closest("[data-nav]")) return; pick('B'); };

// Belt-and-suspenders: explicitly stop propagation for every YT link,
// so a tap on them never triggers the card's selection.
["yta-search","ytb-search"].forEach(id=>{
  const el = document.getElementById(id);
  if(el) el.addEventListener("click", e => e.stopPropagation());
});
$("btn-tie").onclick = (e)=>{ e.stopPropagation(); pick('TIE'); };
$("btn-undo").onclick = (e)=>{ e.stopPropagation(); undo(); };

document.addEventListener("keydown", e=>{
  if(!$("screen-vote").classList.contains("active")) return;
  if(e.key==="ArrowLeft"){ e.preventDefault(); $("card-a").click(); }
  else if(e.key==="ArrowRight"){ e.preventDefault(); $("card-b").click(); }
  else if(e.key===" "){ e.preventDefault(); $("btn-tie").click(); }
  else if(e.key==="u" || e.key==="U"){ e.preventDefault(); undo(); }
});

$("btn-reset").onclick = ()=>{
  if(!confirm("現在の進行状況を消去して、トップに戻りますか？")) return;
  clearState(); S = null;
  $("btn-resume").style.display = "none";
  showScreen("home");
};

$("btn-save").onclick = ()=>{
  if(!S || !S.finalOrder) return;
  const top5 = S.finalOrder.slice(0,5).map(id=>byId(id).n).join(" > ");
  const entry = { when:new Date().toISOString(), range:S.rangeN, top5, full:S.finalOrder };
  let h = [];
  try{ h = JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]"); }catch(e){}
  h.unshift(entry);
  if(h.length > 20) h = h.slice(0,20);
  try{ localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }catch(e){}
  alert("保存しました。");
};
$("btn-again").onclick = ()=>{
  S = newSession(S.rangeN);
  advance(); saveState();
  render();
};
$("btn-to-home").onclick = ()=>{
  clearState(); S = null;
  $("btn-resume").style.display = "none";
  showScreen("home");
};
$("btn-home").onclick = ()=>{
  // Header logo: return to top without clearing progress.
  // If a session is in progress, offer "前回の続きから" on home.
  if(S && !S.finalOrder){
    $("btn-resume").style.display = "";
  }
  showScreen("home");
};

$("btn-history").onclick = ()=>{
  let h = [];
  try{ h = JSON.parse(localStorage.getItem(HISTORY_KEY)||"[]"); }catch(e){}
  const body = $("history-body");
  if(!h.length){ body.innerHTML = "まだ保存された履歴はありません。"; }
  else{
    body.innerHTML = h.map(e=>{
      const d = new Date(e.when);
      const ts = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `<div class="history-item">
        <div class="who">${e.top5}</div>
        <div class="when">${ts}・対象${e.range}人</div>
      </div>`;
    }).join("");
  }
  $("modal").classList.add("on");
};
$("modal-close").onclick = ()=>$("modal").classList.remove("on");
$("modal").onclick = e=>{ if(e.target.id==="modal") $("modal").classList.remove("on"); };

// Pre-warm top 20 photos at load so the first battle is never empty
ensurePhotos(GUITARISTS.slice(0, 20));
showScreen("home");
</script>
