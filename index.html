<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>Guitarist Sorter — 偉大なギタリスト</title>
<style>
  :root{
    --bg:#0e0d0b;
    --bg-2:#161412;
    --paper:#f5efe2;
    --ink:#1a1714;
    --accent:#c8381c;
    --accent-2:#d9a441;
    --line:#2a2622;
    --muted:#8a8277;
    --r-sm:6px;   /* small controls: mini buttons, chips */
    --r-md:10px;  /* default: thumbs, small panels */
    --r-lg:16px;  /* cards, embeds, photo */
    --r-xl:24px;  /* podium/modal */
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overscroll-behavior:none;}
  body{
    background:var(--bg);
    color:var(--paper);
    font-family:"Helvetica Neue","Arial","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-feature-settings:"palt";
    overflow-x:hidden;
    letter-spacing:.01em;
  }
  .display{
    font-family:"Bodoni 72","Bodoni Moda","Didot","Noto Serif JP",serif;
    font-weight:700;letter-spacing:-.01em;
  }
  .mono{font-family:"Courier New","Courier",monospace;}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;}

  /* ===== Breakpoints ===== */
  /* phones: default (<720)  |  tablets: >=720  |  desktop: >=1024  |  wide: >=1280 */

  header{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg,rgba(14,13,11,.96),rgba(14,13,11,.85));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .bar{
    max-width:1280px;margin:0 auto;
    padding:9px 14px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
  }
  @media(min-width:1024px){ .bar{ padding:12px 28px; } }
  .logo{
    display:flex;align-items:baseline;gap:8px;min-width:0;
    padding:2px 0;cursor:pointer;transition:opacity .15s ease;
  }
  .logo:hover{ opacity:.75; }
  .logo:hover .mark{ border-color:var(--accent-2); color:var(--accent-2); }
  .logo .mark{
    width:26px;height:26px;border:1.5px solid var(--accent);border-radius:50%;
    display:inline-grid;place-items:center;color:var(--accent);
    font-family:"Bodoni 72","Didot",serif;font-weight:700;font-size:14px;
    transform:translateY(2px);flex-shrink:0;
  }
  .logo h1{font-size:17px;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .logo h1 small{font-weight:400;color:var(--muted);margin-left:6px;letter-spacing:.08em;font-size:11px;}
  @media(max-width:520px){ .logo h1 small{display:none;} }
  @media(min-width:1024px){
    .logo h1{ font-size:20px; }
    .logo h1 small{ font-size:13px; letter-spacing:.12em; }
  }
  .bar nav{display:flex;gap:6px;flex-shrink:0;}
  .bar nav button{
    font-size:13px;padding:8px 14px;border:1px solid var(--line);border-radius:999px;color:var(--paper);
    letter-spacing:.08em;min-height:36px;
  }
  .bar nav button:hover{border-color:var(--accent-2);color:var(--accent-2);}

  main{max-width:1280px;margin:0 auto;padding:16px 14px 48px;}
  @media(min-width:1024px){ main{ padding:24px 28px 56px; } }
  .screen{display:none;}
  .screen.active{display:block;}

  /* ===== HERO ===== */
  .hero{padding:28px 0 20px;border-bottom:1px solid var(--line);text-align:center;}
  @media(min-width:1024px){ .hero{ padding:56px 0 40px; } }
  .hero h2{font-size:clamp(34px,6.5vw,72px);line-height:.95;letter-spacing:-.02em;margin-bottom:18px;}
  .hero h2 em{color:var(--accent-2);font-style:italic;font-weight:500;}
  .hero p{max-width:680px;margin:0 auto;color:#c9c3b5;line-height:1.75;font-size:16px;}

  /* Hero body: single centered column on all screens */
  .hero-body{ display:block; margin-top:22px; }
  .hero-aside{ margin-top:28px; }
  @media(min-width:1024px){
    .hero-body{ margin-top:36px; }
    .hero-text p{ font-size:18px; margin-bottom:32px; }
  }

  .hero .stats{
    margin-top:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
    background:var(--line);border:1px solid var(--line);
  }
  .hero .stats>div{background:var(--bg);padding:14px 12px;}
  .hero .stats .num{font-size:24px;font-family:"Bodoni 72","Didot",serif;color:var(--accent-2);}
  .hero .stats .lbl{font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-top:3px;}
  @media(min-width:1024px){
    .hero .stats{ margin-top:0; }
    .hero .stats>div{ padding:20px 18px; }
    .hero .stats .num{ font-size:34px; }
    .hero .stats .lbl{ font-size:10px; margin-top:6px; }
  }

  .cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px;justify-content:center;}
  .btn{
    padding:16px 32px;border-radius:999px;font-size:14px;letter-spacing:.2em;text-transform:uppercase;
    border:1px solid var(--paper);color:var(--paper);background:transparent;transition:all .15s ease;
    min-height:52px; /* tap-safe */
  }
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary:hover{background:#a62c14;border-color:#a62c14;}
  .btn:hover{background:var(--paper);color:var(--ink);}
  .btn.ghost{border-color:var(--line);color:var(--muted);}
  .btn.ghost:hover{border-color:var(--paper);background:transparent;color:var(--paper);}

  .settings{
    margin-top:28px;padding-top:22px;border-top:1px solid var(--line);
    max-width:420px;margin-left:auto;margin-right:auto;
  }
  @media(min-width:1024px){ .settings{ padding-top:28px; max-width:480px; } }
  .settings h3{font-size:12px;letter-spacing:.28em;color:var(--muted);margin-bottom:14px;text-transform:uppercase;text-align:center;}
  .pick-range{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .pick-range button{
    padding:11px 20px;border:1px solid var(--line);border-radius:999px;color:var(--paper);font-size:14px;letter-spacing:.05em;
    min-height:42px;
  }
  .pick-range button.on{background:var(--accent-2);color:var(--ink);border-color:var(--accent-2);font-weight:600;}
  .pick-range button:hover{border-color:var(--accent-2);}
  .range-label{margin-top:14px;color:var(--muted);font-size:13px;line-height:1.7;text-align:center;}

  /* ===== VOTE / BATTLE ===== */
  .vote-top{
    display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:8px 0 10px;border-bottom:1px solid var(--line);margin-bottom:14px;
  }
  .vote-top .l{font-size:12px;letter-spacing:.25em;color:var(--muted);text-transform:uppercase;}
  .vote-top .r{font-family:"Bodoni 72","Didot",serif;font-size:22px;color:var(--accent-2);}
  @media(min-width:1024px){ .vote-top .r{ font-size:28px; } .vote-top .l{ font-size:13px; } }
  .bar-track{height:4px;background:var(--line);position:relative;overflow:hidden;margin-bottom:16px;border-radius:999px;}
  .bar-fill{position:absolute;left:0;top:0;height:100%;background:var(--accent);transition:width .3s ease;border-radius:999px;}

  /* Battle — two cards side by side, controls are placed below */
  .battle{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    align-items:stretch;
    max-width:1280px;margin:0 auto;
  }
  @media(min-width:720px){ .battle{ gap:18px; } }
  @media(min-width:1024px){ .battle{ gap:28px; } }

  .card{
    position:relative;
    background:var(--paper);
    color:var(--ink);
    padding:14px 14px 16px;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
    display:flex;flex-direction:column;
    min-width:0;
    border-radius:var(--r-lg);
  }
  @media(min-width:720px){ .card{padding:24px 22px;} }
  @media(min-width:1024px){ .card{padding:32px 30px 30px;} }
  .card:hover{transform:translateY(-3px);box-shadow:0 18px 40px -18px rgba(200,56,28,.55);}
  .card:active{transform:translateY(-1px);}

  /* Selection feedback — played when user picks a side */
  .card.selected{
    transform:translateY(-4px) scale(1.03);
    box-shadow:
      0 0 0 3px var(--accent),
      0 24px 60px -12px rgba(200,56,28,.8),
      0 0 80px -8px rgba(217,164,65,.5);
    animation:pickPulse .32s ease-out;
    z-index:2;
  }
  .card.selected::after{
    content:"";position:absolute;inset:0;border-radius:inherit;
    background:radial-gradient(circle at 50% 50%, rgba(217,164,65,.18) 0%, rgba(217,164,65,0) 70%);
    pointer-events:none;animation:pickFlash .32s ease-out;
  }
  .card.dimmed{
    opacity:.35;filter:grayscale(.4);
    transform:scale(.96);
    transition:opacity .2s ease, transform .2s ease, filter .2s ease;
  }
  .card.locked{ pointer-events:none; }
  @keyframes pickPulse{
    0%   { transform:translateY(-1px) scale(1); }
    55%  { transform:translateY(-6px) scale(1.05); }
    100% { transform:translateY(-4px) scale(1.03); }
  }
  @keyframes pickFlash{
    0%   { opacity:0; }
    40%  { opacity:1; }
    100% { opacity:0; }
  }
  .rank-badge{
    position:absolute;top:8px;right:10px;
    font-family:"Bodoni 72","Didot",serif;font-size:28px;line-height:1;
    color:var(--ink);opacity:.2;
    pointer-events:none;
  }
  @media(min-width:720px){ .rank-badge{font-size:48px;top:14px;right:16px;} }
  @media(min-width:1024px){ .rank-badge{font-size:64px;top:18px;right:24px;} }

  /* Card internals:
     mobile/tablet: flex column (photo on top)
     desktop (>=1024): two-column grid using areas (photo | meta) without any HTML change */
  .card{ grid-template-columns:1fr; }
  .card > .photo    { grid-area:photo; }
  .card > h3        { grid-area:name;  }
  .card > .band     { grid-area:band;  }
  .card > .bio      { grid-area:bio;   }
  .card > .track    { grid-area:track; }
  .card > .yt-embed { grid-area:embed; }
  .card > .yt-row   { grid-area:btns;  }
  @media(min-width:1024px){
    .card{
      display:grid;
      grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);
      grid-template-rows:auto auto auto auto 1fr auto;
      grid-template-areas:
        "photo  name"
        "photo  band"
        "photo  bio"
        "photo  track"
        "photo  embed"
        "photo  btns";
      column-gap:24px;
      row-gap:0;
      align-items:start;
    }
    .card > .photo{ align-self:stretch; margin-bottom:0; height:100%; }
    .card > h3{ margin-top:0; }
    .card > .yt-embed{ margin-top:auto; padding-top:14px; }
    .card > .yt-row{ padding-top:10px; }
  }

  .photo{
    width:100%;aspect-ratio:1/1;
    background:linear-gradient(135deg,#d4c9ad,#b5a685);
    margin-bottom:10px;position:relative;overflow:hidden;
    border-radius:var(--r-md);
  }
  @media(min-width:1024px){ .photo{ border-radius:var(--r-md); } }
  @media(min-width:720px){ .photo{margin-bottom:16px;} }
  @media(min-width:1024px){ .photo{ margin-bottom:0; aspect-ratio:1/1; } }
  .photo img{
    width:100%;height:100%;object-fit:cover;display:block;
    opacity:0;transition:opacity .3s ease;
    position:absolute;inset:0;
  }
  .photo img.loaded{opacity:1;}
  .photo .ph-fallback{
    position:absolute;inset:0;display:grid;place-items:center;
    font-family:"Bodoni 72","Didot",serif;font-size:clamp(40px,12vw,96px);color:#8a7e65;
    letter-spacing:-.02em;
  }

  .card h3{
    font-family:"Bodoni 72","Bodoni Moda","Didot",serif;
    font-size:clamp(18px,4.8vw,28px);line-height:1.05;
    margin-bottom:4px;letter-spacing:-.01em;
    word-break:break-word;
  }
  @media(min-width:720px){ .card h3{ font-size:clamp(24px,3.2vw,36px); } }
  @media(min-width:1024px){ .card h3{ font-size:36px; margin-bottom:8px; } }
  @media(min-width:1280px){ .card h3{ font-size:42px; } }
  .card .band{
    font-size:clamp(13px,3vw,15px);color:#6a5f4a;letter-spacing:.02em;margin-bottom:8px;
    line-height:1.3;
  }
  @media(min-width:720px){ .card .band{margin-bottom:14px;font-size:15px;} }
  @media(min-width:1024px){ .card .band{font-size:17px;margin-bottom:18px;} }

  .card .track{
    padding-top:8px;border-top:1px solid rgba(26,23,20,.15);
    font-size:clamp(12px,2.8vw,14px);color:#4a4238;letter-spacing:.03em;line-height:1.4;
  }
  @media(min-width:720px){ .card .track{padding-top:12px;font-size:14px;} }
  @media(min-width:1024px){ .card .track{padding-top:14px;font-size:16px;} }
  .card .track .lbl{
    display:block;font-size:10px;letter-spacing:.28em;color:#9a8e75;
    text-transform:uppercase;margin-bottom:4px;
  }
  @media(min-width:1024px){ .card .track .lbl{ font-size:11px; margin-bottom:5px; } }

  /* Bio — short (<=140ch) description, appears only if filled */
  .card .bio{
    font-size:clamp(13px,2.9vw,14.5px);
    line-height:1.7;
    color:#3a3328;
    margin-bottom:10px;
    padding-bottom:10px;
    border-bottom:1px solid rgba(26,23,20,.1);
    letter-spacing:.01em;
  }
  .card .bio:empty{ display:none; }
  @media(min-width:720px){ .card .bio{ font-size:14.5px; margin-bottom:12px; padding-bottom:12px; } }
  @media(min-width:1024px){ .card .bio{ font-size:15.5px; line-height:1.75; margin-bottom:16px; padding-bottom:16px; } }

  /* YouTube thumbnail-to-embed slot */
  .yt-embed{
    margin-top:8px;
    width:100%;aspect-ratio:16/9;
    background:#000;
    position:relative;overflow:hidden;
    cursor:pointer;
    border-radius:var(--r-md);
  }
  @media(min-width:640px){ .yt-embed{margin-top:12px;} }
  .yt-thumb{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:#111 center/cover no-repeat;
    transition:filter .15s ease;
  }
  .yt-embed:hover .yt-thumb{filter:brightness(1.08);}
  .yt-thumb::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.55) 100%);
    pointer-events:none;
  }
  .yt-thumb .yt-play{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:42px;height:42px;border-radius:50%;
    background:#ff0033;color:#fff;
    display:grid;place-items:center;
    font-size:14px;
    box-shadow:0 6px 18px rgba(0,0,0,.5);
    z-index:2;
  }
  @media(min-width:640px){ .yt-thumb .yt-play{width:54px;height:54px;font-size:18px;} }
  .yt-thumb .yt-play::before{
    content:"";
    display:block;
    width:0;height:0;
    margin-left:3px;
    border-top:7px solid transparent;
    border-bottom:7px solid transparent;
    border-left:12px solid #fff;
  }
  @media(min-width:640px){ .yt-thumb .yt-play::before{border-top-width:9px;border-bottom-width:9px;border-left-width:15px;margin-left:4px;} }
  .yt-thumb .yt-caption{
    position:absolute;left:10px;right:10px;bottom:8px;
    color:#f0f0f0;font-size:12px;letter-spacing:.04em;line-height:1.3;
    z-index:2;
    text-shadow:0 1px 2px rgba(0,0,0,.8);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .yt-thumb .yt-caption .yt-ext{color:var(--accent-2);margin-left:4px;}
  @media(min-width:640px){ .yt-thumb .yt-caption{font-size:13px;left:12px;right:12px;bottom:10px;} }
  .yt-placeholder{
    color:#888;font-size:13px;letter-spacing:.1em;text-transform:uppercase;
    z-index:1;
  }
  .yt-error{
    color:#c8381c;font-size:12px;letter-spacing:.05em;
    text-align:center;padding:0 10px;line-height:1.4;z-index:1;
  }
  .yt-embed iframe{
    position:absolute;inset:0;width:100%;height:100%;border:0;background:#000;
  }
  .yt-close{
    position:absolute;top:4px;right:4px;z-index:3;
    width:28px;height:28px;border-radius:50%;
    background:rgba(0,0,0,.65);color:#fff;
    display:grid;place-items:center;
    font-size:18px;line-height:1;border:0;cursor:pointer;
    padding:0;
  }
  .yt-close:hover{background:rgba(200,56,28,.9);}
  .yt-open{
    position:absolute;bottom:4px;right:4px;z-index:3;
    padding:5px 12px;
    background:rgba(0,0,0,.65);color:#fff;
    font-size:12px;letter-spacing:.04em;text-decoration:none;
    border-radius:999px;
  }
  .yt-open:hover{background:rgba(200,56,28,.9);}

  /* Missing-video slot */
  .yt-thumb.yt-missing{
    background:repeating-linear-gradient(135deg,#181612 0 6px,#221f1a 6px 12px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;padding:8px;
    border-radius:var(--r-md);
  }
  .yt-thumb.yt-missing::after{display:none;}
  .yt-missing-lbl{
    color:var(--muted);font-size:12px;letter-spacing:.2em;text-transform:uppercase;
  }
  .yt-missing-sub{
    color:#c9c3b5;font-size:13px;line-height:1.3;
    max-width:90%;text-align:center;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .yt-missing-actions{
    display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;justify-content:center;
  }
  .yt-mini{
    padding:6px 14px;
    border:1px solid var(--accent-2);
    background:transparent;color:var(--accent-2);
    font-size:12px;letter-spacing:.04em;
    cursor:pointer;
    border-radius:999px;
  }
  .yt-mini:hover{background:var(--accent-2);color:var(--ink);}
  .yt-mini-secondary{border-color:var(--line);color:var(--muted);}
  .yt-mini-secondary:hover{background:var(--line);color:var(--paper);border-color:var(--line);}

  /* YouTube buttons under each card */
  .yt-row{
    display:flex;gap:6px;margin-top:10px;
  }
  @media(min-width:640px){ .yt-row{gap:8px;margin-top:14px;} }
  .yt-btn{
    flex:1;
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:11px 8px;
    border:1px solid rgba(26,23,20,.22);
    background:#fff;
    color:var(--ink);
    font-size:12px;letter-spacing:.06em;font-weight:600;
    text-decoration:none;
    text-align:center;
    transition:all .12s ease;
    cursor:pointer;
    min-width:0;
    line-height:1.2;
    border-radius:999px;
  }
  @media(min-width:640px){ .yt-btn{padding:13px 12px;gap:8px;font-size:13px;letter-spacing:.08em;} }
  .yt-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .yt-btn.yt-track{background:#ff0033;color:#fff;border-color:#ff0033;}
  .yt-btn.yt-track:hover{background:#c8001f;border-color:#c8001f;}
  .yt-btn .yt-ic{
    font-size:13px;line-height:1;flex-shrink:0;
  }
  @media(min-width:640px){ .yt-btn .yt-ic{font-size:15px;} }
  .yt-btn > span:last-child{
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;
  }

  /* Vote controls — appears below the battle cards */
  .vote-controls{
    display:flex;justify-content:center;gap:12px;
    margin-top:20px;flex-wrap:wrap;
  }
  @media(min-width:720px){ .vote-controls{ margin-top:28px; gap:16px; } }
  @media(min-width:1024px){ .vote-controls{ margin-top:36px; gap:20px; } }
  .vote-controls button{
    padding:12px 28px;border:1px solid var(--line);color:var(--paper);
    font-size:13px;letter-spacing:.18em;text-transform:uppercase;
    min-height:48px;min-width:140px;
    border-radius:999px;
    transition:all .15s ease;
  }
  @media(min-width:720px){ .vote-controls button{ font-size:14px; padding:14px 36px; min-width:160px; min-height:52px; } }
  @media(min-width:1024px){ .vote-controls button{ font-size:15px; padding:16px 44px; min-width:180px; min-height:56px; } }
  .vote-controls button:hover{border-color:var(--paper);background:var(--paper);color:var(--ink);}
  #btn-tie{ border-color:var(--accent); color:var(--accent); }
  #btn-tie:hover{ background:var(--accent); border-color:var(--accent); color:#fff; }

  /* ===== RESULT ===== */
  .result-head{padding:30px 0 22px;border-bottom:1px solid var(--line);margin-bottom:24px;text-align:center;}
  @media(min-width:1024px){ .result-head{ padding:48px 0 32px; margin-bottom:36px; } }
  .result-head .kicker{font-size:12px;letter-spacing:.35em;color:var(--accent);margin-bottom:14px;}
  @media(min-width:1024px){ .result-head .kicker{ font-size:13px; } }
  .result-head h2{font-size:clamp(32px,6vw,60px);line-height:1;letter-spacing:-.02em;}
  .result-head h2 em{color:var(--accent-2);font-style:italic;}

  .podium{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:10px;align-items:end;margin-bottom:32px;max-width:960px;margin-left:auto;margin-right:auto;}
  @media(max-width:620px){.podium{gap:6px;}}
  @media(min-width:1024px){.podium{ gap:20px; margin-bottom:48px; }}
  .po-card{background:var(--paper);color:var(--ink);padding:14px 10px;position:relative;text-align:center;border-radius:var(--r-lg);}
  @media(min-width:620px){ .po-card{padding:22px 18px;border-radius:var(--r-xl);} }
  @media(min-width:1024px){ .po-card{ padding:28px 22px; } }
  .po-card .po-rank{
    font-family:"Bodoni 72","Didot",serif;font-size:clamp(42px,10vw,96px);line-height:1;color:var(--accent);margin-bottom:4px;
  }
  .po-card.first{background:linear-gradient(180deg,#f5efe2 0%,#e8d9b0 100%);}
  @media(min-width:620px){ .po-card.first{padding-top:32px;padding-bottom:32px;} }
  @media(min-width:1024px){ .po-card.first{ padding-top:42px; padding-bottom:42px; } }
  .po-card.first .po-rank{color:var(--accent);font-size:clamp(54px,12vw,120px);}
  .po-card .po-photo{
    width:80%;aspect-ratio:1/1;margin:0 auto 10px;overflow:hidden;
    background:linear-gradient(135deg,#d4c9ad,#b5a685);position:relative;
    border-radius:var(--r-md);
  }
  @media(min-width:1024px){ .po-card .po-photo{ width:72%; margin-bottom:16px; } }
  .po-card .po-photo img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s;position:absolute;inset:0;}
  .po-card .po-photo img.loaded{opacity:1;}
  .po-card .po-photo .ph-fallback{
    position:absolute;inset:0;display:grid;place-items:center;
    font-family:"Bodoni 72","Didot",serif;font-size:clamp(28px,6vw,64px);color:#8a7e65;
  }
  .po-card .po-name{font-family:"Bodoni 72","Didot",serif;font-size:clamp(15px,3vw,24px);line-height:1.1;margin-bottom:4px;}
  @media(min-width:1024px){ .po-card .po-name{ font-size:28px; margin-bottom:8px; } }
  .po-card .po-band{font-size:clamp(12px,2.4vw,14px);color:#6a5f4a;}
  @media(min-width:1024px){ .po-card .po-band{ font-size:15px; } }

  .rank-list{background:var(--bg-2);border:1px solid var(--line);max-width:960px;margin-left:auto;margin-right:auto;border-radius:var(--r-lg);overflow:hidden;}
  .rank-row{
    display:grid;grid-template-columns:40px 44px 1fr auto;gap:10px;align-items:center;
    padding:10px 12px;border-bottom:1px solid var(--line);
  }
  @media(min-width:720px){ .rank-row{grid-template-columns:60px 52px 1fr auto;gap:14px;padding:12px 16px;} }
  @media(min-width:1024px){ .rank-row{grid-template-columns:72px 60px 1fr auto;gap:18px;padding:14px 22px;} }
  .rank-row:last-child{border-bottom:0;}
  .rank-row:hover{ background:rgba(200,56,28,.05); }
  .rank-row .n{font-family:"Bodoni 72","Didot",serif;font-size:22px;color:var(--accent-2);text-align:right;}
  @media(min-width:720px){ .rank-row .n{font-size:28px;} }
  @media(min-width:1024px){ .rank-row .n{font-size:34px;} }
  .rank-row .thumb{width:44px;height:44px;background:#2a2622;overflow:hidden;position:relative;flex-shrink:0;border-radius:var(--r-sm);}
  @media(min-width:720px){ .rank-row .thumb{width:56px;height:56px;} }
  @media(min-width:1024px){ .rank-row .thumb{width:64px;height:64px;} }
  .rank-row .thumb img{width:100%;height:100%;object-fit:cover;filter:grayscale(.2);opacity:0;transition:opacity .3s;position:absolute;inset:0;}
  .rank-row .thumb img.loaded{opacity:1;}
  .rank-row .nm{font-size:15px;font-weight:600;letter-spacing:.01em;min-width:0;}
  @media(min-width:720px){ .rank-row .nm{font-size:17px;} }
  @media(min-width:1024px){ .rank-row .nm{font-size:19px;} }
  .rank-row .nm small{display:block;font-weight:400;font-size:13px;color:var(--muted);margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @media(min-width:1024px){ .rank-row .nm small{ font-size:14px; margin-top:4px; } }
  .rank-row .orig{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
  @media(min-width:720px){ .rank-row .orig{font-size:12px;letter-spacing:.15em;} }
  @media(min-width:1024px){ .rank-row .orig{font-size:13px;} }

  .result-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:24px;}
  @media(min-width:1024px){ .result-actions{ margin-top:40px; } }

  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:none;
    align-items:center;justify-content:center;padding:20px;
  }
  .modal-backdrop.on{display:flex;}
  .modal{
    background:var(--bg-2);border:1px solid var(--line);max-width:520px;width:100%;
    max-height:80vh;overflow-y:auto;padding:24px;
    border-radius:var(--r-lg);
  }
  .modal h3{font-family:"Bodoni 72","Didot",serif;font-size:26px;margin-bottom:18px;}
  .history-item{padding:14px 0;border-bottom:1px solid var(--line);}
  .history-item:last-child{border-bottom:0;}
  .history-item .when{font-size:12px;color:var(--muted);margin-top:4px;}
  .history-item .who{font-size:15px;font-weight:600;line-height:1.4;}
  .modal .close{
    margin-top:18px;width:100%;padding:13px;border:1px solid var(--line);color:var(--paper);
    font-size:12px;letter-spacing:.2em;text-transform:uppercase;
    border-radius:999px;
  }

  button:focus-visible,.card:focus-visible{outline:2px solid var(--accent-2);outline-offset:2px;}

  .grain::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:100;opacity:.04;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>");
    mix-blend-mode:overlay;
  }
</style>
</head>

<script>
/* =====================================================================
   Data — Rolling Stone '11 "100 Greatest Guitarists of All Time"
   `w` = exact Wikipedia page title (with disambiguation where needed)
   ===================================================================== */
const GUITARISTS = [
  {r:1,  n:"Jimi Hendrix",       b:"The Jimi Hendrix Experience",   t:"Purple Haze",                       w:"Jimi Hendrix",       d:"右利き用ストラトを左手で逆さに弾き、フィードバックとワウを音楽に変えた。モンタレーでギターを燃やし、ウッドストックで米国国歌を爆音で解体。27歳で早世するも、以後のあらゆるロックギターの原点。"},
  {r:2,  n:"Eric Clapton",       b:"Cream / Derek and the Dominos", t:"Layla",                             w:"Eric Clapton",       d:"Yardbirds・Bluesbreakers・Creamを渡り歩いた英ブルースの伝道者。「Clapton is God」の落書きが象徴する60年代の神格化。ウーマントーンと呼ばれる甘く粘るレスポールの音色でブルースロックを定義した。"},
  {r:3,  n:"Jimmy Page",         b:"Led Zeppelin",                  t:"Stairway to Heaven",                w:"Jimmy Page",         d:"セッション出身の名職人がYardbirdsを経てZeppelinを結成。弓弾き奏法、変則チューニング、多重録音を駆使した壮大なアレンジ能力。ダブルネック・ギブソンの姿はハードロック時代の象徴となった。"},
  {r:4,  n:"Keith Richards",     b:"The Rolling Stones",            t:"(I Can't Get No) Satisfaction",     w:"Keith Richards",     d:"5弦オープンGチューニングでテレキャスターをかき鳴らす、リフの錬金術師。ソロ名人ではなくバンドのグルーヴを作る男。Human Riffの異名通り、ロックンロールのリズムそのものを体現する生きた伝説。"},
  {r:5,  n:"Jeff Beck",          b:"The Yardbirds / solo",          t:"Cause We've Ended as Lovers",       w:"Jeff Beck",          d:"ピックを捨てて指弾きとアームに専念、ギターを歌わせた孤高の革新者。ジャズ、フュージョン、エレクトロニカを横断し常に進化し続けた。同世代のロックスターとは一線を画す、ギタリストが最も尊敬するギタリスト。"},
  {r:6,  n:"B.B. King",          b:"solo",                          t:"The Thrill Is Gone",                w:"B.B. King",          d:"愛器Lucilleを抱え、一音で会場を泣かせるバタフライ・ヴィブラートの王。複音を弾かず単音のフレーズだけで語る潔さ。ブルースをショービジネスの主流へ押し上げた、モダンブルースギターの父。"},
  {r:7,  n:"Chuck Berry",        b:"solo",                          t:"Johnny B. Goode",                   w:"Chuck Berry",        d:"ダブルストップのイントロでロックンロールの文法を発明。ダックウォークしながら弾くステージングも含め、後続すべてのロックバンドの原型。ストーンズもビートルズも彼の曲でキャリアを始めた。"},
  {r:8,  n:"Eddie Van Halen",    b:"Van Halen",                     t:"Eruption",                          w:"Eddie Van Halen",    d:"1978年『Eruption』のライトハンド・タッピングで世界のロックギターを一夜で書き換えた。自作フランケンシュトレートとブラウンサウンド。技術とポップセンスを両立させた80年代ハードロックの革命児。"},
  {r:9,  n:"Duane Allman",       b:"The Allman Brothers Band",      t:"Statesboro Blues",                  w:"Duane Allman",       d:"薬瓶スライドとレスポールで南部ロックを創造。ディッキー・ベッツとのツインリード、Filmore East盤の伝説的ジャム。エリック・クラプトンと共演した『Layla』の鋭いスライドは別格。24歳でバイク事故により他界。"},
  {r:10, n:"Pete Townshend",     b:"The Who",                       t:"Baba O'Riley",                      w:"Pete Townshend",     d:"腕を風車のように振り回すウィンドミル奏法と、ステージ最後のギター破壊で知られる。パワーコードを武器に変え、『Tommy』『Quadrophenia』で二枚のロック・オペラを書き上げた作家でありギタリスト。"},
  {r:11, n:"George Harrison",    b:"The Beatles",                   t:"While My Guitar Gently Weeps",      w:"George Harrison",    d:"12弦リッケンバッカーのチャイム音、シタールを持ち込んだインド音楽、スライドギターの歌心。華やかさは避けつつ楽曲に必要な旋律を奏でる。『Weeps』でクラプトンを呼んだ謙虚さも含め、静かな主役。"},
  {r:12, n:"Stevie Ray Vaughan", b:"Double Trouble",                t:"Pride and Joy",                     w:"Stevie Ray Vaughan", d:"ヘンドリックスとアルバート・キングを融合させた80年代ブルース復興の旗手。極太弦を低くチューニングしたストラトを叩きつけるように弾く剛腕スタイル。バウイの『Let's Dance』でも名演を残す。"},
  {r:13, n:"Albert King",        b:"solo",                          t:"Born Under a Bad Sign",             w:"Albert King",        d:"左利きで右利き用フライングVを逆さに構え、弦をグイと引き下げる独特のベンディング。クラプトン、SRV、ヘンドリックスに決定的影響を与えた。Stax期のブッカー・T&MG'sとの共演は教科書。"},
  {r:14, n:"David Gilmour",      b:"Pink Floyd",                    t:"Comfortably Numb",                  w:"David Gilmour",      d:"一音の選び方と長さで情景を描く、間の達人。ブラックストラトから漏れるコンプレッションの効いたベンドは『Comfortably Numb』のソロで頂点に。ロックの中で最も叙情的なギタリスト。"},
  {r:15, n:"Freddie King",       b:"solo",                          t:"Hide Away",                         w:"Freddie King",        d:"テキサスとシカゴを繋ぐ三人のキングの一人。プラスチック製サムピックと人差し指メタルピックで弦を弾き飛ばすアタックの強さが特徴。インスト『Hide Away』はクラプトン世代のブルース入門曲。"},
  {r:16, n:"Derek Trucks",       b:"Tedeschi Trucks Band",          t:"Midnight in Harlem",                w:"Derek Trucks",       d:"ピックを使わず指のみで弾く若き天才スライドプレイヤー。13歳でプロデビュー、Allman Brothersにも参加。インド古典やコルトレーンを吸収した流麗なフレージングで、スライドギターの限界を押し広げた。"},
  {r:17, n:"Neil Young",         b:"Crazy Horse",                   t:"Cortez the Killer",                 w:"Neil Young",         d:"Old BlackことブラックレスポールでCrazy Horseと繰り広げる、フィードバックまみれの長尺ジャム。美しいメロディと歪みきったノイズが同居する二面性。グランジ世代からも尊敬を集めた。"},
  {r:18, n:"Les Paul",           b:"solo",                          t:"How High the Moon",                 w:"Les Paul",           d:"自身の名を冠したGibsonレスポールと多重録音技術を発明した、エレクトリックギターそのものの父。メアリー・フォードとの多重録音ヒット曲、96歳の死まで週末のライブを続けた生涯現役の模範。"},
  {r:19, n:"James Burton",       b:"session / Elvis Presley",       t:"Susie Q",                           w:"James Burton",       d:"テレキャスターのチキンピッキング奏法を確立したセッションの王。デイル・ホーキンス『Susie Q』のリフ、エルヴィスのTCBバンド、エミルー・ハリスのホットバンド。カントリーとロックを繋いだ橋。"},
  {r:20, n:"Carlos Santana",     b:"Santana",                       t:"Black Magic Woman",                 w:"Carlos Santana",     d:"PRSとMesa/Boogieから生まれる、長いサスティンと歌うようなトーン。ラテンパーカッションとロックを融合させ、1969年ウッドストックで無名ながら観客を圧倒。霊性と官能が同居するフレーズ。"},
  {r:21, n:"Chet Atkins",        b:"solo",                          t:"Mister Sandman",                    w:"Chet Atkins",        d:"メルル・トラヴィスを発展させた親指と3本指によるフィンガースタイル、通称サムピッキングの完成者。RCAビクターのナッシュビル支社長としてカントリー音楽の録音様式を作り変えた「ミスター・ギター」。ポップ、ジャズ、クラシックを軽々と横断する技巧で後進に絶大な影響を与えた。"},
  {r:22, n:"Frank Zappa",        b:"Mothers of Invention",          t:"Watermelon in Easter Hay",          w:"Frank Zappa",        d:"作曲家・風刺家・ギタリストの三位一体。変拍子と現代音楽語法を流し込んだ即興ソロは、ロックの文脈では例外的に知的で執拗。SGやGibson SG、後年はPerformance Guitar製のカスタムを操り、膨大な発表作品の中にロック/ジャズ/クラシックを混ぜ込んだ。"},
  {r:23, n:"Buddy Guy",          b:"solo",                          t:"Stone Crazy",                       w:"Buddy Guy",          d:"ハウリンソロと静寂のダイナミズムを自在に操る、シカゴブルースの巨人。水玉模様のストラトを振り回す派手なステージと、絞り出すような絶唱で観客を煽る姿勢はクラプトンやヘンドリックス、スティーヴィ・レイにも直接の影響を与えた。90年代以降も精力的に活動し、ブルース界の生きる教科書であり続ける。"},
  {r:24, n:"Angus Young",        b:"AC/DC",                         t:"Back in Black",                     w:"Angus Young", d:"半ズボンと学生帽で舞台を疾走する、ロックンロール最強の少年。兄マルコムの刻むバッキングの上で、一音一音に体重をかけるSGのソロは明快で肉感的。ダックウォークやストリップ演出を含めたパフォーマンス全体が、AC/DCのシンプルで巨大なリフの魅力を体現する。"},
  {r:25, n:"Tony Iommi",         b:"Black Sabbath",                 t:"Paranoid",                          w:"Tony Iommi", d:"工場勤務中に右手指先を切断しながら、義指を作り軽い弦とダウンチューニングで独自の音を構築。Black Sabbathのずっしりしたリフはヘヴィメタルの設計図そのものであり、あらゆるサブジャンルの出発点となった。影を引きずる重厚なトーンは後のスラッシュ、ドゥーム、ストーナー全てに流れ込んでいる。"},
  {r:26, n:"Brian May",          b:"Queen",                         t:"Bohemian Rhapsody",                 w:"Brian May", d:"父と自作した「Red Special」1本と、コインをピック代わりに使う独自奏法で音楽を築いた天体物理学博士。多重録音による分厚いギターオーケストラはQueenの代名詞で、ボヘミアン・ラプソディなどに結実。メロディアスで歌心のあるソロは即興より構築を重んじる作曲家のそれである。"},
  {r:27, n:"Bo Diddley",         b:"solo",                          t:"Bo Diddley",                        w:"Bo Diddley", d:"自身の名を冠したシンコペーションのビートは、ロックンロール、ブルース、R&B、ヒップホップまで延々と再利用されている。長方形のボディを持つ自作グレッチを振りかざし、ジャングルのようなリズムを生み出した。50年代に既にエレキギターを打楽器として扱い、ロックのアフリカ的なルーツを可視化した人物。"},
  {r:28, n:"Johnny Ramone",      b:"Ramones",                       t:"Blitzkrieg Bop",                    w:"Johnny Ramone", d:"モズライトを低く構え、ダウンピッキングのみでハイスピードに刻み続けたパンクの基礎設計者。ソロは取らず派手な技巧も用いず、1〜3コードを壁のように打ち付けるスタイルはその後のあらゆるパンク/ハードコアの原型となった。飾り気のない機関銃のような刻みが、ラモーンズの速度と怒りを生んだ。"},
  {r:29, n:"Scotty Moore",       b:"Elvis Presley",                 t:"Hound Dog",                         w:"Scotty Moore", d:"1954年のサン・スタジオでプレスリーと共にロックンロールを発明した当事者。Heartbreak HotelやHound Dogで見せるハイブリッドピッキングとカントリー由来のチキンピッキングはロックギター最初期の語彙となった。キース・リチャーズが「彼が最初のヒーローだった」と語る、静かだが偉大な先駆者。"},
  {r:30, n:"Elmore James",       b:"solo",                          t:"Dust My Broom",                     w:"Elmore James", d:"「Dust My Broom」の冒頭スライドリフはエレクトリック・ブルース最も有名なフレーズのひとつ。ロバート・ジョンソンから受け継ぎ増幅したスライド奏法は、デュアン・オールマンを筆頭に後続の全スライドプレイヤーへと引き継がれた。声の迫力と一体化した鋭いスライドは、情熱の塊のような音楽を残している。"},
  {r:31, n:"Ry Cooder",          b:"solo",                          t:"Paris, Texas",                      w:"Ry Cooder", d:"ボトルネックとフィンガースタイルを駆使し、デルタブルース、ハワイアン、テックス・メックス、キューバ、マリ音楽まで世界中の音楽を横断するアメリカ音楽の探訪者。Paris, Texasのサウンドトラックに代表される映画音楽でも知られ、Buena Vista Social Clubを世界に紹介した立役者でもある。"},
  {r:32, n:"Billy Gibbons",      b:"ZZ Top",                        t:"La Grange",                         w:"Billy Gibbons", d:"深く歪んだレスポールと粘り気のあるピッキングで、テキサス・ブギの地平を切り拓いたZZ Topの司令塔。ペソの小銭をピック代わりに使うこともある独特のトーン感覚と、La Grangeに代表される下半身の効いたグルーヴで、南部ロックとブルースを商業的成功と結び付けた職人肌のリフメイカー。"},
  {r:33, n:"Prince",             b:"solo",                          t:"Purple Rain",                       w:"Prince (musician)", d:"ギター、作曲、プロデュース、歌、ダンスまで全てを1人でこなした万能の天才の、とりわけ過小評価されがちな側面が鋭いリードプレイ。Purple Rainのエンディングに象徴されるファルセット域の叫びのようなソロは、ヘンドリックス以降で最も劇的なロックギターの瞬間の一つ。"},
  {r:34, n:"Curtis Mayfield",    b:"The Impressions / solo",        t:"Superfly",                          w:"Curtis Mayfield", d:"オープンFシャープ・チューニングで奏でる柔らかく浮遊感のあるコードワークと、重なる甘い声。The Impressionsでの公民権運動期のメッセージソング、Super Flyでのスウィートなソウルギターはヒップホップのサンプリングソースとして脈々と受け継がれる。"},
  {r:35, n:"John Lee Hooker",    b:"solo",                          t:"Boom Boom",                         w:"John Lee Hooker", d:"コードもリズムも自分の都合で変える、規則性を拒絶したブギの大家。足踏みのビートと語るような歌の間に、スタッカートで鋭く切り込むギターが入り、聴き手は本人のグルーヴに飲み込まれる。ミシシッピ由来の純度の高いブルース感覚を、最後まで商業的に洗練させずに押し通した一匹狼。"},
  {r:36, n:"Randy Rhoads",       b:"Ozzy Osbourne / Quiet Riot",    t:"Crazy Train",                       w:"Randy Rhoads", d:"クラシック音楽の語彙をメタルに持ち込んだパイオニア。Crazy TrainやMr. Crowleyの美しく構築されたソロは、細部まで作り込まれた作曲的アプローチで、それ以降のシュレッド系ギタリストの道を示した。25歳で飛行機事故により他界した悲劇も、伝説の一部となっている。"},
  {r:37, n:"Mick Taylor",        b:"The Rolling Stones",            t:"Can't You Hear Me Knocking",        w:"Mick Taylor", d:"ブルースブレイカーズでクラプトンの後任を務めた天才。ストーンズに在籍した1969〜74年の黄金期、Can't You Hear Me KnockingやSway等で見せる歌うようなスライドとメロディックなソロはバンド史上最も音楽的な時期を築いた。繊細なタッチとフレーズの美しさはキースとは対照的な魅力を持つ。"},
  {r:38, n:"The Edge",           b:"U2",                            t:"Where the Streets Have No Name",    w:"The Edge", d:"ディレイとリバーブを大胆に駆使し、8分音符と16分音符のリフレインでU2の空間的なサウンドを設計した音響派の先駆者。派手な速弾きとは無縁ながら、Where the Streets Have No NameやWith or Without Youの空気のような轟音でロックの新しい広がりを提示した。エフェクターを楽器の一部とした設計思想は90年代以降のあらゆるロックに影響を与えている。"},
  {r:39, n:"Steve Cropper",      b:"Booker T. & the M.G.'s",        t:"Green Onions",                      w:"Steve Cropper", d:"スタックス・レコードのハウスギタリストとして、オーティス・レディングの「Dock of the Bay」やサム&デイヴの諸作品を共作・演奏。音数を絞り、歌とホーンのために空間を作るテレキャスターの教科書的なカッティングは、ソウル/R&Bのギター文法そのもの。Booker T. & the M.G.'sではGreen Onionsの名リフで知られる。"},
  {r:40, n:"Tom Morello",        b:"Rage Against the Machine",      t:"Killing in the Name",               w:"Tom Morello", d:"キルスイッチ、ワーミー、スクラッチ風奏法でギターをターンテーブルのように鳴らすRATMの革命家。Killing in the Nameなどで聞かれる非楽音的なソロは、ロックとヒップホップを正面から接続した画期的な発明。ハーヴァードで政治学を修めた理論武装の上で、音と政治的メッセージを結合したアジテーター。"},
  {r:41, n:"Mick Ronson",        b:"David Bowie",                   t:"Moonage Daydream",                  w:"Mick Ronson", d:"グラムロック期デヴィッド・ボウイの右腕として、Ziggy Stardust〜Aladdin Saneのサウンドを作り上げたアレンジャー兼ギタリスト。メロディアスで歌心のあるリードとクラシックに通じた編曲能力で、ボウイのポップ性と演劇性を支えた。ルー・リードのTransformerプロデュースなど裏方としても輝いた。"},
  {r:42, n:"Mike Bloomfield",    b:"Paul Butterfield Blues Band",   t:"East-West",                         w:"Mike Bloomfield", d:"10代でマディ・ウォーターズの前座を務めた早熟の天才。East-West収録の長尺インプロはロックのジャム文化を準備し、ボブ・ディランのライク・ア・ローリング・ストーン等にも参加してシカゴ・ブルースをロック界に橋渡しした。若くして亡くなったが、白人ブルースプレイヤーの最初期の頂点として記憶される。"},
  {r:43, n:"Hubert Sumlin",      b:"Howlin' Wolf",                  t:"Smokestack Lightnin'",              w:"Hubert Sumlin", d:"ハウリン・ウルフのシカゴ・ブルース期を支えた相棒。ウルフの荒々しい絶唱の隙間を縫うように切り込む鋭いリフとピック無しの指弾きは、キース・リチャーズが自分のヒーローと公言するほど独特の存在感を持つ。音数の少なさが逆に強烈な個性となるタイプの名手。"},
  {r:44, n:"Mark Knopfler",      b:"Dire Straits",                  t:"Sultans of Swing",                  w:"Mark Knopfler", d:"スリーフィンガーでストラトを弾く独学派。Dire StraitsのSultans of Swing冒頭のアルペジオに代表される、ピックを使わないクリーンで粒立ちのよい音が彼の指紋。ジャズ・R&B・カントリーを消化したメロディ重視のリード、そしてローカル・ヒーローやPrincess Brideの映画音楽でも知られる英国の職人。"},
  {r:45, n:"Link Wray",          b:"solo",                          t:"Rumble",                            w:"Link Wray", d:"1958年のインスト「Rumble」で、意図的に生み出した歪みとパワーコードのサウンドによりロックギターの攻撃性を提示した父。若き日のピート・タウンゼント、イギー・ポップ、ジミー・ペイジら全員が彼の名を挙げる。歌詞の無いその曲が米国で放送禁止になった、唯一のインスト曲としても知られる。"},
  {r:46, n:"Jerry Garcia",       b:"Grateful Dead",                 t:"Ripple",                            w:"Jerry Garcia", d:"Grateful Deadの長大なインプロをリードした、米国ヒッピー文化の象徴。バンジョーやブルーグラスも弾きこなすルーツ感覚とジャズ的な探究心で、Fire on the MountainやEyes of the Worldの浮遊するソロを作った。60年代のアシッドテストから90年代まで、ステージの度に別物になる即興の伝道者。"},
  {r:47, n:"Stephen Stills",     b:"CSN&Y / Buffalo Springfield",   t:"For What It's Worth",               w:"Stephen Stills", d:"バッファロー・スプリングフィールド、CSN&Yで戦友のニール・ヤングと火花を散らしたシンガー兼ギタリスト。For What It's Worthの気だるいリフやBluebirdのアコースティックな手数、ハーモナイズの職人技が特徴。ギター/ベース/歌/アレンジまで自分でこなす1970年前後の米国フォークロックの重要人物。"},
  {r:48, n:"Jonny Greenwood",    b:"Radiohead",                     t:"Paranoid Android",                  w:"Jonny Greenwood", d:"ピアニスト、アレンジャー、ノイズメイカーを兼ねたRadioheadの多才な男。Paranoid Androidの不穏なソロ、In Rainbowsのオンドマルトノ、映画音楽で聞ける微分音まで、ロックギターの定型を破壊し続ける現代音楽寄りの探究者。リフより音響を設計する、21世紀的なギタリスト像の代表。"},
  {r:49, n:"Muddy Waters",       b:"solo",                          t:"Mannish Boy",                       w:"Muddy Waters", d:"デルタからシカゴへ、ブルースに電気を通した「King of Chicago Blues」。Rollin' StoneやMannish Boyで聴こえる粘るスライドと雷のような声が、ストーンズの名前から英国R&Bブームまで全ての源流となった。ローリング・ストーン誌の歴代ギタリスト企画で常に最上位に名を連ねる、ブルースの根っこ。"},
  {r:50, n:"Ritchie Blackmore",  b:"Deep Purple / Rainbow",         t:"Smoke on the Water",                w:"Ritchie Blackmore", d:"クラシカルなフレーズを速弾きに持ち込んだハードロック/メタル黎明期の職人。Smoke on the Waterの名リフと共に、HighwayStarやBurnの長尺ソロで後のシュレッド世代に道を示した。ストラト使いの先駆者でもあり、中世風衣装のRainbow期を含めて神秘と様式美の美学を貫いた。"},
  {r:51, n:"Johnny Marr",        b:"The Smiths",                    t:"How Soon Is Now?",                  w:"Johnny Marr", d:"ストラトとリックのジャズ・バーンで鮮やかなアルペジオを紡ぐ、The Smithsの音の風景画家。コード感覚と装飾音のセンスは、モリッシーのメロディの下で常に独立した歌を鳴らしているかのよう。パンク以降の英国ギターポップの教科書と言える存在で、モデストマウスやクロマティックスらにも参加した。"},
  {r:52, n:"Clarence White",     b:"The Byrds",                     t:"Nashville West",                    w:"Clarence White", d:"ブルーグラス出身の技巧派で、Byrdsのカントリーロック化を牽引。自ら考案したパーセンションを搭載したB-ベンダー・テレキャスターは、スティール・ギターのような音程変化をピック一つで実現する革命的な改造。交通事故で33歳で他界したが、その発明は以後の全カントリー・ギタリストに受け継がれている。"},
  {r:53, n:"Otis Rush",          b:"solo",                          t:"All Your Love",                     w:"Otis Rush", d:"マジック・サムと並ぶウェストサイド・シカゴ・ブルースの雄。左手で薬指/小指を効かせる独特のビブラートと、苦悶する絶唱は、ステヴィー・レイ・ヴォーンやクラプトンが直接影響源と語る。So ManyRoadsなどの慟哭のような演奏は、ブルースの感情の深さを規定するレベルに達している。"},
  {r:54, n:"Joe Walsh",          b:"Eagles / James Gang",           t:"Hotel California",                  w:"Joe Walsh", d:"ジェームス・ギャング時代のFunk #49、イーグルスでのHotel California後半のリードなど、ロック史に残るソロで知られる。トーカーボックスを流行らせたRocky Mountain Wayのシンセ風リードは衝撃的で、1970年代の音色革新の象徴となった。シリアスな技巧の裏にユーモアも忘れない、芯のあるギタリスト。"},
  {r:55, n:"John Lennon",        b:"The Beatles",                   t:"A Hard Day's Night",                w:"John Lennon", d:"ビートルズのリズムギタリストとしての優れた感覚が特に評価される。Daytripper、Ticket to Rideのリフ、Come Togetherのコード使い、Revolutionの歪み実験、アコースティックでのNorwegian Woodなど、曲を支えるパートを的確に担当。単独名義でもImagineのピアノ伴奏や、Plastic Ono Bandの生々しい演奏で個性を見せた。"},
  {r:56, n:"Albert Collins",     b:"solo",                          t:"Frosty",                            w:"Albert Collins", d:"「Master of the Telecaster」と呼ばれる、テキサス・ブルースを氷の鋭さで再定義した男。指で弾く強力なピッキングとカポ使い、そしてステージでの長いギターシールドで客席まで歩き回るパフォーマンスで熱狂を生んだ。ロバート・クレイと並ぶ80年代ブルースリバイバルの立役者の一人。"},
  {r:57, n:"Rory Gallagher",     b:"solo",                          t:"Shadow Play",                       w:"Rory Gallagher", d:"アイルランドが生んだブルースロックの侠客。汗にまみれたストラトとMessenger、質屋で買ったFender Champアンプで駆け抜けた生涯のライブは今も語り草。技巧を誇示せずあくまで曲のために弾く姿勢でブライアン・メイやスラッシュから尊敬を集め、多くの後続に影響を与えた裏のヒーロー。"},
  {r:58, n:"Peter Green",        b:"Fleetwood Mac",                 t:"Black Magic Woman",                 w:"Peter Green (musician)", d:"初期フリートウッド・マックの立役者で、Albatross、Black Magic Woman、Oh Wellなどの名曲を書いたブリティッシュ・ブルース屈指のソングライター兼ギタリスト。B.B.キング本人が「唯一冷や汗をかかせる」と讃えた繊細な泣きのトーンは、同世代のクラプトンとも異なる英国ブルースの精華。"},
  {r:59, n:"Robbie Robertson",   b:"The Band",                      t:"The Weight",                        w:"Robbie Robertson", d:"The Bandのギタリストで、The Weight、The Night They Drove Old Dixie Downなど1960〜70年代の米国ルーツロックの金字塔を書いた男。単音で語るような寡黙なソロとテレキャスターの渋い音色、そしてThe Last Waltzを含む楽曲性重視の姿勢で、ギターを聞かせるのではなくバンドを聞かせる美学を確立した。"},
  {r:60, n:"Ron Asheton",        b:"The Stooges",                   t:"I Wanna Be Your Dog",               w:"Ron Asheton", d:"The StoogesのメンバーでI Wanna Be Your Dog、Raw Power等の原型を作ったプロトパンクの開祖。子供の怒りをそのまま鉛のように重いパワーコードで打ち付ける、60年代末の異例の攻撃性。パンクロック、ガレージ、グランジ全てのルーツに立つ、ゆるぎない硬派の象徴。"},
  {r:61, n:"Dickey Betts",       b:"The Allman Brothers Band",      t:"Ramblin' Man",                      w:"Dickey Betts", d:"Allman Brothersでデュアン・オールマンの相方を務めたツインリードの名手。デュアン他界後はバンドを支える中心となり、Ramblin' Manなど南部ロックの主要曲を書いた。カントリー/ブルーグラス由来のメロディックなソロとアルバート・キング風のブルースフィーリングを両立させた、芯の強い奏者。"},
  {r:62, n:"Robert Fripp",       b:"King Crimson",                  t:"21st Century Schizoid Man",         w:"Robert Fripp", d:"キング・クリムゾンの司令塔。21st Century Schizoid Manの狂気からDisciplineの幾何学模様のインターロッキングまで、論理と感情を直交させた知的プレイの極地。ブライアン・イーノとのFrippertronicsで提唱したループ音楽は、その後のアンビエント音楽の重要な源流となった。"},
  {r:63, n:"Johnny Winter",      b:"solo",                          t:"Rock and Roll Hoochie Koo",         w:"Johnny Winter", d:"テキサス生まれのブルース狂人。ファイアーバードを振り回して早弾きのブルースを吹き荒らし、JohnnyWinter AndやStill Aliveでは白濁した情熱を炸裂させた。マディ・ウォーターズを1970年代にプロデュースしブルース界の巨匠復活に貢献した、ブルースに尽くした白人ギタリスト。"},
  {r:64, n:"Duane Eddy",         b:"solo",                          t:"Rebel Rouser",                      w:"Duane Eddy", d:"トゥワンギーという言葉で象徴される、深いトレモロとリバーブで低音弦をねっとり鳴らすインスト・ロックの先駆者。Rebel Rouser、Peter Gunnのテーマ曲などで1950〜60年代の米国ロックの音色を設計した。ブルースではなく明瞭なメロディを軸にした構成で、サーフ・ロックの父とも呼ばれる。"},
  {r:65, n:"Slash",              b:"Guns N' Roses",                 t:"Sweet Child O' Mine",               w:"Slash (musician)", d:"ガンズ・アンド・ローゼズの象徴。シルクハットと煙草、レスポールにひたすら似合う姿。Sweet Child o' Mineの華麗なイントロやNovember Rainの叙情的なソロで、80年代後半〜90年代のハードロックのアイコンとなった。飾り気のない男前なトーンとブルース由来のフィーリングで世界中のギター小僧を魅了した。"},
  {r:66, n:"Leslie West",        b:"Mountain",                      t:"Mississippi Queen",                 w:"Leslie West", d:"Mississippi QueenのリフとナンタケットスレイリッジでHRバンドMountainを率いた大柄な男。レス・ポール・ジュニアの分厚いトーンでサウンドピクチャーを描くような演奏は、ジャック・ブルースとも共演したクリーム以降のパワートリオ・ブルースロックの実例として影響を残した。"},
  {r:67, n:"T-Bone Walker",      b:"solo",                          t:"Call It Stormy Monday",             w:"T-Bone Walker", d:"エレキ・ブルースの最も初期の体系を作ったヒューストン出身のジャズ/ブルース・ギタリスト。Stormy Mondayのジャズ的コードワークとシングルノート・ソロはB.B.キングをはじめ全ブルース・ギタリストの手本となった。アンプでブルースを弾くという発想自体が、彼から始まったと言って差し支えない。"},
  {r:68, n:"John McLaughlin",    b:"Mahavishnu Orchestra",          t:"Birds of Fire",                     w:"John McLaughlin (musician)", d:"マイルス・デイヴィスの電化期Bitches BrewやIn a Silent Wayに参加し、Mahavishnu Orchestraでジャズ・ロック・フュージョンを開拓した英国人。超高速のピッキングとインド音楽/スピリチュアリティを融合したShaktiなど、ギターの可能性をジャズの側から押し広げた巨星。"},
  {r:69, n:"Richard Thompson",   b:"Fairport Convention / solo",    t:"1952 Vincent Black Lightning",      w:"Richard Thompson (musician)", d:"フェアポート・コンヴェンションのギタリストとして英国フォークロックを築き、ソロでも独特な変則チューニングとフィンガーピッキングで密度の高い作品を残す。Meet on the Ledgeなどの楽曲に漂う静かな孤独感、そして生ギター1本でも圧倒的な情報量を生み出す手捌きは、英国フォーク/ロック界で別格の尊敬を集める。"},
  {r:70, n:"Jack White",         b:"The White Stripes",             t:"Seven Nation Army",                 w:"Jack White", d:"Fuzzy for the Love of Teeny Riffに象徴される、ミニマルで獰猛なリフメイカー。ピックアップがF-ホールに浮かぶ安物のAirlineギターとシリルアンプで、ホワイト・ストライプスの生々しいガレージ・ブルースを作った。プロデュース、レーベル運営、楽器オタクとしても知られる、21世紀のブルース蘇生役。"},
  {r:71, n:"Robert Johnson",     b:"solo",                          t:"Cross Road Blues",                  w:"Robert Johnson", d:"1936〜37年にたった29曲しか残さなかった、神話的存在。Cross Road Blues、Love in Vain、Hellhound on My Trailなどのデルタブルース最重要作品は、ロバート・プラント、キース・リチャーズ、クラプトンらに絶大な衝撃を与え、ロックのブルース受容の原点となった。27歳で謎めいた死を遂げた伝説そのもの。"},
  {r:72, n:"John Frusciante",    b:"Red Hot Chili Peppers",         t:"Under the Bridge",                  w:"John Frusciante", d:"レッド・ホット・チリ・ペッパーズの音楽的支柱。ハモンドやモーグのような音まで想起させる立体的なコードワークと、Under the BridgeやScar Tissueで見せる泣きのメロディセンスで、バンドの1990年代以降の飛躍を支えた。精神的に抱えたものを音に転化するタイプの、21世紀屈指の繊細なプレイヤー。"},
  {r:73, n:"Kurt Cobain",        b:"Nirvana",                       t:"Smells Like Teen Spirit",           w:"Kurt Cobain", d:"Nirvanaのフロントマンとして、Smells Like Teen SpiritやCome As You Areでグランジという呼称を全世界に知らしめた。歪ませた単音リフと、ディストーションに埋もれた内省的なコードストロークは、高度な技巧ではなく感情で勝負するギター観を1990年代に決定づけた。技ではなく姿勢で時代を作った人。"},
  {r:74, n:"Dick Dale",          b:"solo",                          t:"Misirlou",                          w:"Dick Dale", d:"「サーフ・ギターの王」。富士弦製のストラトを爪先でピックし、中東音階と超高速ピッキングで「Misirlou」を演奏。Pulp Fictionのオープニング曲として使用されたこの一曲が、サーフ・ロックとはなにかを世界に改めて広めた。自らアンプ開発にも関わり、大音量耐性を追求した50年代の技術革新者。"},
  {r:75, n:"Joni Mitchell",      b:"solo",                          t:"Big Yellow Taxi",                   w:"Joni Mitchell", d:"DGDFC#Cなど、60を超える変則チューニングを駆使してアコースティック・ギターで独自の和声空間を作り出したシンガーソングライター。Big Yellow Taxi、Blue、A Case of Youなどで奏でる浮遊感のあるコード感は、ギター一本の弾き語りの可能性を大きく押し広げた。絵画的でパーソナルな音楽表現。"},
  {r:76, n:"Robby Krieger",      b:"The Doors",                     t:"Light My Fire",                     w:"Robby Krieger", d:"フラメンコを学んだ経歴を持つThe Doorsの影の功労者。Light My Fireの長尺ソロやSpanish Caravanのクラシカルな前奏で、ジム・モリソンの耽美に異国的な色彩を加えた。ピックを使わず指と爪で繊細な表情を作る、ロックの中では比較的珍しいスタイル。"},
  {r:77, n:"Willie Nelson",      b:"solo",                          t:"On the Road Again",                 w:"Willie Nelson", d:"ガット弦のマーティンN-20「Trigger」一本で自分のサウンドを確立した、米国音楽の生きた宝。ジャズ由来のシンコペーションを交えたリードと、オフビートの歌、独特のタイム感覚で、カントリー、フォーク、ジャズの境目を溶かした。On the Road Againに象徴されるポピュラー音楽の国民的アイコン。"},
  {r:78, n:"John Fahey",         b:"solo",                          t:"The Yellow Princess",               w:"John Fahey (musician)", d:"アメリカン・プリミティヴ・ギターの発明者。デルタ・ブルースとインド音楽、現代音楽を1人で溶かしたインストゥルメンタルのソロ・ギター音楽を提示し、レオ・コッケからジム・オルークまで広く影響を与えた。Blind Joe Deathというペンネームでも知られる、隠遁的な神秘家。"},
  {r:79, n:"Mike Campbell",      b:"Tom Petty and the Heartbreakers",t:"Refugee",                          w:"Mike Campbell (musician)", d:"トム・ペティのバンドで、Refugee、American Girl、Free Fallin'など時代を越える名曲のリフと共に鳴り響いたメロディストリセラー。Rickenbackerの12弦ストラムとテレキャスターの粒立ちの良いリードが得意で、ローリング・ストーンズにも参加するような職人的信頼性を持つ裏方のロック伝説。"},
  {r:80, n:"Buddy Holly",        b:"The Crickets",                  t:"Peggy Sue",                         w:"Buddy Holly", d:"That'll Be the Day、Peggy Sueなど、短い曲の中にロックンロールのテンプレートを詰め込んだ開祖の1人。ストラトを全面に立てたシンプルなバンド編成、ハーフダウンストロークを多用する若々しい刻み、そしてメガネをかけた素朴なキャラクターは、ビートルズからEliott Smithまで幅広く愛された。"},
  {r:81, n:"Lou Reed",           b:"The Velvet Underground / solo", t:"Sweet Jane",                        w:"Lou Reed", d:"ヴェルヴェット・アンダーグラウンドでI'm Waiting for the ManやHeroinのノイジーなストロークを担当した、NYアングラロックの生みの親。オーガスタスのような単音ソロに留まらず、ぶつけるようなカッティングとディストーション、フィードバックでパンク以降のDIYギター観を準備した、前衛ロックの重要人物。"},
  {r:82, n:"Nels Cline",         b:"Wilco",                         t:"Impossible Germany",                w:"Nels Cline", d:"Wilcoの音響派リードギタリスト。Impossible GermanyやAt Least That's What You Saidで繰り広げるフリージャズ寄りの狂騒的なソロは、オルタナカントリーを現代音楽に接続した。自身のバンドThe Nels Cline Singersでは即興フュージョンも展開する、21世紀有数の前衛派。"},
  {r:83, n:"Eddie Hazel",        b:"Funkadelic",                    t:"Maggot Brain",                      w:"Eddie Hazel", d:"ファンカデリックのMaggot Brainで10分にわたる絶唱の泣きギターを弾き切った、サイケデリック・ファンクの魂。「母親が死んだように弾いて」とジョージ・クリントンに指示され録音された一発録りは、ロックギター史上最も感情的なソロの一つとして語り継がれている。"},
  {r:84, n:"Joe Perry",          b:"Aerosmith",                     t:"Walk This Way",                     w:"Joe Perry (musician)", d:"エアロスミスのリフを生む屋台骨。Walk This Wayの切れのあるリズムギターとSweet Emotionの空気感、Dream Onの叙情性など、1970年代ハードロックの幅広さを体現した。レスポールの唸りをそのまま血肉にしたような、土埃のあるアメリカン・ロックのギタリスト像を決定付けた人。"},
  {r:85, n:"Andy Summers",       b:"The Police",                    t:"Every Breath You Take",             w:"Andy Summers", d:"ザ・ポリスの空間設計者。EveryBreath You Takeの有名なアルペジオやRoxanneの隙間だらけのカッティングなど、レゲエとジャズフュージョンを融合したクリーントーンのコードワークでロックのギター観を刷新した。コーラスとディレイを組み合わせた80年代的なサウンドデザインのパイオニア。"},
  {r:86, n:"J Mascis",           b:"Dinosaur Jr.",                  t:"Freak Scene",                       w:"J Mascis", d:"Dinosaur Jr.のフロントマンで、ディストーションとフィードバックを浴びるような壁を作るソロスタイルを確立。ニール・ヤングの轟音とハードコアの攻撃性を併せ持つ、90年代米国インディロックの象徴的ギターヒーロー。弱々しい声と対照的な、超ラウドなソロの破壊力が独自の美学を形成する。"},
  {r:87, n:"James Hetfield",     b:"Metallica",                     t:"Master of Puppets",                 w:"James Hetfield", d:"MetallicaのリフマスターでMaster of Puppets、One、Enter Sandman等スラッシュメタルの金字塔を書き続けた男。高速ダウンピッキングの鬼で、その手首は伝説。曲全体を通して一切手を緩めないバッキングの剛腕ぶりで、ソロを取るカーク・ハメットを下支えする存在。"},
  {r:88, n:"Carl Perkins",       b:"solo",                          t:"Blue Suede Shoes",                  w:"Carl Perkins", d:"ブルー・スエード・シューズでロックンロールの原型を書き、エルヴィスに提供した曲でも知られる。ブリッジ・ミュートを駆使したトラヴィスピッキング的なカントリーロック奏法は、ビートルズをはじめ第一世代ロックンロール全てに影響を与えた、サン・レコーズの核。"},
  {r:89, n:"Bonnie Raitt",       b:"solo",                          t:"Something to Talk About",           w:"Bonnie Raitt", d:"スライドとフィンガーピッキングを自在に操る、女性ブルース/ロックの代表格。ストラトキャスターの指板を素手で押さえて繰り出す粘りのスライドは男性陣にも負けない迫力。Angel From Montgomery、Something to Talk Aboutなどでの歌とギターの統合は、シンガーソングライターの到達点の一つ。"},
  {r:90, n:"Tom Verlaine",       b:"Television",                    t:"Marquee Moon",                      w:"Tom Verlaine", d:"テレビジョンのフロントマンとしてNYパンクを文学と知性の方向に拡張した詩人ギタリスト。Marquee Moonの10分を超える対話的なツインギターは、パンク初期に既に即興とプログ的構成を持ち込んでいた。リチャード・ロイドとの絡みは、ロックのギターインタープレイの最も洗練された例として今も聴き継がれる。"},
  {r:91, n:"Dave Davies",        b:"The Kinks",                     t:"You Really Got Me",                 w:"Dave Davies", d:"The KinksのYou Really Got MeやAll Day and All of the Nightで、アンプのスピーカーをナイフで切り刻んでファズの原型を自作した張本人。兄レイの陰に隠れがちだが、1964年時点で最もラウドで最も歪んだロックのリフを発明していたのは彼。ハードロックとパンクの、おそらく本当の起源。"},
  {r:92, n:"Dimebag Darrell",    b:"Pantera",                       t:"Cowboys from Hell",                 w:"Dimebag Darrell", d:"Panteraのギタリスト。Cemetery GatesやWalkなどで聴ける、ビブラートと不協和音を織り交ぜた独特のスクイール、そしてブリッジ・ミュート主体のダウン・タイムド・リフで、グルーヴメタルの様式を確立した。2004年にステージ上で狙撃され他界した衝撃の末路も、歴史に深く刻まれている。"},
  {r:93, n:"Paul Simon",         b:"Simon & Garfunkel / solo",      t:"Graceland",                         w:"Paul Simon", d:"ポール・サイモンのフィンガースタイルは、The Boxerの力強いストロークやThe Sound of Silenceの静謐なアルペジオ、Me and Julio Down by the Schoolyardの陽気なリフなど、ポップスの中のアコースティック・ギター表現の代表例。ソロ作ではアフリカ音楽や南米音楽を採り入れ、世界音楽とアメリカンポップを繋いだ。"},
  {r:94, n:"Peter Buck",         b:"R.E.M.",                        t:"Losing My Religion",                w:"Peter Buck", d:"R.E.M.の要。Rickenbacker 360の甘く煌めく鈴鳴りアルペジオで、Don'tGo Back to Rockville、Losing My Religion(マンドリン)、Driverの各曲で1980〜90年代オルタナロックの音の風景を塗り替えた。派手なソロではなくコード進行そのものを主役にする、ポップ・ソングライティングの達人。"},
  {r:95, n:"Roger McGuinn",      b:"The Byrds",                     t:"Mr. Tambourine Man",                w:"Roger McGuinn", d:"The ByrdsでMr. Tambourine Manのリッケンバッカー12弦のサウンドを世界に広めた、フォーク・ロックの父。コードトーンの中に旋律を織り込むアルペジオ・スタイルは、ペトラ・ヘイデンからジョニー・マーまで多くのギタリストに影響を与えた。ディランとポップの橋渡しをした歴史的役割も大きい。"},
  {r:96, n:"Bruce Springsteen",  b:"The E Street Band",             t:"Born to Run",                       w:"Bruce Springsteen", d:"E Street Bandを率い、Born to RunやBorn in the U.S.A.などアメリカン・ロックの王道を書き続けた詩人。派手なテクニックよりも曲に奉仕するリフと熱いソロで勝負するタイプで、フェンダー・テレキャスターを黒く汚れたままで弾く姿は労働者階級ロックの象徴。ロックの書き手=演り手の手本となった。"},
  {r:97, n:"Steve Jones",        b:"Sex Pistols",                   t:"Anarchy in the U.K.",               w:"Steve Jones (musician)", d:"セックス・ピストルズで、たった1本のギターでAnarchy in the U.K.とGod Save the Queenを支えた、英パンク誕生の張本人。複雑なことはできないと本人が認める上での、厚くざらついたパワーコードのダブル・トラッキングは、パンクを「音そのもの」として現前させる偉大な手つき。"},
  {r:98, n:"Alex Lifeson",       b:"Rush",                          t:"Tom Sawyer",                        w:"Alex Lifeson", d:"Rushのギタリストで、複雑な変拍子とオーケストレーション的なコードワーク、多彩なエフェクトでプログレッシブロックのギター像を拡張した技術派。Tom Sawyer、YYZ、La Villa Strangiatoなどで見せる緻密な構成力は、後続の全プログ・メタル勢の教科書となっている。"},
  {r:99, n:"Thurston Moore",     b:"Sonic Youth",                   t:"Teen Age Riot",                     w:"Thurston Moore", d:"Sonic Youthでキム・ゴードンと共に、オルタナティヴ・ロックの音響的可能性を押し広げた実験家。プリペアド・ギター(弦の間にドライバーを挟む等)や独自の変則チューニングで雑音を楽音に転じ、Teen Age Riot、100%などでノイズとポップを同居させた。90年代US Indieの音の知性。"},
  {r:100,n:"Lindsey Buckingham", b:"Fleetwood Mac",                 t:"Go Your Own Way",                   w:"Lindsey Buckingham", d:"Fleetwood Mac第2黄金期の立役者。Tuscの独創的な構成やGo Your Own Wayの切れのあるリフはもちろん、Landslideの裏で静かに支えるアコースティックのアルペジオまで、指弾きのフィンガースタイルによる緻密な音運びで知られる。ポップの中の職人的複雑さを体現するソングライター兼ギタリスト。"},
  // ===== Additional guitarists from Guitar World's "100 Greatest" (2023) =====
  // Ranks 101+ are reference IDs (no intrinsic order) — pool extension for sorting.
  // Metal / hard rock
  {r:101,n:"Steve Lukather",     b:"Toto / session",                t:"Rosanna",                           w:"Steve Lukather", d:"ロサンゼルスのスタジオミュージシャン界を牽引した万能職人。Totoでのリードだけでなく、マイケル・ジャクソンのBeat Itのリズムギターや、数千のセッション参加曲でその音を聴くことができる。メロディックで歌うようなソロと、プロデューサーとしての的確な判断力で、業界全体を支えた裏方の頂点。"},
  {r:102,n:"Brian Setzer",       b:"Stray Cats",                    t:"Rock This Town",                    w:"Brian Setzer", d:"グレッチ6120を振り回して50年代のロカビリーを1980年代に蘇らせたStray Catsのフロントマン。Rock This TownやStray Cat Strutで聴けるハイブリッドピッキングとチキンピッキングの冴えは、テレキャスター一辺倒だったロカビリー観を一新。後にオーケストラと組んだスウィング作品でも成功を収めた。"},
  {r:103,n:"Dave Mustaine",      b:"Megadeth",                      t:"Holy Wars... The Punishment Due",   w:"Dave Mustaine", d:"Metallica脱退後にMegadethを率い、スラッシュメタルの知性派を体現した男。Holy WarsやTornado of Soulsのような目まぐるしく展開する長尺ソロは、通常のハードロックのフォーマットを超えた構成力の現れ。強い個性とカリスマ、そして執拗なまでの技巧志向でメタル界を揺るがし続けている。"},
  {r:104,n:"Marty Friedman",     b:"Megadeth / Cacophony",          t:"Tornado of Souls",                  w:"Marty Friedman", d:"Megadethの黄金期Rust in Peaceでデイヴ・ムステインと火花を散らした日本在住のメロディスト。日本の演歌や邦楽的なフレージングをメタルに持ち込んだ独自の音楽語法と、Cacophonyでジェイソン・ベッカーと組んだクラシカルシュレッドで、80〜90年代の速弾きメタルに新鮮な響きをもたらした。"},
  {r:105,n:"Zakk Wylde",         b:"Ozzy Osbourne / Black Label Society", t:"No More Tears",              w:"Zakk Wylde", d:"オジー・オズボーンのソロバンドでランディ・ローズの後任を務めた大男。ブルースピンのついたレスポール・カスタムを振り回し、No More Tearsのような叙情的なソロもMiracle Manのような攻撃的なリフも叩き出す。自身のBlack Label Societyでは南部ロックとメタルを混ぜた独自色を確立した。"},
  {r:106,n:"Kerry King",         b:"Slayer",                        t:"Raining Blood",                     w:"Kerry King", d:"Slayerの共同リーダーで、Raining Blood、Angel of Death等スラッシュメタルの究極形を作り上げた狂気のリフ職人。ジェフ・ハンネマンとのツインリードは音楽的というより暴力的で、ソロはホイール付きのワーミーで叫ぶようなもの。ジャンル全体のブルータリティの基準を塗り替えた、正真正銘の破壊者。"},
  {r:107,n:"Jeff Hanneman",      b:"Slayer",                        t:"Angel of Death",                    w:"Jeff Hanneman", d:"Slayerのもう一方の柱で、Angel of Death、Raining Blood、War Ensembleなどの主要曲を書いたメインコンポーザー。カーキ色の軍人風のステージ姿と、ホラー/戦争を題材にした攻撃的な楽曲群は、スラッシュメタルの尖鋭化を決定づけた。2013年に他界するまで、ジャンルの核心を担い続けた。"},
  {r:108,n:"K.K. Downing",       b:"Judas Priest",                  t:"Painkiller",                        w:"K. K. Downing", d:"Judas Priestの片翼として、Stained Class、British Steel、Painkillerまでヘヴィメタルの典型的ダブルリード構造を作った技術派。グレン・ティプトンとの調和的なツインリードは、アイアン・メイデンをはじめ後続のNWOBHMバンド全てのお手本となり、フライングVを振り回すステージングも象徴的。"},
  {r:109,n:"Glenn Tipton",       b:"Judas Priest",                  t:"Electric Eye",                      w:"Glenn Tipton", d:"Judas Priestのもう一人のギタリストで、ロブ・ハルフォードの金切り声を支えるシャープなリフとソロを提供。KK・ダウニングとの二頭体制は、PainkillerやElectric Eyeに象徴されるメタルのツインギター様式を規定した。SGやレスポールを中心に、正確で切れ味の鋭い職人的プレイを貫いている。"},
  {r:110,n:"Dave Murray",        b:"Iron Maiden",                   t:"The Trooper",                       w:"Dave Murray (guitarist)", d:"Iron Maidenの不動のリードギタリスト。The Numberof the BeastやHallowed Be Thy Nameで、ギャロッピングするベースの上で流麗なレガートソロを展開する英国メタルの美学そのもの。戦闘服のようにストラトを身にまとう姿と、高速だが叙情的なソロは、NWOBHMの象徴中の象徴。"},
  {r:111,n:"Adrian Smith",       b:"Iron Maiden",                   t:"Wasted Years",                      w:"Adrian Smith (musician)", d:"Iron MaidenでDave Murrayの相方を務めるソングライター兼ギタリスト。2Minutes to MidnightやWasted Yearsなど代表曲の多くに作曲で関わり、ピッキングの正確さと構成力の高さで知られる。力技ではなく設計で勝負する、英国メタル屈指の知性派。"},
  {r:112,n:"Adam Jones",         b:"Tool",                          t:"Schism",                            w:"Adam Jones (musician)", d:"Toolのギタリストで、Schism、Lateralus、Pneumaなどプログレッシブ・メタルの新しい様式を作り上げた視覚芸術家でもある。奇数拍子とフィボナッチ数列を用いた構成、そして1音1音に重みを込める重厚なレガート・アプローチで、90年代以降のプログメタルを再定義した。"},
  {r:113,n:"Chuck Schuldiner",   b:"Death",                         t:"Crystal Mountain",                  w:"Chuck Schuldiner", d:"Deathを率い、デスメタルというジャンルに旋律性と知性をもたらした創始者。Crystal Mountain、Spirit Crusherに代表される、ブルータルなリフと対位法的なツインリードを両立させる技巧は、テクニカル・デスメタルの基盤を作った。33歳で脳腫瘍に敗れたが、ジャンルの父として永遠に語られる。"},
  {r:114,n:"Michael Schenker",   b:"UFO / MSG",                     t:"Rock Bottom",                       w:"Michael Schenker", d:"UFOでRock Bottomを弾き、続くMichael Schenker Groupで独自の世界を築いたドイツ人。白黒のフライングVと、切ないが力強いメロディックなソロは、80年代の正統派HMの美意識を決定した一人。盟友ウリ・ジョン・ロートと共に、ジャーマン・メタル・ギターの創世記を担った職人。"},
  {r:115,n:"Nuno Bettencourt",   b:"Extreme",                       t:"Get the Funk Out",                  w:"Nuno Bettencourt", d:"Extremeのギタリスト。80〜90年代のファンク・メタル期におけるテクニカル・リフの最重要人物の1人で、Get the Funk Outに象徴されるスラップと交わるハイブリッド・ピッキングの冴えが光る。More Than Wordsのアコースティック曲でも知られ、技巧と音楽性のバランスが高水準で共存するプレイヤー。"},
  {r:116,n:"Jerry Cantrell",     b:"Alice in Chains",               t:"Man in the Box",                    w:"Jerry Cantrell", d:"Alice in Chainsの重量感のあるリフと不協和なハーモニーを作った陰鬱の設計者。Man in the Box、Would?などで使う独特のドロップDとワウの使い方、そして自身も歌うダークなデュエット・ヴォーカルは、90年代グランジの中でも異質な陰影を作った。精神と音色の両面で深い影を持つプレイヤー。"},
  {r:117,n:"Mark Tremonti",      b:"Alter Bridge / Creed",          t:"Blackbird",                         w:"Mark Tremonti", d:"Creed、Alter Bridgeで活動する、2000年代以降の正統派ハードロック・ギタリスト。Blackbirdの9分に及ぶエモーショナルな長尺ソロは、プログとクラシックメタルの交差点にある名演で、広範な支持を集めた。愚直にレスポールと向き合う姿勢が好感を呼ぶ、ギターヒーロー復権の功労者の一人。"},
  {r:118,n:"John 5",             b:"Rob Zombie / Mötley Crüe",      t:"Villisca",                          w:"John 5", d:"Marilyn Manson、Rob Zombieで活躍し、晩年はMötley Crüeにも参加したテレキャスター使いの変人。ホラーとカントリーをメタルに混ぜ込む独特のセンスで、ソロ作ではジェリー・リードに捧げたカントリー曲から、鋸のようなメタルリフまで幅広く展開。舞台化粧とチキンピッキングの同居する稀有な存在。"},
  // Shred / virtuoso
  {r:119,n:"Yngwie Malmsteen",   b:"solo / Rising Force",           t:"Black Star",                        w:"Yngwie Malmsteen", d:"クラシカル・メタルの旗手。Johann SebastianBachとニコロ・パガニーニを早弾きの中に流し込んだ1984年のRising Forceは、シュレッドというジャンルの出発点。スクライプ(指板をこする)など視覚的にも派手なパフォーマンスと、スウィープピッキングを武器に世代を越えて信奉者を生み続けている。"},
  {r:120,n:"Steve Vai",          b:"solo / David Lee Roth",         t:"For the Love of God",               w:"Steve Vai", d:"フランク・ザッパのバンドとデヴィッド・リー・ロスのバンドを経てソロ活動へ。Passion and WarfareのFor the Love of Godに代表されるメロディアスで宇宙的なリードと、ヘプタトニック・スケールを超える独自の音使いが「異星人的」と称される。7弦ギターIbanez Universeの普及にも貢献した革新者。"},
  {r:121,n:"Joe Satriani",       b:"solo",                          t:"Surfing with the Alien",            w:"Joe Satriani", d:"スティーヴ・ヴァイ、カーク・ハメット、メタリカらを教えたことで知られる「ギタリストの先生」。Surfing with the AlienやAlways with Me, Always with Youで聴けるメロディアスなリードは、速弾きよりも歌うことに主眼を置いた独自のインストゥルメンタル語法。自身のG3ツアーで多くのギターヒーローを世に送り出した功労者。"},
  {r:122,n:"Eric Johnson",       b:"solo",                          t:"Cliffs of Dover",                   w:"Eric Johnson", d:"テキサス出身の指弾きも交えた超絶技巧派で、Cliffs of Doverのような超高速ピッキングでありながら極めてクリアで音楽的なソロを作る。独特のレイトロック的オーバードライブ・トーンは「ヴァイオリン・トーン」と呼ばれ、音色の完璧主義者としても有名。誇示を嫌い楽曲に奉仕する、ストラトの哲人。"},
  {r:123,n:"John Petrucci",      b:"Dream Theater",                 t:"Under a Glass Moon",                w:"John Petrucci", d:"Dream Theaterの中心人物で、プログ・メタルのギター語彙を体系化した教師的存在。Images and WordsのPull Me UnderやUnder a Glass Moonに代表される、クラシック音楽の構成感覚を持ち込んだ長尺ソロは、ジョン・マクラフリンとイングヴェイを融合したかのような精密さ。現代プログメタルギターの中心軸。"},
  {r:124,n:"Paul Gilbert",       b:"Mr. Big / Racer X",             t:"Scarified",                         w:"Paul Gilbert", d:"Mr. Bigでポップに振れ、Racer Xで超絶技巧を見せる二刀流の熟練者。Scarifiedなどで聴こえる正確無比なストリングスキッピングと、ユーモアたっぷりのMCを交えたライブで親しみやすいキャラクターを作り上げた。ドリル・ビットをピックの代わりに使うエンターテイナー的側面も魅力。"},
  {r:125,n:"Guthrie Govan",      b:"The Aristocrats",               t:"Waves",                             w:"Guthrie Govan", d:"英国のスタジオ職人から世界的注目を集めた、現代最高のギター技術者のひとり。Erotic Cakes収録のWavesやFivesに代表される、ジャズ・ロック・フュージョン・メタルを自在に横断する能力は、ギター表現の今の最前線。The Aristocratsや、ハンス・ジマーの映画音楽でもその縦横無尽ぶりを披露している。"},
  {r:126,n:"Buckethead",         b:"solo",                          t:"Jordan",                            w:"Buckethead", d:"白いバケツと能面を被り、黙々と超絶技巧を繰り出す匿名の名手。ガンズアンドローゼズに一時加入した経歴を持ちつつ、ソロでは500枚を優に超えるアルバムをリリースし続けている異常な多作家。Jordanに代表される、キルスイッチを駆使した断続的な速弾きで独特の音響空間を生み出す。"},
  {r:127,n:"Jason Becker",       b:"Cacophony / David Lee Roth",    t:"Altitudes",                         w:"Jason Becker", d:"18歳でCacophonyでデビュー、20歳でデヴィッド・リー・ロスのバンドに参加した天才シュレッダー。Altitudesの美しいメロディが示すように、速弾きを超えた作曲センスを持っていたが、ALS(筋萎縮性側索硬化症)を発症。目の動きだけで作曲を続ける姿が世界中のミュージシャンから尊敬を集める、不屈の才能。"},
  {r:128,n:"Allan Holdsworth",   b:"solo / UK / Soft Machine",      t:"Devil Take the Hindmost",           w:"Allan Holdsworth", d:"スーパーレガート奏法の開祖。Soft Machine、U.K.、Allan Holdsworth Grand を経てソロ名義で活動を展開した、ジャズ/フュージョン/プログを横断するギター革新者。Devil Take the Hindmostのような流麗な音の流れはホーン奏者を目指していたからだと本人が語る、もう一つのギター史の主役。"},
  // Blues / modern blues
  {r:129,n:"Joe Bonamassa",      b:"solo / Black Country Communion",t:"Sloe Gin",                          w:"Joe Bonamassa", d:"現代ブルースロックの顔。レス・ポールとストラトを持ち替え、1960〜70年代の英国ブルースロックの語彙を2000年代以降に継承し続けた。Sloe Ginのような叙情的な長尺演奏と、プロとしての完璧なステージ運営で、ブルースという古典ジャンルを現代のマーケットで成立させ続けている立役者。"},
  {r:130,n:"John Mayer",         b:"solo / John Mayer Trio",        t:"Gravity",                           w:"John Mayer", d:"スティーヴィー・レイ・ヴォーンに憧れて始めた少年が、ポップシンガーとして頂点に立ち、トリオ名義では黒いストラトの「ブラック・ワン」を手にブルースロックの第一線で戦う真の二刀流。Gravityに代表される、歌とギターソロを同等に重視する姿勢は、21世紀のブルース系ギタリストのお手本になっている。"},
  {r:131,n:"Gary Clark Jr.",     b:"solo",                          t:"Bright Lights",                     w:"Gary Clark Jr.", d:"テキサスのオースティン出身のブルース/ソウル/ロック/ヒップホップ横断型ギタリスト。エピフォンカジノの極太歪みと、ジミ・ヘンドリックスを思わせる泥臭いフィーリングで、若い世代のブルース再興を牽引。Bright Lightsで一躍名が知れ、クロスオーバー感覚で現代ロックを更新する旗手となった。"},
  {r:132,n:"Jeff Healey",        b:"The Jeff Healey Band",          t:"Angel Eyes",                        w:"Jeff Healey", d:"生後まもなく網膜芽細胞腫で失明したカナダ人。ギターを膝の上に横にして弾く独自のラップスタイルで、Angel Eyesのヒットを含むブルース・ロックの豊かな音楽性を示した。映画『ロードハウス』でも名演を残し、41歳で早世したが、一聴して分かる独特のタッチで永遠に愛される存在。"},
  {r:133,n:"Sister Rosetta Tharpe",b:"solo",                        t:"Strange Things Happening Every Day",w:"Sister Rosetta Tharpe", d:"「ロックンロールのゴッドマザー」と呼ばれる、ゴスペル/ロックの開祖。エレクトリック・ギターを教会音楽に持ち込み、1944年のStrange Things Happening Every Dayはロックンロールの最古の可能性を秘めた録音の1つ。チャック・ベリーやエルヴィスが登場する遥か前に電気ギターを攻撃的に鳴らした先駆者。"},
  {r:134,n:"Samantha Fish",      b:"solo",                          t:"Bulletproof",                       w:"Samantha Fish", d:"ミズーリ州カンザスシティ出身の女性ブルース・ロック・ギタリスト。シガーボックス・ギターとストラトを自在に持ち替え、ブルースに現代的なポップ感覚を織り込む。Bulletproofなどの粘りのあるトーンと、ステージ上のエネルギッシュな存在感で、新世代女性ブルースの最前線を担っている。"},
  {r:135,n:"Robert Cray",        b:"The Robert Cray Band",          t:"Smoking Gun",                       w:"Robert Cray", d:"シカゴ・ブルースよりもソウル寄りの洗練されたサウンドを持つ、1980年代ブルース・リバイバルの象徴。ストラトのクリーンな音色で、Smoking Gunなどの都会的ブルースを書いた。泣きの要素を抑えたクールなフレージングは、カリフォルニアのスタジオシーンでも高く評価される。"},
  {r:136,n:"Warren Haynes",      b:"Gov't Mule / Allman Brothers",  t:"Soulshine",                         w:"Warren Haynes", d:"Allman Brothers BandとGov't Muleで、1990〜2010年代のサザンロック/ジャムバンドを支え続けたリーダー。Soulshineに象徴されるソウルフルなスライドと歌、そして長尺ソロの構築力で、デュアン・オールマン以後の流派を代々継承させた役割は計り知れない。ブルース的語彙の現代的翻訳者。"},
  // Alternative / indie / grunge
  {r:137,n:"Graham Coxon",       b:"Blur",                          t:"Song 2",                            w:"Graham Coxon", d:"Blurのギタリストで、Song 2のようなグランジ的ラウドさから、Coffee & TVのクリーン・アルペジオまで、幅広い表現を持つ90年代英国ロックの重要人物。ソロ作ではアヴァンギャルドに振れ、プロデューサーのスティーヴン・ストリートと緊密に組んで、ブリットポップの枠を越えていった職人。"},
  {r:138,n:"Kevin Shields",      b:"My Bloody Valentine",           t:"Only Shallow",                      w:"Kevin Shields", d:"My Bloody Valentineのフロントマン。Only ShallowやSometimesのような曲を、トレモロアームを押し付けた不安定なチューニングの「グライド・ギター」と、膨大な多重録音で構築。Lovelessの朦朧とした音像はシューゲイザーという語を世界に広め、以後のインディロックの音響像を決定づけた。"},
  {r:139,n:"Josh Homme",         b:"Queens of the Stone Age",       t:"No One Knows",                      w:"Josh Homme", d:"Queens of the Stone Ageのフロントマン。No One Knowsの有名な「オムパ」リフに代表されるように、ストーナー・ロックに奇妙なグルーヴと洗練を持ち込んだ。Kyuss時代からダウンチューンと荒砂のような歪みを武器にし、砂漠ロックというサブジャンルを成立させた張本人。"},
  {r:140,n:"Billie Joe Armstrong",b:"Green Day",                    t:"Basket Case",                       w:"Billie Joe Armstrong", d:"Green Dayのフロントマンで、Basket CaseやAmerican Idiotを書いたポップパンクの旗手。派手な技巧ではなくパワーコードの勢いとメロディで勝負するスタイルで、1990年代後半以降のパンクリバイバルの世代的象徴となった。ブルーのストラトコピー「ブルー」を愛用する姿も印象的。"},
  {r:141,n:"Robert Smith",       b:"The Cure",                      t:"Just Like Heaven",                  w:"Robert Smith (musician)", d:"The Cureの唯一の恒常メンバーで、Just Like Heavenのきらめくアルペジオから、Pictures of YouのディレイがかったPlaintiveなリードまで、ポストパンクの感傷を音にした男。フェンダー・バスマンのクリーンチャンネルをうっすら歪ませたトーンは、ゴスロック/ニューウェイヴのギター感覚の礎となった。"},
  {r:142,n:"Billy Corgan",       b:"The Smashing Pumpkins",         t:"Cherub Rock",                       w:"Billy Corgan", d:"The Smashing Pumpkinsの中核。Cherub RockやTodayで聴こえる、低域が壁のように押し寄せるファズ+多重録音のギター音は、90年代オルタナティヴの音像を書き換えた。自身のスタジオBugg Recordingsでギター・トーンに執着する完璧主義者で、ビッグ・マフを爆音で鳴らす美学の体現者。"},
  {r:143,n:"Kim Thayil",         b:"Soundgarden",                   t:"Black Hole Sun",                    w:"Kim Thayil", d:"Soundgardenの創設メンバーで、Black Hole SunやRusty Cageなど主要曲のオーバードライブの壁を作った職人。DADFADドロップDに近い独自のオープンチューニングを多用し、ミドルからローが押し寄せるようなヘヴィでプログレッシブなリフを書く、グランジの中では最も技術派のギタリスト。"},
  {r:144,n:"Mike McCready",      b:"Pearl Jam",                     t:"Alive",                             w:"Mike McCready", d:"Pearl JamのリードギタリストでAliveやYellow Ledbetterの情熱的なソロで知られる。ジミ・ヘンドリックス、スティーヴィー・レイ・ヴォーンの系譜を引き継ぐブルースロック派で、ストラトのネックを絞り込むような粘りのあるタッチが持ち味。若くしてバンドの顔になりながら、正統派の継承者であり続ける。"},
  // Right now / contemporary
  {r:145,n:"Tosin Abasi",        b:"Animals as Leaders",            t:"CAFO",                              w:"Tosin Abasi", d:"黒人ギタリストとしてはメタル界で数少ない第一線のリーダー。Animals as Leadersを率いて、8弦ギターとタッピングを融合したインストゥルメンタルのメタルを確立した「ジェント」の中心人物。Cafoなどで聴ける複雑なポリリズムは、数学的厳密さと歌心を同時に実現する、2010年代以降のギター革命の旗手。"},
  {r:146,n:"Tim Henson",         b:"Polyphia",                      t:"Playing God",                       w:"Tim Henson", d:"Polyphiaのフロントマンで、2020年代ギター界の最も影響力のある新世代の一人。Playing Godなどに見られるフラメンコ/トラップ/プログを混ぜ込んだタッピングとハイブリッドピッキングのスタイルは、いかにもインスタ時代の速度感で、若いギタリスト達を大量に刺激している。"},
  {r:147,n:"Plini",              b:"solo",                          t:"Handmade Cities",                   w:"Plini", d:"オーストラリア/シドニー出身のインスト・ギタリスト。Handmade Citiesに象徴される浮遊感のあるメロディと、緻密なポリリズムの上で優しく歌うリードトーンで、スティーヴ・ヴァイから「史上最高のインスト・ギター・アルバムの一つ」と讃えられた。スタジオ・プロデューサーとしての耳も抜群。"},
  {r:148,n:"Nita Strauss",       b:"solo / Alice Cooper",           t:"Our Most Desperate Hour",           w:"Nita Strauss", d:"アリス・クーパーのバンドで、女性ギタリストとしての地位を確立。ストラト一本で勢いよく速弾きを繰り出すショーマンシップと、ソロ作Controlled Chaosの完成度で、2010年代以降のギター界で存在感を増してきた。メタル界における女性表現の先頭に立ち続ける、ステージ度外れのエンターテイナー。"},
  {r:149,n:"Christone Ingram",   b:"solo",                          t:"Fresh Out",                         w:"Christone Ingram", d:"ミシシッピ州クラークスデイル出身の新世代ブルース旗手。Buddy GuyやEric Claptonから早くから支援を受け、デビュー作KingfishとFresh Outで古典ブルースを現代に蘇らせた。ゴスペルとブルースとファンクを自然に溶け込ませた21世紀ブルースの希望。"},
  // Jazz / fusion
  {r:150,n:"Django Reinhardt",   b:"Quintette du Hot Club de France",t:"Minor Swing",                      w:"Django Reinhardt", d:"左手指のうち2本しか動かなかったにもかかわらず、2本指でジプシー・ジャズという完全な新ジャンルを生み出したベルギー生まれのロマ。Minor Swing、Nuages、Djangologyはその後のジャズ・ギターの全ての基準となった。Quintette du Hot Club de Franceでバイオリンのステファン・グラッペリと組んだ演奏は今も伝説。"},
  {r:151,n:"Wes Montgomery",     b:"solo",                          t:"Four on Six",                       w:"Wes Montgomery", d:"親指一本でピッキングするハイブリッド奏法と、オクターヴ・メロディの二刀流で、モダン・ジャズ・ギターのスタイルを完成させた巨匠。Four on SixやWestCoast Bluesに代表される、流麗で音数の多いラインとブルージーなフィーリングを両立させるソロは、以降のジャズ・ギター演奏の普遍的教科書。"},
  {r:152,n:"Charlie Christian",  b:"Benny Goodman Sextet",          t:"Solo Flight",                       w:"Charlie Christian", d:"ベニー・グッドマン楽団での仕事を通して、エレキ・ギターを単なるリズム楽器からソロ楽器へと引き上げた革命家。Solo Flightなどで見せるホーン的単音ラインは、ジャズ・ギターの近代の始まりそのもの。結核により25歳で早世したが、残した僅かな録音がチャーリー・パーカー以降のビバップ世代を準備した。"},
  {r:153,n:"Pat Metheny",        b:"Pat Metheny Group",             t:"Are You Going with Me?",            w:"Pat Metheny", d:"ECMレコードを象徴するギタリストで、ジャズにアメリカーナの空気を持ち込んだ叙情派。Are You Going With Me?のシンセ・ギターで聴こえる宇宙的なリードと、Bright Size Life以来の浮遊するメロディ・センスで、ジャズ・ギターの語彙を根本から広げた。現代ジャズで最も多作かつ尊敬される作曲家の1人。"},
  {r:154,n:"Al Di Meola",        b:"Return to Forever / solo",      t:"Mediterranean Sundance",            w:"Al Di Meola", d:"リターン・トゥ・フォーエヴァーでのフュージョン演奏と、パコ・デ・ルシアやジョン・マクラフリンと組んだFriday Night in San Franciscoのアコースティック三重奏で名高い、イタリア系アメリカ人の超絶技巧派。Mediterranean Sundanceなどで聴こえる弾丸のような右手の技巧は、今もアコースティック速弾きの頂点の一つ。"},
  // Acoustic / fingerstyle
  {r:155,n:"Tommy Emmanuel",     b:"solo",                          t:"Classical Gas",                     w:"Tommy Emmanuel", d:"オーストラリア出身のフィンガースタイル巨匠。チェット・アトキンスを師と仰ぎ、Classical GasやAngelinaを含むソロ・パフォーマンスで、ギター一本でバンドを再現する独自のスタイルを完成させた。体全体でリズムを取りながら、ベース、コード、メロディを同時に演奏する姿は多くの若手を鼓舞している。"},
  {r:156,n:"Michael Hedges",     b:"solo",                          t:"Aerial Boundaries",                 w:"Michael Hedges", d:"Windham Hillのスター的存在で、変則チューニングとタッピング、スラップ・ハーモニクスを組み合わせて、アコースティック・ギター一本でオーケストラのような響きを作った。Aerial Boundariesに象徴される作品群は、ソロ・ギターの物理的な限界を超えており、自動車事故で43歳で他界した後も神格化され続けている。"},
  {r:157,n:"Leo Kottke",         b:"solo",                          t:"Vaseline Machine Gun",              w:"Leo Kottke", d:"ジョン・フェイヒイの後継者として、Takoma Recordsから登場した12弦指弾きの巨匠。1969年の6- and 12-String Guitarは今もアコースティックギターの古典で、Vaseline Machine Gunの流れるような三連タッチと、親しみやすい語り口で、前衛的なアメリカン・プリミティヴをより広い聴衆に届けた。"},
  {r:158,n:"Bert Jansch",        b:"Pentangle",                     t:"Angie",                             w:"Bert Jansch", d:"英国フォーク・リバイバルの中心に立ち、Pentangleの一員でもあったスコットランド出身の指弾きの巨人。1965年のデビュー盤に収録されたAngie(デイヴィー・グラハムのカバー)は、若きジミー・ペイジに計り知れない影響を与えた。英国フォークのトラディショナル・チューニングと即興演奏を融合した、影響力大きな開拓者。"},
  // Punk
  {r:159,n:"Joe Strummer",       b:"The Clash",                     t:"London Calling",                    w:"Joe Strummer", d:"The Clashのフロントマンで、パンクに政治性と世界音楽の感覚を持ち込んだ声の人。ミック・ジョーンズとは対照的に、コードを殴りつけるリズムギタリストの役割に徹し、London Callingで象徴される英国パンクの大河を作った。メスカレロス時代まで、常に叫び続けた生粋のシンガー・ソングライター。"},
  {r:160,n:"Mick Jones",         b:"The Clash",                     t:"Train in Vain",                     w:"Mick Jones (The Clash guitarist)", d:"The Clashのリードギタリスト兼ソングライター。Train in Vain、Should I Stay or Should I Go、Londonヘ Callingなどの曲を書いたメロディ・メーカーで、パンクにレゲエやR&Bのコード感覚を融合させた。後のBig Audio Dynamiteでサンプリングとダブをロックに取り込み、80年代以降の音楽にも影響を残した。"},
  // Early innovators / classic rock
  {r:161,n:"Hank Marvin",        b:"The Shadows",                   t:"Apache",                            w:"Hank Marvin", d:"The Shadowsのリーダーで、英国でストラトキャスターを最初期に広めたインスト・ロックの父。Apacheの郷愁のあるメロディとビブラート、そして深いエコーは1960年以降の英国全ギタリストの憧れとなり、クラプトンからブライアン・メイまで全員が幼少期に彼を聴いた。英国ロックの発芽点。"},
  {r:162,n:"Peter Frampton",     b:"Humble Pie / solo",             t:"Do You Feel Like We Do",            w:"Peter Frampton", d:"ハンブル・パイを経て、1976年のライブ盤Frampton Comes Alive!が歴代有数のセールスを記録し、Do You Feel Like We Doで「トーカーボックス」を一気に普及させた男。フェンダー・カスタム・ストラトの愛機「フェノミナル・トーマス」で奏でる親しみやすい歌物のソロで、ロックの顔の一つとなった。"},
  {r:163,n:"Steve Howe",         b:"Yes",                           t:"Roundabout",                        w:"Steve Howe", d:"Yesのギタリスト。ES-175のホロウボディを特徴的に使い、Roundaboutに象徴される複雑なリフとクラシック・フラメンコ風のフィンガースタイルで、プログレッシブロックのギター語法を広げた。アコースティックとエレクトリック、ロックとジャズとクラシックを自由に渡り歩く、英国プログ屈指の職人。"},
  {r:164,n:"Malcolm Young",      b:"AC/DC",                         t:"Highway to Hell",                    w:"Malcolm Young", d:"弟アンガスのソロをこそ目立たせる、AC/DCのリズムギター・マスター。Highway to HellやYou Shook Me All Night Longの背後にある揺るがないダウン・ピッキングのバッキングが、AC/DCのサウンドの本当の核だと多くのギタリストが証言する。派手さと無縁の、ロックンロールの土台そのものを担った男。"},
  {r:165, n:"Steve Morse", b:"Dixie Dregs / Deep Purple", t:"Take It Off the Top", w:"Steve Morse", d:"Dixie Dregsの首謀者で、Deep Purpleのリッチー・ブラックモア後任として活動した全方位型の職人。カントリー、ジャズ、クラシック、メタルを完璧にこなし、MusicMagazineで5年連続「Best Overall Guitarist」に選ばれた実績がある。速弾きを超えた音楽性と作曲力で同業者から最も尊敬される一人。"},
  {r:166, n:"Danny Gatton", b:"solo / Redneck Jazz Explosion", t:"Funky Mama", w:"Danny Gatton", d:"ワシントンDCを拠点に活動したテレキャスター使いの超絶技巧派。ジャズ、ブルース、ロカビリー、カントリーを瞬時に切り替えるスタイルは「世界で最高のアンノウン・ギタリスト」と称された。1991年の88 Elmira St.所収のFunky Mamaは無伴奏テレキャスターのジャズとしての到達点。1994年に自ら命を絶った。"},
  {r:167, n:"Roy Buchanan", b:"solo", t:"The Messiah Will Come Again", w:"Roy Buchanan", d:"テレキャスター一本で絶唱するような泣きのブルースを作り上げた、通称「The Messiah of the Telecaster」。1972年の同名曲でピッキングハーモニクスと人工ハーモニクスを組み合わせた表現はギター界を震撼させた。ストーンズのミック・テイラー後任を断り生涯ソロで活動を貫いた孤高の人。"},
  {r:168, n:"Steve Hackett", b:"Genesis / solo", t:"Firth of Fifth", w:"Steve Hackett", d:"Genesisの黄金期ギタリストで、タッピング奏法をEVHより先に公に披露した技術革新者。Firth of Fifthの叙情的な長尺ソロはプログレッシブロックのギターソロの最高峰とされる。ナイロン弦の繊細なフィンガースタイルも得意で、クラシカルな作曲センスが際立つ。"},
  {r:169, n:"Phil Keaggy", b:"Glass Harp / solo", t:"Salvation Army Band", w:"Phil Keaggy", d:"Glass Harpを率いた後、クリスチャン音楽と純器楽の世界で活動を続ける技巧派。ポール・マッカートニー本人に「地球上で最高のギタリストの一人」と讃えられた伝説を持ち、アコースティックからシュレッドまで全方位に対応。右手指の欠損のハンデを感じさせない流麗なフレージングが持ち味。"},
  {r:170, n:"Jan Akkerman", b:"Focus", t:"Hocus Pocus", w:"Jan Akkerman", d:"オランダのプログレバンドFocusの中心人物で、ヨーロッパのジャズ、クラシック、中世音楽を流し込んだ独自のロックギター語彙を作った。ヨーデル入りのHocus Pocusで一躍世界に知られ、1973年のMelody Maker誌で世界ベスト・ギタリストに選ばれたこともある。"},
  {r:171, n:"Uli Jon Roth", b:"Scorpions / Electric Sun", t:"The Sails of Charon", w:"Uli Jon Roth", d:"Scorpionsの第2期でIn TranceやVirgin Killerを築き、ヘンドリックスの直接的後継を自任するドイツの巨匠。Sails of CharonはYngwieを含めクラシカル・メタル世代全員が最大の影響源と挙げる、中東旋法と半音階を溶かした革新的な一曲。後に7弦の「Sky Guitar」を自作した。"},
  {r:172, n:"Gary Moore", b:"Thin Lizzy / solo", t:"Still Got the Blues", w:"Gary Moore", d:"アイルランドが生んだブルースとハードロックの両刃。Thin Lizzy在籍期からソロ期のStill Got the Bluesまで、激情的な泣きのレスポールトーンで知られる。絞り出すようなビブラートと音の一粒一粒の重みで、80年代メタルから90年代ブルースリバイバルまで橋渡しした職人。"},
  {r:173, n:"Joe Messina", b:"The Funk Brothers", t:"My Girl", w:"Joe Messina", d:"Motownのハウスバンド「The Funk Brothers」の3人ギタリストの一人。ジャズ出身でクリーンなコードワークとフィルを提供し、Temptations、Four Tops、Marvin Gayeなど60年代の無数のヒット曲の背景で鳴り続けた。ドキュメンタリー「Standing in the Shadows of Motown」で世に存在が広まるまで、匿名の偉大な職人だった。"},
  {r:174, n:"Robert White", b:"The Funk Brothers", t:"I Heard It Through the Grapevine", w:"Robert White (guitarist)", d:"Motownのハウスバンド「The Funk Brothers」の3人ギタリストの一人。My GirlのイントロリフやI Heard It Through the Grapevine、Baby Loveなど数多くのモータウンのヒットで輝いた、ソウルの隠れた立役者。クリーンなシングルラインの美しさでMotownサウンドを定義づけた。"},
  {r:175, n:"Eddie Willis", b:"The Funk Brothers", t:"Ain't Too Proud to Beg", w:"Eddie Willis (guitarist)", d:"Motownのハウスバンド「The Funk Brothers」の3人ギタリストの一人。ミシシッピ生まれのブルース的な粘りとファンクのリズム感をモータウンのポップに注入した。カッティング主体の脇役に徹しつつ、60年代アメリカン・ポップの根幹を支えた無名の巨人。"},
  {r:176, n:"Jimmy Nolen", b:"James Brown band", t:"Papa's Got a Brand New Bag", w:"Jimmy Nolen", d:"ジェームス・ブラウン楽団の「King of Funk Rhythm Guitar」。16分音符のスタッカート・カッティングを主軸にした「チキン・スクラッチ」奏法はファンクの基礎言語となり、あらゆるソウル/ファンク/ディスコ/ヒップホップのギターバッキングの原型になった。"},
  {r:177, n:"Lonnie Mack", b:"solo", t:"Memphis", w:"Lonnie Mack", d:"1963年のインスト「Memphis」と「Wham!」で、ブルースロックにおけるフィンガーピッキングとアームを使ったビブラートを先駆けた。フライングVを愛用した最初のスターの一人で、スティーヴィー・レイ・ヴォーンは彼を師と仰いだ。テキサス・ブルース・ロックの隠れた源流。"},
  {r:178, n:"Cliff Gallup", b:"Gene Vincent & His Blue Caps", t:"Be-Bop-A-Lula", w:"Cliff Gallup", d:"ジーン・ヴィンセントの初期バンドで1956〜57年に活動した、ロカビリー最初期の伝説的リードギタリスト。Be-Bop-A-LulaやRace With the Devilで披露した、チェット・アトキンス譲りのハイブリッドピッキングの切れ味は、ジェフ・ベックが最も愛したギタリストとして半世紀を越えて敬意を集める。"},
  {r:179, n:"Shawn Lane", b:"Black Oak Arkansas / solo", t:"Not Again", w:"Shawn Lane", d:"ギタリストの間で「史上最速」と評される超人的な超絶技巧の持ち主。ブルース、ジャズ、インド音楽まで理解し、Powers of Tenなどで難解な時間感覚と音符密度を両立させた。2003年に持病により40歳で他界したが、録音とライヴ映像は今もギタリスト界の伝説として語り継がれる。"},
  {r:180, n:"Lee Ranaldo", b:"Sonic Youth", t:"Mote", w:"Lee Ranaldo", d:"Sonic Youthで、サーストン・ムーアと共にオルタナティブ・ロックの音響的可能性を押し広げた実験家。変則チューニングと、プリペアド・ギター(ドライバーやドラムスティックを挟むテクニック)の名手。ノイズと旋律を共存させる詩的なギターは、ポストパンク以降のインディロックに欠かせない基礎。"},
  {r:181, n:"Terry Kath", b:"Chicago", t:"25 or 6 to 4", w:"Terry Kath", d:"シカゴの初代ギタリストで、25 or 6 to 4の長尺ソロはジミ・ヘンドリックス本人に「俺より上手い」と言わしめた逸話を持つ。テレキャスターで紡ぐ歌心と、ファズ/ワウを駆使した表現力で、ブラス・ロックを真にギター的なジャンルに押し上げた。1978年の銃器事故により31歳で他界。"},
  {r:182, n:"Tommy Bolin", b:"Deep Purple / James Gang / solo", t:"Teaser", w:"Tommy Bolin", d:"Deep Purple後期のリッチー・ブラックモア後任を務めた、テクニックと音楽性を兼ね備えた若きギターヒーロー。James GangではJoe Walshの後任、そしてビリー・コブハムのSpectrumでフュージョン作品にも参加。多才さを発揮したが1976年にヘロイン過剰で25歳で他界した悲劇の人。"},
  {r:183, n:"Neal Schon", b:"Santana / Journey", t:"Don't Stop Believin'", w:"Neal Schon", d:"15歳でカルロス・サンタナと肩を並べたSantana加入、そしてJourneyを結成したハードロックの早熟天才。Don't Stop Believin'のイントロやFaithfullyの劇的なソロに代表される、歌メロを尊重する美しいフレージングで、AOR/アリーナロックの標準形を作り上げた。"},
  {r:184, n:"Kirk Hammett", b:"Metallica", t:"One", w:"Kirk Hammett", d:"Joe Satrianiの弟子として入団したMetallicaのリードギタリスト。ワウペダルと半音階を自在に組み合わせ、Master of PuppetsやOneのような長尺のメロディックなソロは、スラッシュメタルの中で最も歌心のある存在として機能した。メタル世代の多くが最初に憧れるギターヒーローの一人。"},
  {r:185, n:"Alvin Lee", b:"Ten Years After", t:"I'm Going Home", w:"Alvin Lee", d:"Ten Years Afterのフロントマンで、ウッドストックでのI'm Going Homeの11分に及ぶ狂騒的な高速ブルース演奏によって「世界最速のギタリスト」の称号を得た。ギブソンES-335に「Big Red」と愛称を付けて生涯使い続けた、英国ブルースブームの最重要人物の一人。"},
  {r:186, n:"Vinnie Moore", b:"UFO / solo", t:"In Control", w:"Vinnie Moore", d:"1980年代後半のShrapnelレコード所属のネオクラシカル・シュレッドの代表格。1986年のMind's Eyeの冒頭を飾るIn Controlは、後のテクニカルギター世代に大きな影響を与えた教科書的な速弾きインスト。その後UFOに加入し、メンバー交代を経てなお活動を続ける、正統派速弾き職人。"},
  {r:187, n:"Tony MacAlpine", b:"M.A.R.S. / Planet X / solo", t:"The Raven", w:"Tony MacAlpine", d:"Shrapnel Records発のシュレッドとネオクラシカル・メタル世代の中心人物の一人。クラシックピアノの素養を生かした複雑な和声感覚と超絶的ピッキング技巧を持ち、Planet XやCABなどでフュージョンの世界にも踏み込んだ、オールラウンドな技術派。"},
  {r:188, n:"Ray Gomez", b:"Stanley Clarke / solo", t:"Make Your Move", w:"Ray Gomez", d:"スタンリー・クラーク・バンドや数々のセッションで活躍した、モロッコ生まれの驚異的技巧派フュージョンギタリスト。1980年のソロ作Volumeで、Allan Holdsworthが讃える独自のレガートとスーパーテクニックを披露。代表曲Make Your MoveはKSHE(セントルイス)で1位を獲得した、知る人ぞ知る伝説の職人。"},
  {r:189, n:"Michael Landau", b:"session / Landau Band", t:"I'm Buzzed", w:"Michael Landau", d:"ロサンゼルスの一流セッションマン。スティーヴ・ルカサー同世代として数千の録音に参加しつつ、自身のソロ作Tales from the BulgeのI'm Buzzedなどで硬派のブルースロックを展開。ストラトキャスターから絞り出す濃密なトーンと、歌い手のように感情豊かなソロは、プロの耳を最も集める現代ロックの巨匠。"},
  {r:190, n:"Carl Verheyen", b:"Supertramp / Carl Verheyen Band", t:"Opening Above", w:"Carl Verheyen", d:"スーパートランプを含む数多のセッションで活躍しつつ、自身のバンドでジャズ、ロック、カントリーを横断する高度な音楽を展開。教則本やマスタークラスの著者としても知られ、理論と実践の両面で後進の教育にも力を入れる、L.A.屈指の職人。"},
  {r:191, n:"Adrian Belew", b:"King Crimson / David Bowie / solo", t:"Thela Hun Ginjeet", w:"Adrian Belew", d:"キング・クリムゾン第3期を率いたギタリストで、ギターで象や鳥の鳴き声を模倣する独特のエフェクト使いで知られる前衛派。ザッパ、ボウイ、トーキング・ヘッズら巨匠達の右腕を務めた経歴を持ち、ソロ作でも独創的なポップ・プログレッシブを発表し続けている。"},
  {r:192, n:"Martin Barre", b:"Jethro Tull", t:"Aqualung", w:"Martin Barre", d:"Jethro Tullの40年以上にわたるギタリスト。Aqualungの有名なリフやLocomotive Breathの重厚なソロで、イアン・アンダーソンのフルートとの絶妙な絡みを作り上げた。ハードロックとフォークとプログを溶かす、英国ロック屈指の縁の下の職人。"},
  {r:193, n:"Ray Davies", b:"The Kinks", t:"Waterloo Sunset", w:"Ray Davies", d:"The Kinksの兄でソングライター、そして弟デイヴと共にバンドのリズムギターを担った。You Really Got MeやWaterloo Sunsetに象徴されるように、シンプルなコードとメロディで英国ロックの知的な一面を築いた。ソングライターとしての側面が有名だが、リズムギタリストとしての基礎的な貢献も大きい。"},
  {r:194, n:"Scott Gorham", b:"Thin Lizzy", t:"The Boys Are Back in Town", w:"Scott Gorham", d:"Thin Lizzyのツインギター編成を築いた米国人。ブライアン・ロバートソンやゲイリー・ムーアと組んだツインリードは、Iron MaidenをはじめNWOBHM世代全てに多大な影響を与えた。The Boys Are Back in Townのハモリは今もロックのツインリードの教科書的瞬間。"},
  {r:195, n:"Brian Robertson", b:"Thin Lizzy / Motörhead", t:"Still in Love with You", w:"Brian Robertson (guitarist)", d:"Thin Lizzy黄金期の片翼として、ラフで情熱的なソロを担当。Still in Love with Youの泣きのリードは、生涯の名演として語り継がれる。後にMotörheadにも短期参加。その荒々しくも芯のある音色は、英ハードロックの真髄を体現する。"},
  {r:196, n:"Big Jim Sullivan", b:"session work", t:"Hurdy Gurdy Man", w:"Big Jim Sullivan", d:"1960〜70年代の英国ポップ/ロックの裏方を支えたセッションの帝王の1人。トム・ジョーンズやドノヴァン、デヴィッド・ボウイなど数千曲で演奏し、ジミー・ペイジと並んで英国セッション界の双璧とされた。ギブソンL-5を愛用する典型的な職人タイプ。"},
  {r:197, n:"Mickey Baker", b:"Mickey & Sylvia / session", t:"Love Is Strange", w:"Mickey Baker", d:"1950年代のNY R&Bセッションの中心にいた巨匠で、Mickey & SylviaのLove Is Strangeで自身名義のヒットも持つ。ジャズ、ブルース、ロックンロールを橋渡しするシングルライン・ソロと、著名な教則本「Jazz Guitar」で後進を多数育てた教育者。"},
